<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="640" fill="#ffffff"/>
  <text x="30" y="38" font-size="20" font-weight="500" fill="#2c2c2a">[PHOTO-TEMPLATE-MEMO] — maquette annotée</text>

  <!-- ===== CARTE MEMO ===== -->
  <rect x="30" y="58" width="500" height="556" rx="12" fill="#ffffff" stroke="#d3d1c7"/>

  <!-- header -->
  <text x="50" y="94" font-size="15" font-weight="500" fill="#2c2c2a">Voyage Japon — photos</text>
  <rect x="436" y="76" width="78" height="28" rx="8" fill="#ffffff" stroke="#b4b2a9"/>
  <text x="475" y="95" font-size="12" fill="#185FA5" text-anchor="middle">Carte</text>
  <circle cx="436" cy="76" r="11" fill="#185FA5"/><text x="436" y="80" font-size="12" fill="#fff" text-anchor="middle">4</text>

  <!-- carrousel -->
  <rect x="50" y="114" width="460" height="180" rx="8" fill="#ece9e2"/>
  <text x="280" y="208" font-size="13" fill="#a3a097" text-anchor="middle">image courante</text>
  <rect x="456" y="122" width="48" height="20" rx="10" fill="#2c2c2a"/><text x="480" y="136" font-size="11" fill="#fff" text-anchor="middle">3 / 12</text>
  <rect x="58" y="122" width="28" height="24" rx="5" fill="#2c2c2a"/><text x="72" y="139" font-size="14" fill="#fff" text-anchor="middle">&#x2922;</text>
  <circle cx="74" cy="204" r="15" fill="#ffffff" stroke="#b4b2a9"/><text x="74" y="210" font-size="16" fill="#2c2c2a" text-anchor="middle">&#x2039;</text>
  <circle cx="486" cy="204" r="15" fill="#ffffff" stroke="#b4b2a9"/><text x="486" y="210" font-size="16" fill="#2c2c2a" text-anchor="middle">&#x203A;</text>
  <rect x="58" y="260" width="262" height="24" rx="6" fill="#2c2c2a"/><text x="68" y="276" font-size="11" fill="#fff">Tsukiji, Tokyo · 6 nov · 14h30</text>
  <circle cx="44" cy="270" r="11" fill="#185FA5"/><text x="44" y="274" font-size="12" fill="#fff" text-anchor="middle">1</text>
  <circle cx="92" cy="124" r="11" fill="#185FA5"/><text x="92" y="128" font-size="12" fill="#fff" text-anchor="middle">2</text>

  <!-- barre d'options -->
  <g font-size="15" fill="#2c2c2a" text-anchor="middle">
    <rect x="58" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#185FA5"/><text x="74" y="327">&#x2922;</text>
    <rect x="98" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#b4b2a9"/><text x="114" y="327">&#x2193;</text>
    <rect x="138" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#b4b2a9"/><text x="154" y="327">&#x21BA;</text>
    <rect x="178" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#b4b2a9"/><text x="194" y="327">&#x21BB;</text>
    <rect x="218" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#b4b2a9"/><text x="234" y="328">&#x2212;</text>
    <rect x="258" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#b4b2a9"/><text x="274" y="327">+</text>
    <rect x="298" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#185FA5"/><text x="314" y="328" fill="#185FA5">&#x2316;</text>
    <rect x="338" y="306" width="32" height="32" rx="7" fill="#fff" stroke="#A32D2D"/><text x="354" y="327" fill="#A32D2D">&#x2715;</text>
  </g>
  <circle cx="48" cy="322" r="11" fill="#185FA5"/><text x="48" y="326" font-size="12" fill="#fff" text-anchor="middle">3</text>

  <!-- vignettes -->
  <g>
    <rect x="58" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#d3d1c7"/>
    <rect x="94" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#d3d1c7"/>
    <rect x="130" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#185FA5" stroke-width="2"/>
    <rect x="166" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#d3d1c7"/>
    <rect x="202" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#d3d1c7"/>
    <rect x="238" y="352" width="30" height="30" rx="5" fill="#ece9e2" stroke="#d3d1c7"/>
    <rect x="274" y="352" width="30" height="30" rx="5" fill="#f1efe8" stroke="#d3d1c7"/><text x="289" y="371" font-size="11" fill="#888" text-anchor="middle">+6</text>
  </g>
  <circle cx="320" cy="367" r="11" fill="#185FA5"/><text x="320" y="371" font-size="12" fill="#fff" text-anchor="middle">5</text>

  <!-- frise par dates -->
  <text x="58" y="414" font-size="12" fill="#888">frise — où on était</text>
  <line x1="80" y1="442" x2="480" y2="442" stroke="#b4b2a9" stroke-width="2"/>
  <g text-anchor="middle" font-size="12">
    <circle cx="90"  cy="442" r="7" fill="#fff" stroke="#888"/><text x="90"  y="468" fill="#888">2 nov</text><rect x="78" y="420" width="24" height="16" rx="8" fill="#E6F1FB"/><text x="90" y="432" font-size="10" fill="#185FA5">1</text>
    <circle cx="190" cy="442" r="8" fill="#185FA5"/><text x="190" y="468" fill="#185FA5" font-weight="500">3 nov</text><rect x="172" y="418" width="38" height="18" rx="9" fill="#E6F1FB"/><text x="191" y="431" font-size="10" fill="#185FA5">5 +</text>
    <circle cx="290" cy="442" r="7" fill="#fff" stroke="#888"/><text x="290" y="468" fill="#888">6 nov</text><rect x="278" y="420" width="24" height="16" rx="8" fill="#E6F1FB"/><text x="290" y="432" font-size="10" fill="#185FA5">3</text>
    <circle cx="385" cy="442" r="7" fill="#fff" stroke="#888"/><text x="385" y="468" fill="#888">8 nov</text><rect x="373" y="420" width="24" height="16" rx="8" fill="#E6F1FB"/><text x="385" y="432" font-size="10" fill="#185FA5">2</text>
    <circle cx="470" cy="442" r="7" fill="#fff" stroke="#888"/><text x="470" y="468" fill="#888">9 nov</text><rect x="458" y="420" width="24" height="16" rx="8" fill="#E6F1FB"/><text x="470" y="432" font-size="10" fill="#185FA5">1</text>
  </g>
  <circle cx="44" cy="442" r="11" fill="#185FA5"/><text x="44" y="446" font-size="12" fill="#fff" text-anchor="middle">6</text>
  <circle cx="214" cy="423" r="11" fill="#BA7517"/><text x="214" y="427" font-size="12" fill="#fff" text-anchor="middle">7</text>

  <!-- panneau heures -->
  <rect x="50" y="486" width="460" height="104" rx="8" fill="#f1efe8"/>
  <text x="64" y="510" font-size="12" fill="#888">3 nov — déplié par heures (5 photos)</text>
  <line x1="90" y1="552" x2="470" y2="552" stroke="#b4b2a9" stroke-width="2"/>
  <g text-anchor="middle" font-size="11" fill="#888">
    <circle cx="120" cy="552" r="6" fill="#185FA5"/><text x="120" y="574">9h12</text>
    <circle cx="230" cy="552" r="6" fill="#185FA5"/><text x="230" y="574">11h05</text><rect x="218" y="532" width="22" height="15" rx="7" fill="#E6F1FB"/><text x="229" y="543" fill="#185FA5">2</text>
    <circle cx="340" cy="552" r="6" fill="#185FA5"/><text x="340" y="574">14h30</text>
    <circle cx="445" cy="552" r="6" fill="#185FA5"/><text x="445" y="574">19h48</text>
  </g>

  <!-- ===== LEGENDE ===== -->
  <text x="560" y="92" font-size="15" font-weight="500" fill="#2c2c2a">Repères</text>
  <g font-size="13" fill="#444441">
    <circle cx="572" cy="118" r="11" fill="#185FA5"/><text x="572" y="122" font-size="12" fill="#fff" text-anchor="middle">1</text>
    <text x="592" y="115">Carrousel — image courante ;</text><text x="592" y="132">‹ › naviguent ; compteur n/total.</text>

    <circle cx="572" cy="166" r="11" fill="#185FA5"/><text x="572" y="170" font-size="12" fill="#fff" text-anchor="middle">2</text>
    <text x="592" y="163">Plein écran — ouvre la visionneuse</text><text x="592" y="180">(zoom, pan, rotation).</text>

    <circle cx="572" cy="214" r="11" fill="#185FA5"/><text x="572" y="218" font-size="12" fill="#fff" text-anchor="middle">3</text>
    <text x="592" y="211">Barre d'options — télécharger, rotation,</text><text x="592" y="228">zoom, &#x2316; localiser cette photo, supprimer.</text>

    <circle cx="572" cy="262" r="11" fill="#185FA5"/><text x="572" y="266" font-size="12" fill="#fff" text-anchor="middle">4</text>
    <text x="592" y="259">Bouton « Carte » — ouvre la carte du</text><text x="592" y="276">projet (calque photos, filtré projet/groupe).</text>

    <circle cx="572" cy="310" r="11" fill="#185FA5"/><text x="572" y="314" font-size="12" fill="#fff" text-anchor="middle">5</text>
    <text x="592" y="307">Vignettes — toutes les photos ;</text><text x="592" y="324">la courante est surlignée.</text>

    <circle cx="572" cy="358" r="11" fill="#185FA5"/><text x="572" y="362" font-size="12" fill="#fff" text-anchor="middle">6</text>
    <text x="592" y="355">Frise par dates — le chiffre = nombre de</text><text x="592" y="372">photos ce jour-là ; clic = filtrer ce jour.</text>

    <circle cx="572" cy="406" r="11" fill="#BA7517"/><text x="572" y="410" font-size="12" fill="#fff" text-anchor="middle">7</text>
    <text x="592" y="403">« + » — si plusieurs photos le même jour,</text><text x="592" y="420">déplie une frise plus large à l'heure.</text>
  </g>

  <text x="560" y="470" font-size="12" fill="#888">Lecture EXIF persistée à l'upload (table image_meta) —</text>
  <text x="560" y="488" font-size="12" fill="#888">aucune écriture sur les mémos. Réutilise runImageViewer</text>
  <text x="560" y="506" font-size="12" fill="#888">+ runMapDialog. Voir IDEAS.md [PHOTO-TEMPLATE-MEMO] / [PHOTO-MAP].</text>
</svg>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Vos dossiers partagés</title>
<link rel="icon" type="image/svg+xml" href="/share/assets/favicon.svg">
<!-- [HUB-INLINE-EDIT] Quill pour l'édition riche inline (mêmes assets que share.html). -->
<link rel="stylesheet" href="/share/assets/quill.snow.css">
<script src="/share/assets/quill.min.js" defer></script>
<link rel="stylesheet" href="/share/assets/leaflet.css">
<script src="/share/assets/leaflet.js" defer></script>
<link rel="stylesheet" href="/share/assets/MarkerCluster.css">
<link rel="stylesheet" href="/share/assets/MarkerCluster.Default.css">
<script src="/share/assets/leaflet.markercluster.js" defer></script>
<script>
  try { document.documentElement.setAttribute('data-theme',
    localStorage.getItem('theme') === 'light' ? 'light' : 'dark'); } catch (e) {}
</script>
<style>
:root {
  --bg: #0e1217; --panel: #161d25; --panel-2: #212b35; --text: #e8eef5;
  --muted: #9aa7b4; --accent: #4fc3f7; --green: #4caf50; --border: #283340;
  --danger: #ff8a80; --warn: #ffb74d; --assignee: #80cbc4; --gray: #6b7785;
  --radius: 10px; --shadow: 0 1px 2px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.18);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.4);
}
:root[data-theme="light"] {
  --bg: #eef1f5; --panel: #ffffff; --panel-2: #eef2f7; --text: #1b2531;
  --muted: #5c6b7a; --accent: #0288d1; --green: #2e7d32; --border: #d3dce5; --danger: #e53935;
  --warn: #ef6c00; --assignee: #00897b; --gray: #97a4b2;
  --shadow: 0 1px 2px rgba(16,30,50,0.08), 0 2px 8px rgba(16,30,50,0.06);
  --shadow-lg: 0 10px 30px rgba(16,30,50,0.18);
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; }
a { color: var(--accent); }
button { font: inherit; cursor: pointer; }
.btn { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 0.4rem 0.7rem; }
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #06212e; border: none; font-weight: 600; }
.btn.danger { color: var(--danger); border-color: var(--danger); }

/* ── écran code ── */
.codewrap { max-width: 460px; margin: 0 auto; padding: 3rem 1.1rem; }
.codewrap h1 { font-size: 1.3rem; }
.codewrap .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.4rem; }
.codewrap input { width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 1.1rem; letter-spacing: 0.25em;
  text-align: center; padding: 0.6rem; }
.codewrap .err { color: var(--danger); min-height: 1.1em; font-size: 0.85rem; margin-top: 0.5rem; }

/* ── dashboard ── */
header { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
  padding: 0.6rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
header h1 { font-size: 1.05rem; margin: 0; flex-shrink: 0; }
header .spacer { flex: 1; }
#search { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 0.4rem 0.6rem; min-width: 8rem; }
.layout { display: flex; align-items: flex-start; gap: 0; }
#sidebar { width: 240px; flex-shrink: 0; padding: 0.8rem 0.6rem; border-right: 1px solid var(--border);
  min-height: calc(100vh - 52px); }
#sidebar .sitem { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.5rem;
  border-radius: 7px; cursor: pointer; font-size: 0.9rem; }
#sidebar .sitem:hover { background: var(--panel-2); }
#sidebar .sitem.active { background: var(--panel-2); font-weight: 600; }
#sidebar .sitem .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#sidebar .sitem .ro { font-size: 0.66rem; color: var(--muted); flex-shrink: 0; }
/* [SIDEBAR-TREE] enfants dans un conteneur : indentation fixe ~17px/niveau + ligne
   guide verticale CSS (plus de connecteurs texte — dérive monospace avec les emojis). */
#sidebar .sb-kids { margin-left: 0.8rem; padding-left: 0.25rem; border-left: 1px solid var(--border); }
#sidebar h4 { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.04em; margin: 1rem 0 0.3rem; }
main { flex: 1; min-width: 0; padding: 1rem; }
.empty { color: var(--muted); font-style: italic; text-align: center; padding: 2rem 0; }
.addbar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.addbar input[type=text] { flex: 1; min-width: 9rem; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 0.45rem 0.6rem; }
.addbar select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.45rem; }

.task { background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) 0; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; box-shadow: var(--shadow); }
.task.done { opacity: 0.7; }
.task-row { display: flex; align-items: flex-start; gap: 0.6rem; flex-wrap: wrap; }
.task-check { width: 1.2rem; height: 1.2rem; border-radius: 50%; border: 2px solid var(--muted);
  background: none; flex-shrink: 0; margin-top: 0.1rem; color: transparent; font-size: 0.7rem; line-height: 1; padding: 0; }
.task.done .task-check { background: var(--green); border-color: var(--green); color: #fff; }
.task-check[disabled] { cursor: default; opacity: 0.5; }
.task-content { flex: 1; min-width: 0; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; cursor: pointer; }
.task-content.clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.task-title { font-weight: 600; margin-bottom: 0.15rem; }
.task.done .task-title, .task.done .task-content { text-decoration: line-through; color: var(--muted); }
.task-content a { color: var(--accent); }
.task-content li[data-list] { list-style: none; display: flex; align-items: flex-start; gap: 0.5rem; padding-left: 0; }
.task-content li[data-list]::before { content: ''; flex: 0 0 auto; box-sizing: border-box; font-size: 0.85em;
  width: 1em; height: 1em; margin-top: 0.25em; border: 2px solid var(--muted); border-radius: 4px; }
.task-content li[data-list="checked"]::before { content: '✓'; display: inline-flex; align-items: center;
  justify-content: center; background: var(--green); border-color: var(--green); color: #fff; line-height: 1; }
.task-content li[data-list]:empty::before { display: none; }
.badges { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; flex-basis: 100%; margin-left: 1.8rem; }
.badge { font-size: 0.72rem; padding: 0.12rem 0.45rem; border-radius: 4px; background: var(--panel-2);
  color: var(--muted); white-space: nowrap; }
.badge.due-late { color: var(--danger); } .badge.due-today { color: var(--warn); }
.prio-chip { font-size: 0.66rem; font-weight: 700; border-radius: 4px; padding: 0.05rem 0.4rem; }
.asg-av { width: 1.3rem; height: 1.3rem; border-radius: 50%; display: inline-flex; align-items: center;
  justify-content: center; font-size: 0.58rem; font-weight: 700; background: var(--panel-2);
  color: var(--assignee); border: 1px solid var(--assignee); }
.lock { color: var(--muted); font-size: 0.78rem; }
.thumbs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0 0 1.8rem; }
.thumbs img { height: 70px; max-width: 120px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: zoom-in; }

/* ── arbre Plan ── */
.tree-row { display: flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0.3rem; border-radius: 6px; }
.tree-row:hover { background: var(--panel-2); }
.tree-pre { color: var(--muted); white-space: pre; font-family: ui-monospace, monospace; flex-shrink: 0; }
.tree-proj { font-weight: 600; cursor: pointer; }
.tree-memo { cursor: pointer; }
.tree-memo .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* [AGENDA] vue calendrier mensuelle — grille CSS maison (invariant 6), tokens (invariant 9) */
.ag-head { display: flex; align-items: center; gap: 0.6rem; margin: 0 0 0.6rem; flex-wrap: wrap; }
.ag-head h2 { margin: 0; font-size: 1.05rem; text-transform: capitalize; }
.ag-nav { display: flex; gap: 0.3rem; margin-left: auto; }
.ag-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.ag-dow { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; text-align: center; padding: 0.15rem 0; }
.ag-cell { min-height: 88px; min-width: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.25rem 0.3rem; display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
.ag-cell.out { opacity: 0.4; background: transparent; cursor: default; }
.ag-cell.today { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.ag-cell.sel { background: var(--panel-2); }
.ag-cell.droptarget { outline: 1px dashed var(--accent); }
.ag-num { font-size: 0.7rem; color: var(--muted); }
.ag-cell.today .ag-num { color: var(--accent); font-weight: 700; }
.ag-chip { display: flex; align-items: center; gap: 0.3rem; min-width: 0; font-size: 0.7rem; background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 0.05rem 0.4rem; }
.ag-chip .ag-t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ag-dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0; }
.ag-more { font-size: 0.68rem; color: var(--muted); padding-left: 0.2rem; }
.ag-day-panel { margin-top: 0.9rem; }
.ag-day-panel h3 { margin: 0 0 0.4rem; font-size: 0.9rem; text-transform: capitalize; }
.ag-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.5rem; border-radius: 8px; cursor: pointer; min-width: 0; }
.ag-row:hover { background: var(--panel-2); }
.ag-time { width: 54px; flex-shrink: 0; font-size: 0.75rem; color: var(--muted); }
.ag-row .ag-t { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ag-empty { color: var(--muted); font-size: 0.82rem; font-style: italic; padding: 0.3rem 0.5rem; }

dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 1.2rem; width: min(620px, 94vw); }
dialog::backdrop { background: rgba(6,9,12,0.62); }
.dlg-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.9rem; }
.me-label { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 600; margin: 0.7rem 0 0.2rem; }
#ed input[type=text], #ed textarea, #ed input[type=date], #ed input[type=time] {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; padding: 0.4rem 0.55rem; }
#ed textarea { min-height: 6rem; resize: vertical; }
.prio-btn { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; padding: 0.12rem 0.5rem; font-size: 0.78rem; }
.chip { display: inline-flex; align-items: center; gap: 0.25rem; background: var(--panel-2);
  border: 1px solid var(--border); border-radius: 12px; padding: 0.1rem 0.5rem; font-size: 0.8rem; color: var(--assignee); }
.comment { display: flex; gap: 0.5rem; font-size: 0.82rem; padding: 0.3rem 0.5rem; background: var(--bg); border-radius: 6px; margin-top: 0.3rem; }
.comment .ca { font-weight: 600; flex-shrink: 0; }
.comment .cb { flex: 1; min-width: 0; white-space: pre-wrap; overflow-wrap: anywhere; }
#ed-context { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
/* [HUB-INLINE-EDIT] éditeur Quill inline */
#ed-qwrap .ql-toolbar { border-color: var(--border); border-top-left-radius: 6px; border-top-right-radius: 6px; }
#ed-qwrap .ql-container { border-color: var(--border); border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; min-height: 7rem; font: inherit; font-size: 0.92rem; }
#ed-qwrap .ql-editor { min-height: 7rem; }
#ed-qwrap .ql-editor.ql-blank::before { color: var(--muted); font-style: normal; }
#ed-qwrap.ro .ql-toolbar { display: none; }
#ed-qwrap.ro .ql-container { border-top-left-radius: 6px; border-top-right-radius: 6px; }
[data-theme="dark"] #ed-qwrap .ql-snow .ql-stroke { stroke: var(--muted); }
[data-theme="dark"] #ed-qwrap .ql-snow .ql-fill { fill: var(--muted); }
[data-theme="dark"] #ed-qwrap .ql-picker { color: var(--muted); }
.mention { color: var(--assignee); background: rgba(128,203,196,0.14); border-radius: 4px; padding: 0 3px; font-weight: 600; }
.me-crumb { display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem; font-size: 0.82rem; }
.me-crumb .me-sep { color: var(--muted); }
.me-crumb .me-crumb-node { max-width: 12rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.me-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

/* [PHOTO-VIEWER-MOBILE] Visionneuse runImageViewer (classes .iv-*) — alignée sur la charte
   des cards, identique à index.html/share.html (parité). */
.iv-wrap { position: relative; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
.iv-stage { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; width: 92vw; max-width: 1100px; height: 78vh; overflow: hidden; touch-action: none; }
.iv-img { position: relative; z-index: 1; max-width: 100%; max-height: 100%; border-radius: 8px; display: block; user-select: none; -webkit-user-drag: none; transition: transform 0.12s ease; }
.iv-stage.zoomed { cursor: grab; } .iv-stage.grabbing { cursor: grabbing; }
.iv-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 30; width: 2.6rem; height: 2.6rem;
  border-radius: 50%; border: none; background: rgba(0,0,0,0.55); color: #fff; font-size: 1.6rem; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center; }
.iv-nav:hover { background: rgba(0,0,0,0.8); }
.iv-prev { left: 0.5rem; } .iv-next { right: 0.5rem; }
.iv-indicator { position: absolute; top: 0.6rem; left: 50%; transform: translateX(-50%); z-index: 30;
  background: rgba(0,0,0,0.6); color: #fff; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.8rem; }
.iv-exif { position: absolute; bottom: 0.6rem; left: 0.6rem; z-index: 30; max-width: 80%; background: rgba(0,0,0,0.6);
  color: #fff; padding: 0.2rem 0.55rem; border-radius: 8px; font-size: 0.78rem; backdrop-filter: blur(4px);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.iv-bar { position: static; z-index: 30; display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 0.45rem 0.6rem; border-radius: 12px; }
.iv-btn { min-width: 44px; min-height: 36px; padding: 0.2rem 0.55rem; border-radius: 9px; border: 1px solid var(--border);
  background: var(--panel-2); color: var(--muted); font-size: 1.05rem; line-height: 1; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
.iv-btn:hover { color: var(--text); background: var(--panel); border-color: var(--muted); }
.iv-btn.iv-accent { color: var(--accent); border-color: var(--accent); }
.iv-del { background: var(--danger); color: #fff; border-color: var(--danger); }

@media (max-width: 900px) {
  /* Boutons photo carrés homogènes (cf. index.html/share.html). */
  .iv-bar { gap: 0.3rem; padding: 0.4rem 0.5rem; }
  .iv-btn { width: 44px; height: 44px; min-width: 0; min-height: 0; padding: 0; font-size: 1.2rem; }
  .iv-nav { width: 2.6rem; height: 2.6rem; min-width: 0; min-height: 0; font-size: 1.4rem; }
}
@media (max-width: 760px) {
  .layout { flex-direction: column; }
  #sidebar { width: 100%; min-height: 0; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>
<!-- écran code -->
<div class="codewrap" id="code-screen">
  <h1>📂 Vos dossiers partagés</h1>
  <p class="sub">Entrez votre code à 4 chiffres pour accéder à tous vos dossiers.</p>
  <input id="pin" type="text" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••">
  <button class="btn primary" id="pin-btn" style="width:100%;margin-top:0.8rem">Accéder</button>
  <div class="err" id="hub-error"></div>
</div>

<!-- dashboard -->
<div id="dash" hidden>
  <header>
    <h1 id="dash-name">📂 Mes dossiers</h1>
    <input id="search" type="text" placeholder="Rechercher…" autocomplete="off">
    <span class="spacer"></span>
    <button class="btn" id="btn-plan">🌳 Plan</button>
    <button class="btn" id="btn-agenda">📆 Agenda</button>
    <button class="btn" id="btn-map">🗺 Carte</button>
    <button class="btn" id="theme-btn" title="Thème">🌓</button>
  </header>
  <div class="layout">
    <nav id="sidebar"></nav>
    <main id="board"></main>
  </div>
</div>

<!-- éditeur mémo -->
<dialog id="ed">
  <div id="ed-context"></div>
  <label class="me-label">Titre</label>
  <input id="ed-title" type="text" maxlength="200" placeholder="Titre (optionnel)">
  <label class="me-label">Contenu</label>
  <div id="ed-qwrap"><div id="ed-qeditor"></div></div>
  <label class="me-label">Échéance</label>
  <div style="display:flex;gap:0.4rem"><input id="ed-date" type="date"><input id="ed-time" type="time"></div>
  <label class="me-label">Priorité</label>
  <div id="ed-prio" style="display:flex;gap:0.35rem;flex-wrap:wrap"></div>
  <label class="me-label">Assigné·es</label>
  <div id="ed-people" style="display:flex;gap:0.35rem;flex-wrap:wrap;align-items:center"></div>
  <label class="me-label">Images</label>
  <div id="ed-images" style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center"></div>
  <label class="me-label">Commentaires</label>
  <div id="ed-comments"></div>
  <div class="dlg-actions">
    <button class="btn danger" id="ed-del" style="margin-right:auto">🗑 Corbeille</button>
    <button class="btn" id="ed-cancel">Fermer</button>
    <button class="btn primary" id="ed-save">Enregistrer</button>
  </div>
</dialog>

<!-- notify / confirm -->
<dialog id="notify-dialog"><h3 id="notify-title">Info</h3>
  <p id="notify-msg" style="margin:0 0 1rem;color:var(--muted);white-space:pre-wrap"></p>
  <div class="dlg-actions"><button class="btn primary" id="notify-ok">OK</button></div></dialog>
<dialog id="confirm-dialog"><h3 id="confirm-title">Confirmer</h3>
  <p id="confirm-msg" style="margin:0 0 1rem;color:var(--muted);white-space:pre-wrap"></p>
  <div class="dlg-actions"><button class="btn" id="confirm-no">Annuler</button>
  <button class="btn danger" id="confirm-yes">Confirmer</button></div></dialog>

<!-- carte (runMapDialog) -->
<dialog id="map-dialog" style="width:min(920px,96vw);padding:0.9rem">
  <h3 id="map-title" style="margin:0 0 0.6rem;font-size:1rem">🗺 Carte</h3>
  <div id="map-subbar" style="display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;margin:0 0 0.45rem"></div>
  <div id="map-groupbar" style="display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;margin:0 0 0.55rem"></div>
  <div id="map-selbar" style="display:none"></div>
  <div style="display:flex;gap:0.6rem;flex-wrap:wrap">
    <div id="map-el" style="flex:1;min-width:260px;height:min(60vh,460px);border-radius:8px;background:var(--panel-2)"></div>
    <div id="map-list" style="width:230px;max-height:min(60vh,460px);overflow-y:auto;display:flex;flex-direction:column;gap:0.3rem"></div>
  </div>
  <div class="dlg-actions"><button class="btn primary" id="map-close">Fermer</button></div>
</dialog>
<dialog id="lightbox" style="padding:0;border:none;background:transparent;max-width:96vw;max-height:96vh"></dialog>

{% include 'partials/_shared.js.html' %}
<script>
// [HUB-ROUTE-PREFIX] URL = /share/hub/<token> → le token est le dernier segment.
const HUB_TOKEN = location.pathname.split('/').filter(Boolean).pop();
const HUB_BASE = '/share/hub/' + HUB_TOKEN;
let DATA = null, FOCUS = null, VIEW = 'board';
let activeMap = null;  // [HUB-MAP-FIX] état carte attendu par runMapDialog (miroir index/share.html)
const themeBtn = document.getElementById('theme-btn');

// ── helpers minimaux (notify/confirm/icon/announce/sanitize) ──
function icon() { return document.createElement('span'); }   // hub n'utilise pas d'icônes SVG
function announce() {}
const notifyDialog = document.getElementById('notify-dialog');
document.getElementById('notify-ok').addEventListener('click', () => notifyDialog.close());
function notify(msg, opts) { document.getElementById('notify-title').textContent = (opts && opts.error) ? 'Erreur' : 'Info';
  document.getElementById('notify-msg').textContent = msg; notifyDialog.showModal(); }
const confirmDialog = document.getElementById('confirm-dialog');
function confirmPopin(msg, opts) { return new Promise(res => {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-yes').textContent = (opts && opts.okLabel) || 'Confirmer';
  const yes = () => { cleanup(); res(true); }, no = () => { cleanup(); res(false); };
  function cleanup() { confirmDialog.close(); by.removeEventListener('click', yes); bn.removeEventListener('click', no); }
  const by = document.getElementById('confirm-yes'), bn = document.getElementById('confirm-no');
  by.addEventListener('click', yes); bn.addEventListener('click', no); confirmDialog.showModal();
}); }
function sanitize(html) {
  const tpl = document.createElement('template'); tpl.innerHTML = html;
  tpl.content.querySelectorAll('script,style,iframe,object,embed,link,meta,form').forEach(n => n.remove());
  tpl.content.querySelectorAll('*').forEach(n => { [...n.attributes].forEach(a => {
    if (/^on/i.test(a.name)) n.removeAttribute(a.name);
    if ((a.name === 'href' || a.name === 'src') && /^\s*javascript:/i.test(a.value)) n.removeAttribute(a.name);
  }); if (n.tagName === 'A') { n.setAttribute('target', '_blank'); n.setAttribute('rel', 'noopener noreferrer'); } });
  return tpl.content;
}
function isRich(c) { return /<(p|div|ul|ol|li|br|strong|em|u|s|a|h[1-6]|blockquote|pre|code|span)[\s>/]/i.test(c || ''); }
function linkify(text) { const frag = document.createDocumentFragment(); const re = /https?:\/\/[^\s<>"]+/g;
  let last = 0, m; while ((m = re.exec(text)) !== null) { frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    const a = el('a', '', m[0].replace(/^https?:\/\//, '')); a.href = m[0]; a.target = '_blank'; a.rel = 'noopener noreferrer';
    frag.appendChild(a); last = m.index + m[0].length; } frag.appendChild(document.createTextNode(text.slice(last))); return frag; }
function stripTags(html) { const t = document.createElement('template'); t.innerHTML = html || ''; return (t.content.textContent || '').replace(/\s+/g, ' ').trim(); }
function textOn(hex) { const c = (hex || '').replace('#', ''); if (c.length < 6) return '#fff';
  const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b) > 150 ? '#15191e' : '#fff'; }
const todayStr = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };

setTheme((() => { try { return localStorage.getItem('theme'); } catch (e) { return null; } })() === 'light' ? 'light' : 'dark');
themeBtn.addEventListener('click', () => { const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  setTheme(next); try { localStorage.setItem('theme', next); } catch (e) {} });

// ── écritures routées par item : token de l'item + son guest_token ──
function gtFor(token) { try { return localStorage.getItem('dashguest:' + token) || ''; } catch (e) { return ''; } }
// [HUB-TOKEN-REFRESH] (re)pose les guest_token par dossier — appelé à chaque chargement.
function persistFolderTokens(folders) {
  (folders || []).forEach(f => { if (f.token && f.guest_token) { try { localStorage.setItem('dashguest:' + f.token, f.guest_token); } catch (e) {} } });
}
// Rafraîchit les jetons depuis le serveur (preuve déjà détenue). Renvoie true si OK.
async function refreshTokens() {
  try {
    const r = await fetch(HUB_BASE + '/data', { headers: { 'X-Guest-Token': hubProof() } });
    if (!r.ok) return false;
    const d = await r.json(); persistFolderTokens(d.folders); return true;
  } catch (e) { return false; }
}
async function api(token, path, opts, _retried) {
  opts = opts || {}; opts.headers = Object.assign({ 'X-Guest-Token': gtFor(token) }, opts.headers || {});
  if (opts.body && !(opts.body instanceof FormData)) opts.headers['Content-Type'] = 'application/json';
  const r = await fetch('/share/' + token + path, opts);
  // 403 alors qu'on a un can_edit côté UI → jeton manquant/périmé (ex. dossier ajouté après coup).
  // Rafraîchir les jetons en silence et réessayer UNE fois avant d'alerter (jamais « lecture seule »).
  if (r.status === 403 && !_retried) {
    if (await refreshTokens() && gtFor(token)) return api(token, path, opts, true);
  }
  if (r.status === 403) notify('Session expirée — re-saisis ton code.', { error: true });
  return r;
}
async function putMemo(m, body) { const r = await api(m.share_token, '/memo/' + m.id, { method: 'PUT', body: JSON.stringify(body) }); if (r.ok) await reload(); return r; }

// ── proof header pour /share/hub/<token>/data ──
function hubProof() { try { return localStorage.getItem('dashhubproof:' + HUB_TOKEN) || ''; } catch (e) { return ''; } }

async function approve() {
  const pin = document.getElementById('pin').value.trim();
  const errEl = document.getElementById('hub-error');
  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'Le code fait 4 chiffres.'; return; }
  errEl.textContent = '';
  const r = await fetch(HUB_BASE + '/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); errEl.textContent = e.error || 'code invalide';
    document.getElementById('pin').value = ''; document.getElementById('pin').focus(); return; }
  const data = await r.json();
  persistFolderTokens(data.folders);
  if (data.folders && data.folders.length) { try { localStorage.setItem('dashhubproof:' + HUB_TOKEN, data.folders[0].guest_token); } catch (e) {} }
  try { localStorage.setItem('dashhubfolders:' + HUB_TOKEN, JSON.stringify(data.folders || [])); } catch (e) {}
  await loadDash(data.folders || []);
}
document.getElementById('pin-btn').addEventListener('click', approve);
document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') approve(); });

// ── chargement du dashboard agrégé (repli lanceur en cas d'échec) ──
async function loadDash(knownFolders) {
  // [HUB-SESSION] toujours tenter /data : le cookie HttpOnly part tout seul (same-origin) ;
  // le header X-Guest-Token reste en repli si le localStorage l'a encore. Sans session → 403 → écran code.
  const proof = hubProof();
  let data;
  try {
    const r = await fetch(HUB_BASE + '/data', { headers: proof ? { 'X-Guest-Token': proof } : {} });
    if (r.status === 403) { showCode(); return; }
    if (!r.ok) throw new Error('data');
    data = await r.json();
  } catch (e) {
    fallbackLauncher(knownFolders); return;   // dégradation gracieuse → lanceur
  }
  persistFolderTokens(data.folders);  // [HUB-TOKEN-REFRESH] dossiers ajoutés après coup deviennent éditables
  DATA = data;
  document.getElementById('code-screen').hidden = true;
  document.getElementById('dash').hidden = false;
  if (data.name) document.getElementById('dash-name').textContent = '📂 ' + data.name;
  render();
}
async function reload() {
  const r = await fetch(HUB_BASE + '/data', { headers: { 'X-Guest-Token': hubProof() } });
  if (r.ok) { DATA = await r.json(); persistFolderTokens(DATA.folders); render(); }
}
function showCode() { document.getElementById('dash').hidden = true; document.getElementById('code-screen').hidden = false;
  document.getElementById('pin').focus(); }

// ── repli lanceur (liste de liens) ──
function fallbackLauncher(folders) {
  folders = folders || (() => { try { return JSON.parse(localStorage.getItem('dashhubfolders:' + HUB_TOKEN) || '[]'); } catch (e) { return []; } })();
  document.getElementById('code-screen').hidden = true;
  const dash = document.getElementById('dash'); dash.hidden = false;
  document.getElementById('sidebar').hidden = true;
  const board = document.getElementById('board'); board.innerHTML = '';
  board.appendChild(el('p', { class: 'sub', attrs: { style: 'color:var(--muted)' }, text: 'Vue agrégée indisponible — voici vos dossiers :' }));
  (folders || []).forEach(f => {
    const a = el('a', { attrs: { href: f.url, style: 'display:block;padding:0.7rem 0.9rem;margin-bottom:0.6rem;background:var(--panel);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:inherit' } });
    a.textContent = (f.emoji ? f.emoji + ' ' : '') + (f.label || '(dossier)') + (f.can_edit ? '  ✏️' : '  👁');
    board.appendChild(a);
  });
}

// ── données scopées (focus + recherche) ──
function projChildren(pid) { return (DATA.projects || []).filter(p => p.parent_id === pid); }
function projDescendants(pid) { const out = []; const w = (id) => projChildren(id).forEach(c => { out.push(c.id); w(c.id); }); w(pid); return out; }
function focusedMemos() {
  let ms = DATA.memos || [];
  if (FOCUS != null) { const set = new Set([FOCUS, ...projDescendants(FOCUS)]); ms = ms.filter(m => set.has(m.project_id)); }
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  if (q) ms = ms.filter(m => ((m.title || '') + ' ' + stripTags(m.content) + ' ' + (m.assignees || []).join(' ')).toLowerCase().includes(q));
  return ms;
}
function prioOf(id) { return (DATA.priorities || []).find(p => p.id === id) || null; }
function projById(id) { return (DATA.projects || []).find(p => p.id === id) || null; }

// ── rendu ──
function render() {
  renderSidebar();
  if (VIEW === 'plan') renderPlan();
  else if (VIEW === 'agenda') renderAgendaHub();
  else renderBoard();
}

function renderSidebar() {
  const nav = document.getElementById('sidebar'); nav.hidden = false; nav.innerHTML = '';
  const all = el('div', { class: 'sitem' + (FOCUS == null ? ' active' : '') });
  all.appendChild(el('span', { text: '📂' }));
  all.appendChild(el('span', { class: 'nm', text: 'Tout' }));
  all.addEventListener('click', () => { FOCUS = null; render(); });
  nav.appendChild(all);
  nav.appendChild(el('h4', { text: 'DOSSIERS PARTAGÉS' }));
  // racines = projets sans parent dans l'union (chaque share projet) ; mémos isolés listés à part
  const roots = (DATA.projects || []).filter(p => p.parent_id == null);
  // [SIDEBAR-TREE] arbre à indentation fixe (.sb-kids, ligne guide CSS) — plus de
  // connecteurs texte. Icône unique : emoji, sinon pastille couleur. Nom en title.
  const walk = (p, wrap) => {
    const row = el('div', { class: 'sitem' + (FOCUS === p.id ? ' active' : '') });
    if (p.emoji) row.appendChild(el('span', { text: p.emoji }));
    else { const d = el('span', { attrs: { style: 'width:0.5rem;height:0.5rem;border-radius:50%;flex-shrink:0;background:' + (usableProjColor(p.color) || 'var(--gray)') } }); row.appendChild(d); }
    row.appendChild(el('span', { class: 'nm', text: p.name, attrs: { title: p.name } }));
    if (!p.can_edit) row.appendChild(el('span', { class: 'ro', text: '👁' }));
    row.addEventListener('click', () => { FOCUS = p.id; render(); });
    wrap.appendChild(row);
    const kids = projChildren(p.id);
    if (kids.length) {
      const kw = el('div', { class: 'sb-kids' });
      kids.forEach(c => walk(c, kw));
      wrap.appendChild(kw);
    }
  };
  roots.forEach(p => walk(p, nav));
  if (!roots.length && !(DATA.memos || []).length) nav.appendChild(el('div', { class: 'empty', text: 'Aucun dossier.' }));

  // [GUEST-RESEND-LINK] bouton discret : se renvoyer lien + code à l'adresse DÉJÀ
  // enregistrée (le serveur force le destinataire — rien à saisir). Uniquement dans
  // le dash connecté (pas l'écran code : pas de preuve à ce stade), masqué si SMTP off.
  if (DATA && DATA.smtp_enabled) {
    const btn = el('div', {
      class: 'sitem',
      attrs: { style: 'margin-top:1rem;color:var(--muted);font-size:0.8rem', title: 'Recevoir ce lien et le code à votre adresse e-mail enregistrée' },
    });
    btn.appendChild(el('span', { text: '📧' }));
    btn.appendChild(el('span', { class: 'nm', text: 'Recevoir mon lien par e-mail' }));
    btn.addEventListener('click', async () => {
      // Le cookie de session part seul (path scopé) ; header en repli si dispo.
      const proof = hubProof();
      const r = await fetch(HUB_BASE + '/send-link', { method: 'POST', headers: proof ? { 'X-Guest-Token': proof } : {} });
      const e = await r.json().catch(() => ({}));
      if (r.ok) notify('Envoyé ! Vérifie ta boîte mail (et les spams).');
      else notify(e.error || 'Envoi impossible.', { error: true });
    });
    nav.appendChild(btn);
  }
}

function dueInfo(m) {
  if (!m.due_date || m.done) return null;
  const t = todayStr();
  let cls = '', lbl = new Date(m.due_date + 'T00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  if (m.due_date < t) cls = 'due-late'; else if (m.due_date === t) cls = 'due-today';
  const tm = fmtMemoTime(m.due_time);
  return { cls, label: '📅 ' + lbl + (tm ? ' · ' + tm : '') };
}

function memoCard(m) {
  const task = el('div', { class: 'task' + (m.done ? ' done' : '') });
  const prio = prioOf(m.priority);
  let leftCol = '';
  if (!m.done) { leftCol = (prio && prio.color) ? prio.color : (usableProjColor((projById(m.project_id) || {}).color) || ''); }
  if (leftCol) task.style.borderLeftColor = leftCol;
  const row = el('div', { class: 'task-row' });
  const check = el('button', { class: 'task-check', text: '✓', attrs: m.can_edit ? { title: m.done ? 'Rouvrir' : 'Terminer' } : { disabled: '', title: 'Lecture seule' } });
  if (m.can_edit) check.addEventListener('click', () => putMemo(m, { done: !m.done }));
  row.appendChild(check);
  const content = el('div', { class: 'task-content clamp' });
  if (m.title) { const tl = el('div', { class: 'task-title' }); if (m.emoji) tl.appendChild(el('span', { text: m.emoji + ' ' })); tl.appendChild(el('span', { text: m.title })); content.appendChild(tl); }
  if (m.content) { const c = el('div'); if (isRich(m.content)) c.appendChild(sanitize(m.content)); else c.appendChild(linkify(m.content)); content.appendChild(c);
    if (m.can_edit) wireChecklist(content, m); }
  content.addEventListener('click', () => openEditor(m));
  row.appendChild(content);
  const badges = el('div', { class: 'badges' });
  if (prio && prio.color && !m.done) badges.appendChild(el('span', { class: 'prio-chip', text: prio.name, attrs: { style: 'background:' + prio.color + ';color:' + textOn(prio.color) } }));
  const due = dueInfo(m); if (due) badges.appendChild(el('span', { class: 'badge ' + due.cls, text: due.label }));
  if (m.project) badges.appendChild(el('span', { class: 'badge', text: '📁 ' + m.project }));
  (m.assignees || []).forEach(a => badges.appendChild(el('span', { class: 'asg-av', text: initials(a), attrs: { title: a } })));
  if (!m.can_edit) badges.appendChild(el('span', { class: 'lock', text: '🔒 lecture' }));
  if (badges.children.length) row.appendChild(badges);
  task.appendChild(row);
  if ((m.images || []).length) {
    const th = el('div', { class: 'thumbs' });
    m.images.forEach(name => { const img = el('img', { attrs: { src: '/share/' + m.share_token + '/image/' + name, loading: 'lazy' } });
      img.addEventListener('click', () => runImageViewer({ images: m.images, startIndex: m.images.indexOf(name),
        imageUrl: n => '/share/' + m.share_token + '/image/' + n, downloadUrl: n => '/share/' + m.share_token + '/image/' + n,
        exifUrl: n => '/share/' + m.share_token + '/image-exif/' + n }));
      th.appendChild(img); });
    task.appendChild(th);
  }
  return task;
}

function wireChecklist(container, m) {
  container.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]').forEach((li, i) => {
    li.style.cursor = 'pointer'; li.title = 'Cocher / décocher';
    li.addEventListener('click', (e) => { e.stopPropagation();
      const tpl = document.createElement('template'); tpl.innerHTML = m.content;
      const items = tpl.content.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]');
      if (!items[i]) return; items[i].setAttribute('data-list', items[i].getAttribute('data-list') === 'checked' ? 'unchecked' : 'checked');
      putMemo(m, { content: tpl.innerHTML });
    });
  });
}

function renderBoard() {
  const board = document.getElementById('board'); board.innerHTML = '';
  board.appendChild(addBar());
  const spb = subProjBar(); if (spb) board.appendChild(spb); // [GUEST-SUBPROJECT]
  const ms = focusedMemos().slice().sort((a, b) => (a.done - b.done) || (a.due_date || '').localeCompare(b.due_date || ''));
  if (!ms.length) { board.appendChild(el('div', { class: 'empty', text: 'Aucun mémo ici.' })); return; }
  ms.forEach(m => board.appendChild(memoCard(m)));
}

function editableProjects() { return (DATA.projects || []).filter(p => p.can_edit); }

// [GUEST-SUBPROJECT] création de sous-projet depuis le hub (parité share.html) :
// routée vers le POST /share/<share_token>/projects du dossier PARENT choisi —
// revalidé serveur (scope du partage + can_edit + invité approuvé), zéro route
// nouvelle (invariant 5). parent_id = le projet choisi (le serveur ne l'accepte
// que dans les descendants du partage).
function subProjBar() {
  const eps = editableProjects();
  if (!eps.length) return null;
  const bar = el('div', { class: 'addbar' });
  const inp = el('input', { attrs: { type: 'text', placeholder: '+ Nouveau sous-projet (nom)…' } });
  const sel = el('select', { attrs: { title: 'Dossier parent du sous-projet' } });
  eps.forEach(p => sel.appendChild(el('option', { attrs: { value: p.id }, text: 'dans ' + (p.emoji ? p.emoji + ' ' : '') + p.name })));
  if (FOCUS != null && eps.some(p => p.id === FOCUS)) sel.value = String(FOCUS);
  const add = async () => {
    const name = inp.value.trim(); if (!name) return;
    const pid = Number(sel.value); const proj = projById(pid); if (!proj) return;
    const r = await api(proj.share_token, '/projects', { method: 'POST', body: JSON.stringify({ name, parent_id: pid }) });
    if (r.ok) { inp.value = ''; await reload(); }
    else { const e = await r.json().catch(() => ({})); notify(e.error || 'Création impossible', { error: true }); }
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  bar.append(inp, sel, el('button', { class: 'btn', text: '📁 Créer', on: { click: add } }));
  return bar;
}

function addBar() {
  const bar = el('div', { class: 'addbar' });
  const eps = editableProjects();
  if (!eps.length) { bar.appendChild(el('span', { attrs: { style: 'color:var(--muted);font-size:0.85rem' }, text: 'Aucun dossier modifiable — lecture seule.' })); return bar; }
  const inp = el('input', { attrs: { type: 'text', placeholder: '+ Nouveau mémo (titre)…' } });
  const sel = el('select');
  eps.forEach(p => sel.appendChild(el('option', { attrs: { value: p.id }, text: (p.emoji ? p.emoji + ' ' : '') + p.name })));
  if (FOCUS != null && eps.some(p => p.id === FOCUS)) sel.value = String(FOCUS);
  const add = async () => {
    const title = inp.value.trim(); if (!title) return;
    const pid = Number(sel.value); const proj = projById(pid); if (!proj) return;
    const r = await api(proj.share_token, '/memos', { method: 'POST', body: JSON.stringify({ title, project_id: pid }) });
    if (r.ok) { inp.value = ''; await reload(); } else { const e = await r.json().catch(() => ({})); notify(e.error || 'échec', { error: true }); }
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  bar.append(inp, sel, el('button', { class: 'btn primary', text: 'Ajouter', on: { click: add } }));
  return bar;
}

function renderPlan() {
  const board = document.getElementById('board'); board.innerHTML = '';
  board.appendChild(addBar());
  const spb = subProjBar(); if (spb) board.appendChild(spb); // [GUEST-SUBPROJECT]
  const roots = (DATA.projects || []).filter(p => p.parent_id == null);
  const wrap = el('div');
  const memosOf = (pid) => focusedMemos().filter(m => m.project_id === pid);
  const node = (p, anc, last) => {
    const row = el('div', { class: 'tree-row tree-proj' });
    row.appendChild(el('span', { class: 'tree-pre', text: treeConnector(anc, last) }));
    if (p.emoji) row.appendChild(el('span', { text: p.emoji }));
    row.appendChild(el('span', { class: 'nm', text: p.name }));
    if (!p.can_edit) row.appendChild(el('span', { class: 'ro', attrs: { style: 'color:var(--muted);font-size:0.7rem' }, text: '👁' }));
    row.addEventListener('click', () => { FOCUS = p.id; VIEW = 'board'; render(); });
    wrap.appendChild(row);
    const kids = projChildren(p.id), mm = memosOf(p.id);
    const items = [...mm.map(m => ({ m })), ...kids.map(c => ({ c }))];
    items.forEach((it, i) => { const l = i === items.length - 1;
      if (it.m) { const r = el('div', { class: 'tree-row tree-memo' }); r.appendChild(el('span', { class: 'tree-pre', text: treeConnector([...anc, last], l) }));
        r.appendChild(el('span', { text: it.m.done ? '✓ ' : '' })); r.appendChild(el('span', { class: 'nm', text: it.m.title || stripTags(it.m.content).slice(0, 60) || '(mémo)' }));
        r.addEventListener('click', () => openEditor(it.m)); wrap.appendChild(r); }
      else node(it.c, [...anc, last], l);
    });
  };
  if (!roots.length) wrap.appendChild(el('div', { class: 'empty', text: 'Aucun dossier.' }));
  roots.forEach((p, i) => node(p, [], i === roots.length - 1));
  board.appendChild(wrap);
}

/* ── [AGENDA] vue calendrier mensuelle du hub — grille CSS maison (invariant 6),
   scopée à focusedMemos() (union des dossiers, FOCUS + recherche). D&D par mémo
   seulement si m.can_edit → putMemo(m, {due_date}) routé sur SON share_token
   (revalidé serveur — invariant 5). due_time conservé (PUT partiel). Mois affiché
   non persisté (spec), conservé au re-render. Mobile ≤900px : liste, pas de D&D. ── */
let agendaYM = null, agendaSelDay = null, agendaDragMemo = null;

function agendaChipColor(m) {
  const p = prioOf(m.priority);
  if (p && p.color) return p.color;
  const proj = projById(m.project_id);
  return usableProjColor(proj && proj.color) || DATA.marker_color || '#e53935';
}

function agendaMemoTitle(m) {
  return (m.emoji ? m.emoji + ' ' : '') + (m.title || stripTags(m.content).slice(0, 40) || '(mémo)');
}

function agendaRow(m) {
  const row = el('div', { class: 'ag-row', on: { click: () => openEditor(m) } });
  row.appendChild(el('span', { class: 'ag-time', text: m.due_time ? fmtMemoTime(m.due_time) : '—' }));
  const dot = el('span', { class: 'ag-dot' });
  dot.style.background = agendaChipColor(m);
  row.appendChild(dot);
  row.appendChild(el('span', { class: 'ag-t', text: agendaMemoTitle(m), attrs: { title: agendaMemoTitle(m) } }));
  if (!m.can_edit) row.appendChild(el('span', { class: 'ro', text: '👁' }));
  return row;
}

function renderAgendaHub() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const today = agendaTodayIso();
  if (!agendaYM) { const d = new Date(); agendaYM = { y: d.getFullYear(), m: d.getMonth() }; }
  if (!agendaSelDay) agendaSelDay = today;
  const byDay = agendaGroupByDay(focusedMemos().filter(m => !m.done && m.due_date));

  const head = el('div', { class: 'ag-head' });
  head.appendChild(el('h2', { text: '📆 ' + agendaMonthLabel(agendaYM.y, agendaYM.m) }));
  const nav = el('div', { class: 'ag-nav' });
  const shift = (d) => { const n = new Date(agendaYM.y, agendaYM.m + d, 1); agendaYM = { y: n.getFullYear(), m: n.getMonth() }; renderAgendaHub(); };
  nav.appendChild(el('button', { class: 'btn', text: '‹', attrs: { title: 'Mois précédent' }, on: { click: () => shift(-1) } }));
  nav.appendChild(el('button', { class: 'btn', text: 'Aujourd\'hui', on: { click: () => { const d = new Date(); agendaYM = { y: d.getFullYear(), m: d.getMonth() }; agendaSelDay = today; renderAgendaHub(); } } }));
  nav.appendChild(el('button', { class: 'btn', text: '›', attrs: { title: 'Mois suivant' }, on: { click: () => shift(1) } }));
  head.appendChild(nav);
  board.appendChild(head);

  // Mobile : liste par jour (jours avec mémos seulement), pas de grille ni D&D.
  if (window.matchMedia('(max-width: 760px)').matches) {
    const prefix = agendaYM.y + '-' + String(agendaYM.m + 1).padStart(2, '0');
    const days = Object.keys(byDay).filter(iso => iso.startsWith(prefix)).sort();
    if (!days.length) { board.appendChild(el('div', { class: 'ag-empty', text: 'Aucun mémo daté ce mois-ci.' })); return; }
    days.forEach(iso => {
      const sec = el('div', { class: 'ag-day-panel' });
      sec.appendChild(el('h3', { text: agendaShortDayLabel(iso) + ' — ' + byDay[iso].length + ' mémo' + (byDay[iso].length > 1 ? 's' : '') }));
      byDay[iso].forEach(m => sec.appendChild(agendaRow(m)));
      board.appendChild(sec);
    });
    return;
  }

  const grid = el('div', { class: 'ag-grid' });
  AGENDA_DOW.forEach(d => grid.appendChild(el('div', { class: 'ag-dow', text: d })));
  agendaMonthMatrix(agendaYM.y, agendaYM.m).forEach(week => week.forEach(c => {
    const cell = el('div', {
      class: 'ag-cell' + (c.inMonth ? '' : ' out') + (c.iso === today ? ' today' : '') + (c.iso === agendaSelDay && c.inMonth ? ' sel' : ''),
    });
    cell.appendChild(el('span', { class: 'ag-num', text: String(c.day) }));
    const list = byDay[c.iso] || [];
    list.slice(0, 3).forEach(m => {
      const label = agendaMemoTitle(m);
      const chip = el('div', { class: 'ag-chip', attrs: { title: label + (m.due_time ? ' · ' + fmtMemoTime(m.due_time) : '') } });
      const dot = el('span', { class: 'ag-dot' });
      dot.style.background = agendaChipColor(m);
      chip.append(dot, el('span', { class: 'ag-t', text: label }));
      if (m.can_edit) { // lecture seule = chips non draggables
        chip.setAttribute('draggable', 'true');
        chip.addEventListener('dragstart', (e) => { e.stopPropagation(); agendaDragMemo = m; e.dataTransfer.effectAllowed = 'move'; });
        chip.addEventListener('dragend', () => { agendaDragMemo = null; });
      }
      chip.addEventListener('click', (e) => { e.stopPropagation(); openEditor(m); });
      cell.appendChild(chip);
    });
    if (list.length > 3) cell.appendChild(el('span', { class: 'ag-more', text: '+' + (list.length - 3) }));
    if (c.inMonth) {
      cell.addEventListener('click', () => { agendaSelDay = c.iso; renderAgendaHub(); });
      cell.addEventListener('dragover', (e) => { if (!agendaDragMemo) return; e.preventDefault(); cell.classList.add('droptarget'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('droptarget'));
      cell.addEventListener('drop', async (e) => {
        e.preventDefault();
        cell.classList.remove('droptarget');
        if (!agendaDragMemo) return;
        const m = agendaDragMemo;
        agendaDragMemo = null;
        await putMemo(m, { due_date: c.iso }); // reload() → re-render (VIEW conservé)
      });
    }
    grid.appendChild(cell);
  }));
  board.appendChild(grid);

  const panel = el('div', { class: 'ag-day-panel' });
  const dayList = byDay[agendaSelDay] || [];
  panel.appendChild(el('h3', { text: agendaDayLabel(agendaSelDay) + ' — ' + dayList.length + ' mémo' + (dayList.length > 1 ? 's' : '') }));
  if (!dayList.length) panel.appendChild(el('div', { class: 'ag-empty', text: 'Rien ce jour-là.' }));
  dayList.forEach(m => panel.appendChild(agendaRow(m)));
  board.appendChild(panel);
}

// ── éditeur mémo (routé sur m.share_token) ──
const edDialog = document.getElementById('ed');
let edMemo = null, edAssignees = [];
// [HUB-INLINE-EDIT] Éditeur Quill inline (singleton), mêmes modules que share.html.
let hubQuill = null, edContentMode = 'quill';
function hubSuggestions() {
  const names = new Set();
  (DATA.members || []).forEach(n => { if (n) names.add(n); });
  (DATA.memos || []).forEach(m => (m.assignees || []).forEach(a => names.add(a)));
  return [...names].filter(Boolean);
}
function getHubQuill() {
  if (typeof Quill === 'undefined') return null;
  if (!hubQuill) {
    registerMentionBlot();
    hubQuill = new Quill('#ed-qeditor', { theme: 'snow', placeholder: 'Contenu du mémo… (tape @ pour mentionner)',
      modules: { toolbar: [[{ header: [1, 2, 3, false] }], ['bold', 'italic', 'underline', 'strike'],
        [{ color: [] }, { background: [] }], [{ list: 'ordered' }, { list: 'bullet' }, { list: 'check' }], ['link', 'blockquote'], ['clean']] } });
    addMentionMatcher(hubQuill);
    setupMentions(hubQuill, hubSuggestions, (name) => { if (!edAssignees.some(v => v.toLowerCase() === name.toLowerCase())) edAssignees.push(name); renderEdPeople(false); });
  }
  return hubQuill;
}
// En-tête contextuel [MEMO-CONTEXT] : fil d'Ariane scopé + droit (lecture/édition).
function renderEdContext(m) {
  const box = document.getElementById('ed-context'); box.innerHTML = '';
  const byId = {}; (DATA.projects || []).forEach(p => { byId[p.id] = p; });
  const chain = []; let cur = m.project_id, g = 0;
  while (cur != null && byId[cur] && g++ < 50) { chain.push(byId[cur]); cur = byId[cur].parent_id; }
  chain.reverse();
  const crumb = el('div', { class: 'me-crumb' });
  crumb.appendChild(el('span', { class: 'me-sep', text: '📌' }));
  if (!chain.length) crumb.appendChild(el('span', { class: 'me-crumb-node', text: '📥 Inbox' }));
  else chain.forEach((p, i) => { if (i) crumb.appendChild(el('span', { class: 'me-sep', text: '›' }));
    crumb.appendChild(el('span', { class: 'me-crumb-node', text: (p.emoji ? p.emoji + ' ' : '') + p.name })); });
  crumb.appendChild(el('span', { class: 'me-sep', text: m.can_edit ? '· ✏️ modifiable' : '· 🔒 lecture seule' }));
  box.appendChild(crumb);
}

function openEditor(m) {
  edMemo = m; edAssignees = [...(m.assignees || [])];
  const ro = !m.can_edit;
  renderEdContext(m);
  const titleIn = document.getElementById('ed-title'); titleIn.value = m.title || ''; titleIn.disabled = ro;
  // contenu : éditeur riche Quill inline (jamais de redirection vers /share). Repli textarea si Quill absent.
  const q = getHubQuill();
  if (q) {
    edContentMode = 'quill';
    q.setContents([]);
    if (m.content) { if (isRich(m.content)) q.clipboard.dangerouslyPasteHTML(0, m.content); else q.setText(m.content); }
    q.enable(!ro);
    document.getElementById('ed-qwrap').classList.toggle('ro', ro);
  } else {
    edContentMode = 'textarea';
    const wrap = document.getElementById('ed-qeditor'); wrap.innerHTML = '';
    const ta = el('textarea', { attrs: { id: 'ed-ta', style: 'width:100%;min-height:7rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;padding:0.4rem 0.55rem' } });
    ta.value = m.content && !isRich(m.content) ? m.content : (m.content ? stripTags(m.content) : ''); ta.disabled = ro; wrap.appendChild(ta);
  }
  const dIn = document.getElementById('ed-date'); dIn.value = m.due_date || ''; dIn.disabled = ro;
  const tIn = document.getElementById('ed-time'); tIn.value = m.due_time || ''; tIn.disabled = ro;
  // priorités
  const pw = document.getElementById('ed-prio'); pw.innerHTML = '';
  const mk = (id, name, color) => { const b = el('button', { class: 'prio-btn', text: name });
    if (m.priority === id && color) { b.style.background = color; b.style.color = textOn(color); b.style.borderColor = color; }
    if (!ro) b.addEventListener('click', () => putMemo(m, { priority: id }).then(() => edDialog.close())); else b.disabled = true;
    pw.appendChild(b); };
  mk(0, 'Aucune', ''); (DATA.priorities || []).forEach(p => mk(p.id, p.name, p.color));
  renderEdPeople(ro);
  renderEdImages(m, ro);
  renderEdComments(m, ro);
  document.getElementById('ed-save').style.display = ro ? 'none' : '';
  document.getElementById('ed-del').style.display = ro ? 'none' : '';
  edDialog.showModal();
  if (hubQuill && edContentMode === 'quill') setTimeout(() => hubQuill.focus(), 30);
}
function renderEdPeople(ro) {
  const pw = document.getElementById('ed-people'); pw.innerHTML = '';
  edAssignees.forEach((a, i) => { const chip = el('span', { class: 'chip' }); chip.appendChild(el('span', { text: '@' + a }));
    if (!ro) chip.appendChild(el('button', { text: '×', attrs: { style: 'background:none;border:none;color:var(--muted)' }, on: { click: () => { edAssignees.splice(i, 1); renderEdPeople(ro); } } })); pw.appendChild(chip); });
  if (!ro) { const inp = el('input', { attrs: { type: 'text', placeholder: '+ @personne', list: 'hub-asg', style: 'width:8rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:0.25rem 0.45rem' } });
    inp.addEventListener('keydown', e => { if (e.key !== 'Enter') return; e.preventDefault(); const n = inp.value.replace(/^@/, '').trim(); if (n && !edAssignees.includes(n)) { edAssignees.push(n); renderEdPeople(ro); } });
    pw.appendChild(inp);
    let dl = document.getElementById('hub-asg'); if (!dl) { dl = document.createElement('datalist'); dl.id = 'hub-asg'; document.body.appendChild(dl); }
    dl.innerHTML = ''; (DATA.members || []).forEach(n => dl.appendChild(el('option', { attrs: { value: n } }))); }
}
function renderEdImages(m, ro) {
  const iw = document.getElementById('ed-images'); iw.innerHTML = '';
  (m.images || []).forEach(name => { const img = el('img', { attrs: { src: '/share/' + m.share_token + '/image/' + name, style: 'height:54px;border-radius:6px;border:1px solid var(--border);cursor:zoom-in' } });
    img.addEventListener('click', () => runImageViewer({ images: m.images, startIndex: m.images.indexOf(name), imageUrl: n => '/share/' + m.share_token + '/image/' + n, downloadUrl: n => '/share/' + m.share_token + '/image/' + n, exifUrl: n => '/share/' + m.share_token + '/image-exif/' + n,
      canDelete: !ro, onDelete: async (n) => { await api(m.share_token, '/memo/' + m.id + '/images/' + n, { method: 'DELETE' }); await reload(); edDialog.close(); } })); iw.appendChild(img); });
  if (!ro) { const f = el('input', { attrs: { type: 'file', accept: 'image/png,image/jpeg', multiple: '', style: 'display:none' } });
    f.addEventListener('change', async () => { for (const file of f.files) { const fd = new FormData(); fd.append('image', file); await api(m.share_token, '/memo/' + m.id + '/images', { method: 'POST', body: fd }); } await reload(); edDialog.close(); });
    iw.appendChild(el('button', { class: 'btn', text: '＋ Photo', on: { click: () => f.click() } })); iw.appendChild(f); }
}
function renderEdComments(m, ro) {
  const cw = document.getElementById('ed-comments'); cw.innerHTML = '';
  (m.comments || []).forEach(c => { const r = el('div', { class: 'comment' });
    r.appendChild(el('span', { class: 'ca', text: (c.author || '').replace(/\s*<[^>]*>/, ''), attrs: c.guest ? { style: 'color:var(--guest,#b39ddb)' } : {} }));
    r.appendChild(el('span', { class: 'cb', text: c.body })); cw.appendChild(r); });
  if (!ro) { const inp = el('input', { attrs: { type: 'text', placeholder: '+ Commentaire…', style: 'width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:0.35rem 0.5rem;margin-top:0.4rem' } });
    inp.addEventListener('keydown', async e => { if (e.key !== 'Enter') return; const b = inp.value.trim(); if (!b) return; await api(m.share_token, '/memo/' + m.id + '/comments', { method: 'POST', body: JSON.stringify({ body: b }) }); inp.value = ''; await reload(); const fresh = (DATA.memos || []).find(x => x.id === m.id); if (fresh) renderEdComments(fresh, ro); });
    cw.appendChild(inp); }
}
document.getElementById('ed-cancel').addEventListener('click', () => edDialog.close());
document.getElementById('ed-save').addEventListener('click', async () => {
  if (!edMemo || !edMemo.can_edit) return;
  const body = { title: document.getElementById('ed-title').value.trim(), due_date: document.getElementById('ed-date').value,
    due_time: document.getElementById('ed-time').value, assignees: edAssignees };
  if (edContentMode === 'quill' && hubQuill) {
    const text = hubQuill.getText().trim();
    body.content = text ? hubQuill.getSemanticHTML().replace(/&nbsp;| /g, ' ') : '';
  } else { const ta = document.getElementById('ed-ta'); if (ta) body.content = ta.value.trim(); }
  edDialog.close(); await putMemo(edMemo, body);
});
document.getElementById('ed-del').addEventListener('click', async () => {
  if (!edMemo || !edMemo.can_edit) return;
  if (!(await confirmPopin('Mettre ce mémo à la corbeille ?', { okLabel: 'Corbeille' }))) return;
  await api(edMemo.share_token, '/memo/' + edMemo.id, { method: 'DELETE' }); edDialog.close(); await reload();
});

// ── carte agrégée (lecture) ──
function hubMapPoints() {
  const pts = [];
  focusedMemos().forEach(m => { if (m.location && typeof m.location.lat === 'number') pts.push({ kind: 'memo', id: m.id, lat: m.location.lat, lng: m.location.lng, placeLabel: m.location.label || '', sub: (m.title || stripTags(m.content).slice(0, 40)), project_id: m.project_id, groups: m.map_groups || [], color: (prioOf(m.priority) || {}).color || '' }); });
  (DATA.projects || []).forEach(p => { if (p.location && typeof p.location.lat === 'number') pts.push({ kind: 'project', id: p.id, lat: p.location.lat, lng: p.location.lng, placeLabel: p.location.label || '', sub: p.name, project_id: p.id, groups: [], color: usableProjColor(p.color) || '' }); });
  return pts;
}
document.getElementById('btn-map').addEventListener('click', () => {
  if (typeof L === 'undefined') { notify('Carte indisponible.', { error: true }); return; }
  runMapDialog({ title: DATA.name || 'Mes dossiers', points: hubMapPoints(), recompute: hubMapPoints, editable: false,
    projects: DATA.projects || [], currentProjectId: FOCUS == null ? 'all' : FOCUS, subFilterScope: FOCUS != null,
    defaultMarkerColor: DATA.marker_color, focusKey: 'hubMapFocus:' + HUB_TOKEN, subKey: 'hubMapSub:' + HUB_TOKEN });
});
// [HUB-MAP-CLOSE] Le partial runMapDialog ne câble pas #map-close (chaque page le fait, cf.
// index.html/share.html). Fermer + détruire l'instance Leaflet (clic, Échap ou backdrop) →
// pas de .leaflet-container orphelin ni d'empilement à la réouverture.
const mapDialog = document.getElementById('map-dialog');
document.getElementById('map-close').addEventListener('click', () => mapDialog.close());
mapDialog.addEventListener('close', () => { if (activeMap) { activeMap.remove(); activeMap = null; } });
// [AGENDA] deux toggles de vue exclusifs (Plan / Agenda) — la classe primary suit VIEW.
function syncViewBtns() {
  document.getElementById('btn-plan').classList.toggle('primary', VIEW === 'plan');
  document.getElementById('btn-agenda').classList.toggle('primary', VIEW === 'agenda');
}
document.getElementById('btn-plan').addEventListener('click', () => { VIEW = VIEW === 'plan' ? 'board' : 'plan'; syncViewBtns(); render(); });
document.getElementById('btn-agenda').addEventListener('click', () => { VIEW = VIEW === 'agenda' ? 'board' : 'agenda'; syncViewBtns(); render(); });
document.getElementById('search').addEventListener('input', () => { if (VIEW === 'plan') renderPlan(); else if (VIEW === 'agenda') renderAgendaHub(); else renderBoard(); });

// ── init : toujours tenter /data — cookie de session HttpOnly OU header localStorage
// ([HUB-SESSION]) ; loadDash affiche l'écran code sur 403 (comportement inchangé sans session).
(function init() { loadDash(); })();
</script>

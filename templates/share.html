<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Partage — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/share/assets/favicon.svg">
<link rel="stylesheet" href="/share/assets/quill.snow.css">

<script src="/share/assets/leaflet.js" defer></script>

<style>
:root {
  --bg: #0e1217; --panel: #161d25; --panel-2: #212b35; --text: #e8eef5;
  --muted: #9aa7b4; --accent: #4fc3f7; --accent-2: #38aee0; --green: #4caf50; --border: #283340;
  --danger: #ff8a80; --warn: #ffb74d; --guest: #b39ddb; --assignee: #80cbc4;
  --bg-elev: #1c2530; --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 2px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.18);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.4);
  --ring: 0 0 0 3px rgba(79,195,247,0.22);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
:root[data-theme="light"] {
  --bg: #eef1f5; --panel: #ffffff; --panel-2: #eef2f7; --text: #1b2531;
  --muted: #5c6b7a; --accent: #0288d1; --accent-2: #0277bd; --green: #2e7d32; --border: #d3dce5;
  --danger: #e53935; --warn: #ef6c00; --guest: #6a3fb5; --assignee: #00897b;
  --bg-elev: #f4f7fa;
  --shadow: 0 1px 2px rgba(16,30,50,0.08), 0 2px 8px rgba(16,30,50,0.06);
  --shadow-lg: 0 10px 30px rgba(16,30,50,0.18);
  --ring: 0 0 0 3px rgba(2,136,209,0.28);
}
[data-theme="light"] header { background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.92)), var(--panel); }
[data-theme="light"] #snav { background: linear-gradient(180deg, var(--panel), #eef2f7); }
* { box-sizing: border-box; }
@font-face {
  font-family: 'Inter';
  src: url('/share/assets/Inter.woff2') format('woff2-variations');
  font-weight: 100 900;
  font-display: swap;
}
.ic { width: 1.1em; height: 1.1em; display: inline-block; vertical-align: -0.15em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.ic-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(1200px 600px at 100% -10%, rgba(79,195,247,0.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(79,195,247,0.04), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: 0.01em;
}
::selection { background: rgba(79,195,247,0.28); }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 9px; height: 9px; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem 1.25rem;
  background: linear-gradient(180deg, rgba(33,43,53,0.55), rgba(22,29,37,0.85)), var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(8px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.02), var(--shadow);
}
header h1 { margin: 0; font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.01em; }
header .mode { font-size: 0.75rem; color: var(--muted); background: var(--panel-2); padding: 0.2rem 0.6rem; border-radius: 4px; }
header #theme-btn { margin-left: auto; }
button.icon { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; padding: 0; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: background 0.15s var(--ease), transform 0.1s var(--ease); }
button.icon:hover { background: var(--bg-elev); }
button.icon:active { transform: scale(0.94); }
.dot { width: 0.7rem; height: 0.7rem; border-radius: 50%; display: inline-block; }
#layout { display: flex; min-height: calc(100dvh - 54px); }
#snav {
  width: clamp(170px, 15vw, 230px);
  flex-shrink: 0;
  background: linear-gradient(180deg, var(--panel), rgba(14,18,23,0.4));
  border-right: 1px solid var(--border);
  padding: 0.75rem 0.5rem;
}
#snav[hidden] { display: none; }
.sitem {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.45rem 0.65rem;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.88rem;
  margin-bottom: 3px;
  user-select: none;
  position: relative;
  transition: background 0.15s var(--ease), color 0.15s var(--ease), transform 0.12s var(--ease);
}
.sitem:hover { background: var(--panel-2); color: var(--text); transform: translateX(2px); }
.sitem.active { background: var(--panel-2); color: var(--accent); }
.sitem.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 1.05rem; border-radius: 999px; background: var(--accent);
}
.sitem.droptarget { outline: 1px dashed var(--accent); color: var(--accent); }
.sitem .cnt { margin-left: auto; font-size: 0.72rem; opacity: 0.7; flex-shrink: 0; }
.sitem .slabel { flex: 1; min-width: 0; overflow-wrap: anywhere; }
.sdot { width: 0.6rem; height: 0.6rem; border-radius: 50%; display: inline-block; flex-shrink: 0; }
main { flex: 1; min-width: 0; max-width: 720px; margin: 0 auto; padding: 1.25rem; }
@media (max-width: 900px) {
  #layout { flex-direction: column; }
  #snav { width: 100%; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 0.5rem 0.75rem; gap: 0.3rem; }
  .sitem { flex-shrink: 0; margin-bottom: 0; }
}
.task {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.6rem 0.8rem;
  margin-bottom: 0.5rem;
  box-shadow: var(--shadow);
  transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease), transform 0.15s var(--ease);
}
.task:hover { border-left-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateX(2px); }
.task-row { display: flex; align-items: flex-start; gap: 0.6rem; }
.task-check {
  width: 1.15rem; height: 1.15rem; border-radius: 50%;
  border: 2px solid var(--muted); background: none; flex-shrink: 0;
  cursor: pointer; margin-top: 0.1rem; padding: 0; font-size: 0.7rem; line-height: 1; color: transparent;
}
.task-check:disabled { cursor: default; opacity: 0.6; }
.task.done .task-check { background: var(--green); border-color: var(--green); color: #fff; }
.task-content { flex: 1; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
.task.done .task-content { text-decoration: line-through; color: var(--muted); }
.task-content a { color: var(--accent); }
.task-content p { margin: 0 0 0.15rem; }
.task-content ul, .task-content ol { margin: 0.15rem 0; padding-left: 1.3rem; }
.task-content .ql-ui { display: none; }
.task-content li[data-list="checked"], .task-content li[data-list="unchecked"] {
  list-style: none;
  position: relative;
  padding-left: 1.5rem;
  margin-left: -1.3rem;
  border-radius: 4px;
}
.task-content li.cl-edit:hover { background: var(--panel-2); cursor: pointer; }
.task-content li[data-list="unchecked"]::before {
  content: '';
  position: absolute;
  left: 0.25rem;
  top: 0.3em;
  width: 0.85em;
  height: 0.85em;
  border: 2px solid var(--muted);
  border-radius: 4px;
}
.task-content li[data-list="checked"]::before {
  content: '✓';
  position: absolute;
  left: 0.25rem;
  top: 0.05em;
  width: 0.85em;
  height: 0.85em;
  background: var(--green);
  border: 2px solid var(--green);
  border-radius: 4px;
  color: #fff;
  font-size: 0.8em;
  line-height: 1.1;
  text-align: center;
}
.task-content li[data-list="checked"] { text-decoration: line-through; color: var(--muted); }
.badge { font-size: 0.72rem; padding: 0.12rem 0.45rem; border-radius: 4px; background: var(--panel-2); color: var(--muted); white-space: nowrap; flex-shrink: 0; max-width: 13rem; overflow: hidden; text-overflow: ellipsis; }
.subtask { display: flex; align-items: center; gap: 0.45rem; font-size: 0.85rem; margin: 0.25rem 0 0 1.75rem; }
.subtask input { accent-color: var(--green); }
.subtask.stdone span { text-decoration: line-through; color: var(--muted); }
.item-add {
  display: block;
  width: calc(100% - 1.75rem);
  margin: 0.45rem 0 0.1rem 1.75rem;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text);
  font: inherit;
  font-size: 0.85rem;
  padding: 0.35rem 0.6rem;
  outline: none;
  box-sizing: border-box;
}
.item-add:focus { border-style: solid; border-color: var(--accent); }
.thumbs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0 0.1rem 1.75rem; }
.thumbs img { height: 72px; max-width: 140px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: zoom-in; }
.thumb-wrap { position: relative; }
.thumb-del {
  position: absolute; top: -6px; right: -6px;
  width: 1.2rem; height: 1.2rem; padding: 0;
  font-size: 0.75rem; line-height: 1; border-radius: 50%;
  background: #f44336; color: #fff; border: none; cursor: pointer;
}
.memo-tools { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin: 0.5rem 0 0 1.75rem; }
.tool-btn {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.78rem; padding: 0.25rem 0.6rem; cursor: pointer;
}
.tool-btn:hover { border-color: var(--accent); }
.memo-tools input[type="date"] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.78rem; padding: 0.2rem 0.4rem;
}
.edit-ta {
  width: 100%; box-sizing: border-box;
  background: var(--bg); border: 1px solid var(--accent); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.9rem; padding: 0.4rem; resize: vertical;
}
#guest-banner {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.9rem 1rem;
  margin-bottom: 1rem;
  font-size: 0.9rem;
}
#guest-banner.pending { border-color: #ffc107; }
#guest-banner.approved { border-color: var(--green); font-size: 0.8rem; color: var(--muted); padding: 0.5rem 0.8rem; }
#guest-banner.rejected { border-color: #f44336; }
#guest-banner h2 { margin: 0 0 0.5rem; font-size: 0.95rem; }
#guest-banner p { margin: 0.3rem 0; color: var(--muted); font-size: 0.82rem; }
#guest-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
#guest-form input {
  flex: 1; min-width: 160px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font: inherit; padding: 0.5rem 0.7rem; outline: none;
}
#guest-form input:focus { border-color: var(--accent); }
#guest-form button {
  background: var(--accent); color: #001; border: none; border-radius: 6px;
  padding: 0.5rem 1rem; font: inherit; cursor: pointer;
}
#guest-form input.invalid { border-color: var(--danger); }
#guest-error { flex-basis: 100%; margin: 0.2rem 0 0; color: var(--danger); font-size: 0.82rem; }
#guest-error:empty { display: none; }
#add-bar, #proj-bar { display: flex; gap: 0.5rem; margin: 1rem 0; }
#proj-bar { margin-top: 0.4rem; }
#add-bar[hidden], #proj-bar[hidden], #guest-banner[hidden], #tiles[hidden] { display: none; }
#add-bar select {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.85rem; padding: 0.4rem 0.5rem; max-width: 11rem;
}
#proj-bar input {
  flex: 1; background: var(--panel); border: 1px dashed var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.85rem; padding: 0.45rem 0.8rem; outline: none;
}
#proj-bar input:focus { border-style: solid; border-color: var(--accent); }
#proj-bar button {
  background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.45rem 0.9rem; font: inherit; cursor: pointer;
}
#tiles {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
  gap: 0.45rem;
  margin: 0 0 1rem;
}
.tile {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.45rem 0.65rem;
  cursor: pointer;
  user-select: none;
  box-shadow: var(--shadow);
  transition: background 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.tile:hover { background: var(--panel-2); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.tile .tn { font-weight: 700; float: right; }
.tile .tl { font-size: 0.7rem; font-weight: 600; display: block; }
.tile.active { border-color: var(--accent); background: #15232e; }
#add-bar input {
  flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; padding: 0.55rem 0.8rem; outline: none;
}
#add-bar input:focus { border-color: var(--accent); box-shadow: var(--ring); }
#add-bar button {
  background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #04161f; border: none; border-radius: var(--radius-sm);
  padding: 0.5rem 1rem; font: inherit; cursor: pointer; font-weight: 600;
  box-shadow: 0 2px 10px rgba(79,195,247,0.25); transition: filter 0.18s var(--ease);
}
#add-bar button:hover { filter: brightness(1.08); }
.empty { color: var(--muted); font-style: italic; padding: 1rem 0; text-align: center; }
footer { text-align: center; color: var(--muted); font-size: 0.72rem; padding: 1.5rem; }
/* ---------- accessibilité (Lot 1+2) ---------- */
button, .sitem, .tile, .task, a { touch-action: manipulation; }
.sitem:focus-visible, .tile:focus-visible, button:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: none; box-shadow: var(--ring); border-radius: 8px;
}
@media (pointer: coarse) {
  button, .sitem, .tile, .task-check { min-height: 44px; }
}
@media (max-width: 900px) {
  input, select, textarea { font-size: 16px; }
}
.tn, .cnt, .c-when { font-variant-numeric: tabular-nums; }
.sitem:active, .tile:active { transform: scale(0.97); }
.task:hover { will-change: transform; }
@media (prefers-reduced-motion: reduce) { .sitem:active, .tile:active { transform: none; } }
dialog { background: transparent; border: none; padding: 0; max-width: 94vw; max-height: 94vh; }
dialog::backdrop { background: rgba(6,9,12,0.78); backdrop-filter: blur(3px); }
/* Entrée des pop-ins en CSS. NE PAS animer le <dialog> via GSAP (transform/visibility) :
   poser un transform sur l'élément dialog le sort du top-layer Chromium → perte du
   centrage (position:fixed→absolute) et du ::backdrop. Une animation CSS reste sûre. */
@media (prefers-reduced-motion: no-preference) {
  dialog[open] { animation: dlg-in 0.24s cubic-bezier(0.16, 1, 0.3, 1); }
  dialog[open]::backdrop { animation: dlg-bd 0.24s ease-out; }
  @keyframes dlg-in { from { opacity: 0; transform: translateY(12px) scale(0.97); } }
  @keyframes dlg-bd { from { opacity: 0; } }
}
dialog:not(#lightbox) { box-shadow: var(--shadow-lg); }
dialog img { max-width: 94vw; max-height: 90vh; border-radius: 8px; cursor: zoom-out; }
#edit-dialog {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem;
  width: min(620px, 94vw);
  color: var(--text);
}
#edit-dialog h3 { margin: 0 0 0.8rem; font-size: 1rem; }
.dlg-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.8rem; }
.dlg-actions button {
  border-radius: var(--radius-sm); padding: 0.45rem 0.9rem; font: inherit; cursor: pointer; font-weight: 500;
  background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  transition: background 0.18s var(--ease), border-color 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.08s var(--ease);
}
.dlg-actions button:hover { background: var(--bg-elev); border-color: #36465a; }
.dlg-actions button:active { transform: translateY(1px); }
.dlg-actions button.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #04161f; border-color: transparent; font-weight: 600; box-shadow: 0 2px 10px rgba(79,195,247,0.25); }
.dlg-actions button.primary:hover { background: linear-gradient(180deg, #6fcef9, var(--accent)); }
#q-wrap .ql-toolbar { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px 6px 0 0; }
#q-wrap .ql-container {
  border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px;
  background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.95rem;
  min-height: 180px; max-height: 50vh; overflow-y: auto;
}
#q-wrap .ql-editor { min-height: 180px; }
#q-wrap .ql-editor.ql-blank::before { color: var(--muted); font-style: italic; }
/* Mentions @ dans l'éditeur */
.mention { color: var(--assignee); background: rgba(128,203,196,0.14); border-radius: 4px; padding: 0 3px; font-weight: 600; }
.mention-menu { position: fixed; z-index: 10000; min-width: 11rem; max-height: 13rem; overflow-y: auto; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-lg); padding: 0.25rem; }
.mention-item { padding: 0.32rem 0.55rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text); white-space: nowrap; }
.mention-item.active { background: var(--accent); color: #fff; }
.assignee-chip.noaccess { color: var(--warn); border-color: rgba(255,183,77,0.45); }
.mention.noaccess { color: var(--warn); background: rgba(255,183,77,0.16); }
.q-people { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; margin-top: 0.2rem; }
.me-label { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 600; margin: 0.5rem 0 0.2rem; }
.assignee-chip { display: inline-flex; align-items: center; gap: 0.25rem; background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; padding: 0.1rem 0.5rem; font-size: 0.8rem; color: var(--assignee); }
.ql-snow .ql-stroke { stroke: var(--muted); }
.ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: var(--muted); }
.ql-snow .ql-picker { color: var(--muted); }
.ql-snow .ql-picker-options { background: var(--panel); border-color: var(--border) !important; }
.ql-snow .ql-toolbar button:hover .ql-stroke, .ql-snow.ql-toolbar button:hover .ql-stroke,
.ql-snow .ql-toolbar button.ql-active .ql-stroke, .ql-snow.ql-toolbar button.ql-active .ql-stroke,
.ql-snow .ql-picker-label:hover .ql-stroke { stroke: var(--accent); }
.ql-snow .ql-toolbar button:hover .ql-fill, .ql-snow.ql-toolbar button:hover .ql-fill,
.ql-snow .ql-toolbar button.ql-active .ql-fill, .ql-snow.ql-toolbar button.ql-active .ql-fill { fill: var(--accent); }
.ql-snow .ql-picker-label:hover, .ql-snow .ql-picker-label.ql-active,
.ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-item.ql-selected { color: var(--accent); }
.ql-snow a { color: var(--accent); }
</style>
<script>try{if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>

<script>
const TOKEN = location.pathname.split('/')[2];
const API = '/share/' + TOKEN;
let DATA = null;
let GUEST = { status: 'anonymous', email: '', name: '' };

// Thème clair / sombre (tokens surchargés sous [data-theme=light], persistant)
const themeBtn = document.getElementById('theme-btn');
function setTheme(t) {
  const light = t === 'light';
  if (light) document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch (e) {}
  const u = themeBtn && themeBtn.querySelector('use');
  if (u) u.setAttribute('href', light ? '#ic-sun' : '#ic-moon');
}
setTheme((() => { try { return localStorage.getItem('theme'); } catch (e) { return null; } })() === 'light' ? 'light' : 'dark');
if (themeBtn) themeBtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

function guestToken() { return localStorage.getItem('dashguest:' + TOKEN) || ''; }
function canEditNow() { return DATA && DATA.can_edit && GUEST.status === 'approved'; }

async function refreshGuest() {
  if (!DATA || !DATA.can_edit) return;
  const t = guestToken();
  if (!t) { GUEST = { status: 'anonymous' }; return; }
  try {
    const r = await fetch(API + '/me', { headers: { 'X-Guest-Token': t } });
    GUEST = r.ok ? await r.json() : { status: 'anonymous' };
  } catch (_) { GUEST = { status: 'anonymous' }; }
}

function renderGuestBanner() {
  const b = document.getElementById('guest-banner');
  b.hidden = !DATA.can_edit;
  if (!DATA.can_edit) return;
  // Le formulaire de connexion invité est affiché tant que l'invité n'est ni
  // approuvé, ni en attente, ni refusé. S'il est déjà à l'écran, NE PAS le
  // reconstruire : le refresh auto (setInterval 15s → load → ici) effacerait
  // ce que l'invité est en train de taper (prénom / e-mail / code).
  const anonymous = !['approved', 'pending', 'rejected'].includes(GUEST.status);
  if (anonymous && document.getElementById('guest-form')) return;
  b.innerHTML = '';
  b.className = '';
  if (GUEST.status === 'approved') {
    b.className = 'approved';
    b.textContent = '✅ Connecté·e en tant que ' + (GUEST.name || GUEST.email) + ' — tes modifications sont signées.';
    return;
  }
  if (GUEST.status === 'pending') {
    b.className = 'pending';
    b.innerHTML = '<h2>⏳ Demande envoyée</h2><p>Le propriétaire doit valider ton accès (' + GUEST.email + '). Cette page se met à jour automatiquement.</p>';
    return;
  }
  if (GUEST.status === 'rejected') {
    b.className = 'rejected';
    b.innerHTML = '<h2>🚫 Accès refusé</h2><p>Le propriétaire n\'a pas validé cette adresse. Tu peux consulter, mais pas modifier.</p>';
    return;
  }
  b.innerHTML = '<h2>✏️ Pour modifier, présente-toi</h2><p>Ton e-mail signe tes modifications. Le code à 4 chiffres t\'a été donné par le propriétaire.</p>';
  const form = el('div', '');
  form.id = 'guest-form';
  const nameIn = document.createElement('input');
  nameIn.placeholder = 'Prénom (optionnel)';
  const emailIn = document.createElement('input');
  emailIn.type = 'email';
  emailIn.placeholder = 'ton@email.fr';
  const pinIn = document.createElement('input');
  pinIn.type = 'text';
  pinIn.inputMode = 'numeric';
  pinIn.maxLength = 4;
  pinIn.placeholder = 'Code';
  pinIn.style.cssText = 'flex:0 0 5.5rem;min-width:5.5rem;text-align:center;letter-spacing:0.3em';
  const btn = document.createElement('button');
  btn.textContent = 'Se connecter';
  const errEl = document.createElement('div');
  errEl.id = 'guest-error';
  errEl.setAttribute('role', 'alert');
  const showErr = (msg, focusEl, markEl) => {
    errEl.textContent = msg;
    [nameIn, emailIn, pinIn].forEach(i => i.classList.remove('invalid'));
    if (markEl) markEl.classList.add('invalid');
    if (focusEl) focusEl.focus();
  };
  const submit = async () => {
    const email = emailIn.value.trim();
    if (!email || !email.includes('@')) { showErr('E-mail invalide.', emailIn, emailIn); return; }
    if (!/^\d{4}$/.test(pinIn.value.trim())) { showErr('Le code est composé de 4 chiffres.', pinIn, pinIn); return; }
    errEl.textContent = '';
    const r = await fetch(API + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name: nameIn.value.trim(), pin: pinIn.value.trim() }),
    });
    if (r.ok) {
      const d = await r.json();
      localStorage.setItem('dashguest:' + TOKEN, d.guest_token);
      GUEST = d;
      renderGuestBanner();
      await load();
    } else {
      const err = await r.json().catch(() => ({}));
      // On NE vide PAS prénom/e-mail : seul le code est remis à zéro et refocus.
      pinIn.value = '';
      showErr(err.error || 'Connexion impossible.', pinIn, pinIn);
    }
  };
  btn.addEventListener('click', submit);
  [nameIn, emailIn, pinIn].forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
  form.appendChild(nameIn);
  form.appendChild(emailIn);
  form.appendChild(pinIn);
  form.appendChild(btn);
  form.appendChild(errEl);
  b.appendChild(form);
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

// Remplace les alert() natifs par une pop-in (cohérent avec le reste de l'app).
function notify(message, { title = 'ℹ️ Info', error = false } = {}) {
  if (typeof announce === 'function') announce(message);
  return new Promise(resolve => {
    const dlg = document.getElementById('notify-dialog');
    document.getElementById('notify-title').textContent = error ? '⚠️ Erreur' : title;
    document.getElementById('notify-msg').textContent = message;
    const ok = document.getElementById('notify-ok');
    const done = () => { dlg.close(); ok.onclick = dlg.oncancel = null; resolve(); };
    ok.onclick = done;
    dlg.oncancel = (e) => { e.preventDefault(); done(); };
    dlg.showModal();
  });
}

function shareIcon(name) {
  const NS = 'http://www.w3.org/2000/svg';
  const s = document.createElementNS(NS, 'svg'); s.setAttribute('class', 'ic');
  const u = document.createElementNS(NS, 'use'); u.setAttribute('href', '#ic-' + name);
  s.appendChild(u); return s;
}

// Désactive un bouton pendant une action async (anti double-clic).
async function withBusy(btn, fn) {
  if (btn && btn.disabled) return;
  if (btn) { btn.disabled = true; btn.setAttribute('aria-busy', 'true'); btn.style.opacity = '0.6'; }
  try { return await fn(); }
  finally { if (btn) { btn.disabled = false; btn.removeAttribute('aria-busy'); btn.style.opacity = ''; } }
}

// Rend les éléments "bouton" (sidebar, tuiles) focusables et activables au clavier.
function applyA11y() {
  document.querySelectorAll('.sitem, .tile').forEach(e => {
    if (!e.hasAttribute('tabindex')) e.tabIndex = 0;
    if (!e.hasAttribute('role')) e.setAttribute('role', 'button');
  });
}
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const t = e.target;
  if (t.matches && t.matches('.sitem, .tile') && !t.closest('input, textarea, select')) {
    e.preventDefault();
    t.click();
  }
});

function sanitize(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  tpl.content.querySelectorAll('script,style,iframe,object,embed,link,meta,form').forEach(n => n.remove());
  tpl.content.querySelectorAll('*').forEach(n => {
    [...n.attributes].forEach(a => {
      if (/^on/i.test(a.name)) n.removeAttribute(a.name);
      if ((a.name === 'href' || a.name === 'src') && /^\s*javascript:/i.test(a.value)) n.removeAttribute(a.name);
    });
    if (n.tagName === 'A') { n.setAttribute('target', '_blank'); n.setAttribute('rel', 'noopener noreferrer'); }
  });
  return tpl.content;
}

function isRich(c) { return /<(p|div|ul|ol|li|br|strong|em|u|s|a|h[1-6]|blockquote|pre|code|span)[\s>/]/i.test(c || ''); }

function linkifyText(text) {
  const frag = document.createDocumentFragment();
  const re = /https?:\/\/[^\s<>"]+/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    const a = el('a', '', m[0].replace(/^https?:\/\//, ''));
    a.href = m[0]; a.target = '_blank'; a.rel = 'noopener noreferrer';
    frag.appendChild(a);
    last = m.index + m[0].length;
  }
  frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

let sQuill = null;
let editingId = null;
let editAssignees = [];
const editDialog = document.getElementById('edit-dialog');

// --- Mentions @ : blot stylé + menu de suggestions (self-hosté, zéro CDN) ---
function registerMentionBlot() {
  if (typeof Quill === 'undefined' || Quill.__mentionReady) return;
  const Inline = Quill.import('blots/inline');
  class MentionBlot extends Inline {
    static create(value) { const node = super.create(); node.setAttribute('data-mention', value); return node; }
    static formats(node) { return node.getAttribute('data-mention'); }
  }
  MentionBlot.blotName = 'mention';
  MentionBlot.tagName = 'span';
  MentionBlot.className = 'mention';
  Quill.register(MentionBlot, true);
  Quill.__mentionReady = true;
}
function addMentionMatcher(q) {
  const Delta = Quill.import('delta');
  q.clipboard.addMatcher('SPAN', (node, delta) => {
    if (node.classList && node.classList.contains('mention')) {
      const nm = node.getAttribute('data-mention') || node.textContent.replace(/^@/, '');
      return new Delta().insert('@' + nm, { mention: nm });
    }
    return delta;
  });
}
function setupMentions(quill, getNames, onPick) {
  const host = quill.container.closest('dialog') || document.body;
  const menu = document.createElement('div');
  menu.className = 'mention-menu';
  menu.style.display = 'none';
  host.appendChild(menu);
  let open = false, items = [], active = 0, query = '', picking = false;

  const close = () => { open = false; menu.style.display = 'none'; };
  const draw = () => {
    menu.innerHTML = '';
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'mention-item' + (i === active ? ' active' : '');
      row.textContent = it.add ? ('➕ Ajouter « ' + it.value + ' »') : ('@' + it.value);
      row.addEventListener('mousedown', (e) => { e.preventDefault(); pick(i); });
      row.addEventListener('mousemove', () => { if (active !== i) { active = i; draw(); } });
      menu.appendChild(row);
    });
  };
  const place = () => {
    const sel = quill.getSelection(); if (!sel) return;
    const b = quill.getBounds(sel.index);
    const c = quill.container.getBoundingClientRect();
    menu.style.left = Math.round(c.left + b.left) + 'px';
    menu.style.top = Math.round(c.top + b.bottom + 4) + 'px';
  };
  const refresh = () => {
    const all = (getNames() || []).filter(Boolean);
    const q = query.toLowerCase();
    const list = all.filter(n => n.toLowerCase().includes(q)).map(v => ({ value: v }));
    if (query && !all.some(n => n.toLowerCase() === q)) list.push({ value: query, add: true });
    items = list;
    if (!items.length) { close(); return; }
    if (active >= items.length) active = 0;
    draw(); place();
    menu.style.display = 'block'; open = true;
  };
  const pick = (i) => {
    const it = items[i]; if (!it) { close(); return; }
    const name = String(it.value).trim(); if (!name) { close(); return; }
    const sel = quill.getSelection(true); if (!sel) { close(); return; }
    const delLen = query.length + 1;
    const start = sel.index - delLen;
    picking = true;
    quill.deleteText(start, delLen, 'user');
    quill.insertText(start, '@' + name, { mention: name }, 'user');
    quill.insertText(start + name.length + 1, ' ', { mention: false }, 'user');
    quill.setSelection(start + name.length + 2, 0, 'user');
    picking = false;
    close();
    try { onPick(name); } catch (e) {}
  };
  const detect = () => {
    if (picking) return;
    const sel = quill.getSelection();
    if (!sel || sel.length) { close(); return; }
    const m = /(?:^|\s)@([^\s@]*)$/.exec(quill.getText(0, sel.index));
    if (!m) { close(); return; }
    query = m[1];
    refresh();
  };
  quill.on('text-change', (d, o, source) => { if (source === 'user') detect(); else close(); });
  quill.on('selection-change', (range) => { if (!range && !picking) close(); });
  quill.root.addEventListener('keydown', (e) => {
    if (!open || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); active = (active + 1) % items.length; draw(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); e.stopImmediatePropagation(); active = (active - 1 + items.length) % items.length; draw(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); e.stopImmediatePropagation(); pick(active); }
    else if (e.key === 'Escape') { e.preventDefault(); e.stopImmediatePropagation(); close(); }
  }, true);
}

// Suggestions = membres du partage + noms déjà utilisés sur les mémos.
function shareSuggestions() {
  const names = new Set();
  (DATA.members || []).forEach(n => { if (n) names.add(n); });
  (DATA.memos || []).forEach(m => (m.assignees || []).forEach(a => names.add(a)));
  return [...names].filter(Boolean);
}

// Accès : une personne assignée voit-elle ce partage ? (sinon affichage ambre)
const NO_ACCESS_TIP = "N'a pas accès à ce partage — ne verra pas ce mémo.";
function shareNoAccess(name) {
  const members = new Set((DATA.members || []).map(n => (n || '').toLowerCase().trim()));
  return !members.has((name || '').toLowerCase().trim());
}

const COMMENT_PRIO_COL = { 1: '#ff5252', 2: 'var(--warn)', 3: '#66bb6a' };
const seenMarked = new Set();

function markMemoSeen(memoId) {
  if (seenMarked.has(memoId)) return;
  seenMarked.add(memoId);
  fetch(API + '/memo/' + memoId + '/seen', { method: 'POST', headers: { 'X-Guest-Token': guestToken() } }).catch(() => {});
}

// Autocomplete @ sur un <input> simple (réutilise .mention-menu).
function attachInputMention(input, getNames) {
  const menu = document.createElement('div');
  menu.className = 'mention-menu';
  menu.style.display = 'none';
  (input.closest('dialog') || document.body).appendChild(menu);
  let open = false, items = [], active = 0, qstart = -1;
  const close = () => { open = false; menu.style.display = 'none'; };
  const draw = () => {
    menu.innerHTML = '';
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'mention-item' + (i === active ? ' active' : '');
      row.textContent = it.add ? ('➕ Ajouter « ' + it.value + ' »') : ('@' + it.value);
      row.addEventListener('mousedown', (e) => { e.preventDefault(); pick(i); });
      menu.appendChild(row);
    });
  };
  const place = () => {
    const r = input.getBoundingClientRect();
    menu.style.left = Math.round(r.left) + 'px';
    menu.style.top = Math.round(r.bottom + 4) + 'px';
    menu.style.minWidth = Math.round(r.width) + 'px';
  };
  const pick = (i) => {
    const it = items[i]; if (!it) { close(); return; }
    const name = String(it.value).trim(); if (!name) { close(); return; }
    const val = input.value, pos = input.selectionStart;
    input.value = val.slice(0, qstart) + '@' + name + ' ' + val.slice(pos);
    const np = qstart + name.length + 2;
    input.setSelectionRange(np, np);
    close(); input.focus();
  };
  const detect = () => {
    const before = input.value.slice(0, input.selectionStart);
    const m = /(?:^|\s)@([^\s@]*)$/.exec(before);
    if (!m) { close(); return; }
    qstart = input.selectionStart - m[1].length - 1;
    const q = m[1].toLowerCase();
    const all = (getNames() || []).filter(Boolean);
    const list = all.filter(n => n.toLowerCase().includes(q)).map(v => ({ value: v }));
    if (m[1] && !all.some(n => n.toLowerCase() === q)) list.push({ value: m[1], add: true });
    items = list;
    if (!items.length) { close(); return; }
    if (active >= items.length) active = 0;
    draw(); place(); menu.style.display = 'block'; open = true;
  };
  input.addEventListener('input', detect);
  input.addEventListener('keydown', (e) => {
    if (!open || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); active = (active + 1) % items.length; draw(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); e.stopImmediatePropagation(); active = (active - 1 + items.length) % items.length; draw(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); e.stopImmediatePropagation(); pick(active); }
    else if (e.key === 'Escape') { e.stopImmediatePropagation(); close(); }
  });
  input.addEventListener('blur', () => setTimeout(close, 150));
}

function openEditor(memo, contentEl, taskEl) {
  const q = getShareQuill();
  if (!q) {
    if (taskEl.querySelector('.edit-ta')) return;
    const ta = document.createElement('textarea');
    ta.className = 'edit-ta';
    ta.rows = 4;
    ta.value = memo.content;
    contentEl.replaceWith(ta);
    ta.focus();
    const save = () => {
      const v = ta.value.trim();
      if (v && v !== memo.content) put(memo.id, { content: v });
      else load();
    };
    ta.addEventListener('blur', save);
    ta.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); ta.blur(); }
      if (ev.key === 'Escape') { ta.removeEventListener('blur', save); load(); }
    });
    return;
  }
  editingId = memo.id;
  const titleEl = document.getElementById('q-title');
  if (titleEl) titleEl.value = memo.title || '';
  editAssignees = [...(memo.assignees || [])];
  renderQPeople();
  q.setContents([]);
  if (isRich(memo.content)) q.clipboard.dangerouslyPasteHTML(0, memo.content);
  else q.setText(memo.content);
  editDialog.showModal();
  q.focus();
}

document.getElementById('edit-cancel').addEventListener('click', () => editDialog.close());
document.getElementById('edit-save').addEventListener('click', (ev) => withBusy(ev.currentTarget, async () => {

}));

async function put(memoId, body) {

let FILTER = 'all';
let PFILTER = 'all';
let dragShareMemo = null;
let dragShareProj = null;

function projChildren(pid) { return (DATA.projects || []).filter(p => p.parent_id === pid); }
function projDescendants(pid) {
  const out = [];
  const walk = (id) => projChildren(id).forEach(c => { out.push(c.id); walk(c.id); });
  walk(pid);
  return out;
}

function scopedMemos() {
  if (PFILTER === 'all') return DATA.memos;
  const set = new Set([PFILTER, ...projDescendants(PFILTER)]);
  return DATA.memos.filter(m => set.has(m.project_id));
}

async function guestPut(url, body) {
  const r = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    if (err.error) notify(err.error, { error: true });
  }
  await load();
}

function renderSidebar() {
  const nav = document.getElementById('snav');
  const show = DATA.kind === 'project' && (DATA.projects || []).length > 0;
  nav.hidden = !show;
  if (!show) return;
  nav.innerHTML = '';

  const mkItem = (label, icon, count, key, depth, proj) => {
    const item = el('div', 'sitem' + (PFILTER === key ? ' active' : ''));
    item.style.paddingLeft = (0.6 + (depth || 0) * 0.9) + 'rem';
    if (icon) item.appendChild(icon);
    item.appendChild(el('span', 'slabel', label));
    item.appendChild(el('span', 'cnt', String(count)));
    const select = () => { PFILTER = key; render(); };
    if (proj && canEditNow()) {
      let timer = null;
      item.addEventListener('click', () => {
        if (timer) { clearTimeout(timer); timer = null; openProjEditor(proj); return; }
        timer = setTimeout(() => { timer = null; select(); }, 250);
      });
      item.addEventListener('contextmenu', (e) => { e.preventDefault(); openProjEditor(proj); });
      item.title = 'Double-clic ou clic droit pour modifier';
    } else {
      item.addEventListener('click', select);
    }
    return item;
  };

  const pendingAll = DATA.memos.filter(m => !m.done).length;
  nav.appendChild(mkItem('Tous', el('span', '', '🗂'), pendingAll, 'all', 0));

  const renderTree = (p, depth) => {
    const icon = el('span', '');
    icon.style.cssText = 'display:inline-flex;align-items:center;gap:0.25rem;flex-shrink:0';
    if (p.emoji) icon.appendChild(el('span', '', p.emoji));
    if (p.color) {
      const d = el('span', 'sdot');
      d.style.background = p.color;
      if (p.emoji) { d.style.width = '0.4rem'; d.style.height = '0.4rem'; }
      icon.appendChild(d);
    }
    if (!p.emoji && !p.color) {
      const d = el('span', 'sdot');
      d.style.background = 'var(--gray)';
      icon.appendChild(d);
    }
    const count = DATA.memos.filter(m => m.project_id === p.id && !m.done).length;
    const item = mkItem(p.name, icon, count, p.id, depth, p);

    if (canEditNow()) {
      if (p.id !== DATA.root_id) {
        item.draggable = true;
        item.title = 'Double-clic ou clic droit pour modifier · glisser pour déplacer';
        item.addEventListener('dragstart', (e) => { dragShareProj = p.id; e.dataTransfer.effectAllowed = 'move'; });
        item.addEventListener('dragend', () => { dragShareProj = null; });
      }
      item.addEventListener('dragover', (e) => {
        if (!dragShareMemo && !dragShareProj) return;
        if (dragShareProj && (dragShareProj === p.id || projDescendants(dragShareProj).includes(p.id))) return;
        e.preventDefault();
        item.classList.add('droptarget');
      });
      item.addEventListener('dragleave', () => item.classList.remove('droptarget'));
      item.addEventListener('drop', async (e) => {
        e.preventDefault();
        item.classList.remove('droptarget');
        if (dragShareMemo) {
          await guestPut(API + '/memo/' + dragShareMemo, { project_id: p.id });
        } else if (dragShareProj && dragShareProj !== p.id) {
          await guestPut(API + '/project/' + dragShareProj, { parent_id: p.id });
        }
      });
    }
    nav.appendChild(item);
    projChildren(p.id).forEach(c => renderTree(c, depth + 1));
  };
  const root = (DATA.projects || []).find(p => p.id === DATA.root_id);
  if (root) renderTree(root, 0);
}

}

let activeMap = null;

function openShareMap() {
  if (typeof L === 'undefined') { notify('Carte indisponible (fichiers Leaflet manquants).', { error: true }); return; }
  const prios = Object.fromEntries((DATA.priorities || []).map(p => [p.id, p]));
  const points = [];
  scopedMemos().forEach(m => {
    if (!m.location) return;
    points.push({
      lat: m.location.lat, lng: m.location.lng,
      title: (m.emoji ? m.emoji + ' ' : '') + (isRich(m.content) ? stripTags(m.content) : m.content).slice(0, 60),
      sub: m.location.label || '',
      color: (prios[m.priority] || {}).color || '#4fc3f7',
    });
  });
  (DATA.projects || []).forEach(p => {
    if (p.location && (PFILTER === 'all' || p.id === PFILTER || projDescendants(PFILTER).includes(p.id))) {
      points.push({ lat: p.location.lat, lng: p.location.lng, title: '📁 ' + p.name, sub: p.location.label || '', color: p.color || '#81c784' });
    }
  });
  if (!points.length) { notify('Aucun point géolocalisé dans cette vue.'); return; }
  const dlg = document.getElementById('map-dialog');
  document.getElementById('map-title').textContent = '🗺 ' + DATA.title + ' (' + points.length + ' point' + (points.length > 1 ? 's' : '') + ')';
  dlg.showModal();
  if (activeMap) { activeMap.remove(); activeMap = null; }
  activeMap = L.map('map-el');
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(activeMap);
  const latlngs = [];
  const listEl = document.getElementById('map-list');
  listEl.innerHTML = '';
  points.forEach(p => {
    const ll = [p.lat, p.lng];
    latlngs.push(ll);
    const marker = L.circleMarker(ll, { radius: 9, color: p.color, weight: 2, fillColor: p.color, fillOpacity: 0.55 })
      .addTo(activeMap)
      .bindPopup('<strong>' + p.title.replace(/</g, '&lt;') + '</strong>' + (p.sub ? '<br>' + p.sub.replace(/</g, '&lt;') : ''));
    const row = document.createElement('button');
    row.type = 'button';
    row.style.cssText = 'display:flex;align-items:flex-start;gap:0.4rem;text-align:left;font-size:0.8rem;padding:0.35rem 0.5rem;width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer';
    const dot = document.createElement('span');
    dot.style.cssText = 'width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:0.25rem;background:' + p.color;
    row.appendChild(dot);
    const txt = document.createElement('span');
    txt.style.cssText = 'min-width:0;overflow-wrap:anywhere';
    const strong = document.createElement('strong');
    strong.textContent = p.title;
    txt.appendChild(strong);
    if (p.sub) {
      const sub = document.createElement('div');
      sub.textContent = p.sub;
      sub.style.cssText = 'color:var(--muted);font-size:0.72rem';
      txt.appendChild(sub);
    }
    row.appendChild(txt);
    row.addEventListener('click', () => { activeMap.setView(ll, 16); marker.openPopup(); });
    listEl.appendChild(row);
  });
  setTimeout(() => {
    activeMap.invalidateSize();
    if (latlngs.length === 1) activeMap.setView(latlngs[0], 15);
    else activeMap.fitBounds(latlngs, { padding: [30, 30] });
  }, 60);
}

function stripTags(html) {

    ['today', "Aujourd'hui", '#4caf50', ms.filter(m => !m.done && m.due_date === t).length],
    ['sched', 'Planifiés', 'var(--guest)', ms.filter(m => !m.done && m.due_date > t).length],
    ['late', 'En retard', 'var(--danger)', ms.filter(m => !m.done && m.due_date && m.due_date < t).length],
    ['done', 'Terminés', 'var(--warn)', ms.filter(m => m.done).length],

    projSel.hidden = false;
    const prev = projSel.value;
    projSel.innerHTML = '';
    DATA.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      projSel.appendChild(opt);
    });
    if (prev) projSel.value = prev;
  } else {
    projSel.hidden = true;
  }
  renderGuestBanner();
  renderSidebar();
  renderTiles();
  applyA11y();

  if (!projSel.hidden && PFILTER !== 'all') projSel.value = String(PFILTER);

  const list = document.getElementById('list');
  list.innerHTML = '';
  if (FILTER === 'trash') { renderShareTrash(list); return; }
  const visible = visibleShareMemos();
  if (!visible.length) {
    list.appendChild(el('div', 'empty', 'Rien dans cette vue. 🎉'));
    return;
  }
  const prios = Object.fromEntries((DATA.priorities || []).map(p => [p.id, p]));
  visible.forEach(memo => {
    const t = el('div', 'task' + (memo.done ? ' done' : ''));
    if (canEditNow() && DATA.kind === 'project') {
      t.draggable = true;
      t.addEventListener('dragstart', (e) => { dragShareMemo = memo.id; e.dataTransfer.effectAllowed = 'move'; });
      t.addEventListener('dragend', () => { dragShareMemo = null; });
    }
    const prio = prios[memo.priority];
    if (prio && prio.color && !memo.done) t.style.borderLeftColor = prio.color;

    const row = el('div', 'task-row');
    const check = el('button', 'task-check', '✓');
    check.disabled = !canEditNow();
    check.title = canEditNow() ? (memo.done ? 'Rouvrir' : 'Terminer') : 'Identification requise pour modifier';
    check.addEventListener('click', () => { if (canEditNow()) put(memo.id, { done: !memo.done }); });
    row.appendChild(check);

    const content = el('div', 'task-content');
    if (memo.title) {
      const tl = el('div', '', '');
      tl.style.cssText = 'font-weight:600;font-size:0.95rem;margin-bottom:0.15rem';
      if (memo.emoji) {
        const em = el('span', '', memo.emoji);
        em.style.marginRight = '0.35rem';
        tl.appendChild(em);
      }
      tl.appendChild(document.createTextNode(memo.title));
      content.appendChild(tl);
    } else if (memo.emoji) {
      const em = el('span', '', memo.emoji);
      em.style.marginRight = '0.35rem';
      content.appendChild(em);
    }
    if (isRich(memo.content)) content.appendChild(sanitize(memo.content));
    else content.appendChild(linkifyText(memo.content));
    content.querySelectorAll('.mention[data-mention]').forEach(sp => {
      if (shareNoAccess(sp.getAttribute('data-mention'))) { sp.classList.add('noaccess'); sp.title = NO_ACCESS_TIP; }
    });
    content.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]').forEach((li, i) => {
      if (!canEditNow()) return;
      li.classList.add('cl-edit');
      li.title = 'Cliquer pour cocher / décocher';
      li.addEventListener('click', () => {
        const tpl = document.createElement('template');
        tpl.innerHTML = memo.content;
        const items = tpl.content.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]');
        if (!items[i]) return;
        items[i].setAttribute('data-list', items[i].getAttribute('data-list') === 'checked' ? 'unchecked' : 'checked');
        put(memo.id, { content: tpl.innerHTML });
      });
    });
    row.appendChild(content);

    if (memo.location) {
      const la = el('a', 'badge'); la.append(shareIcon('map-pin'), memo.location.label ? ' ' + memo.location.label : '');
      la.href = 'https://www.openstreetmap.org/?mlat=' + memo.location.lat + '&mlon=' + memo.location.lng + '#map=17/' + memo.location.lat + '/' + memo.location.lng;
      la.target = '_blank';
      la.rel = 'noopener noreferrer';
      la.style.cssText = 'text-decoration:none;color:var(--accent)';
      la.title = 'Voir sur la carte';
      row.appendChild(la);
    }
    (memo.assignees || []).forEach(a => {
      const noAcc = shareNoAccess(a);
      const ab = el('span', 'badge', (noAcc ? '⚠ @' : '@') + a.replace(/@.*$/, ''));
      ab.title = noAcc ? (a + ' — ' + NO_ACCESS_TIP) : ('Assigné à ' + a);
      ab.style.color = noAcc ? 'var(--warn)' : 'var(--assignee)';
      row.appendChild(ab);
    });
    if (memo.project) row.appendChild(el('span', 'badge', memo.project));
    if (memo.due_date) row.appendChild(el('span', 'badge', '📅 ' + new Date(memo.due_date + 'T00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })));
    t.appendChild(row);

    (memo.subtasks || []).forEach((st, i) => {
      const s = el('div', 'subtask' + (st.done ? ' stdone' : ''));
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!st.done;
      cb.disabled = !canEditNow();
      cb.addEventListener('change', () => {
        const next = memo.subtasks.map((x, j) => j === i ? { ...x, done: cb.checked } : x);
        put(memo.id, { subtasks: next });
      });
      s.appendChild(cb);
      s.appendChild(el('span', '', st.content));
      t.appendChild(s);
    });

    const makeItemAdd = () => {
      const addItem = document.createElement('input');
      addItem.className = 'item-add';
      addItem.placeholder = '+ Ajouter un article… (Entrée)';
      addItem.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const val = addItem.value.trim();
        if (!val) return;
        const tpl = document.createElement('template');
        tpl.innerHTML = memo.content || '';
        let target = null;
        [...tpl.content.querySelectorAll('ul, ol')].reverse().some(l => {
          if (l.querySelector('li[data-list="checked"], li[data-list="unchecked"]')) { target = l; return true; }
          return false;
        });
        if (!target) {
          target = document.createElement('ul');
          tpl.content.appendChild(target);
        }
        const li = document.createElement('li');
        li.setAttribute('data-list', 'unchecked');
        li.textContent = val;
        target.appendChild(li);
        put(memo.id, { content: tpl.innerHTML });
      });
      return addItem;
    };
    const hasChecklist = !!content.querySelector('li[data-list]');
    if (canEditNow() && hasChecklist) {
      t.appendChild(makeItemAdd());
    }

    if ((memo.comments || []).length || canEditNow()) {
      const cwrap = el('div', '');
      cwrap.style.cssText = 'margin:0.4rem 0 0 1.75rem';
      const comments = memo.comments || [];
      const renderC = (c, isReply) => {
        const r = el('div', '');
        r.style.cssText = 'display:flex;gap:0.5rem;align-items:flex-start;font-size:0.82rem;padding:0.3rem 0.5rem;background:var(--bg);border-radius:6px;margin-top:0.3rem' + (isReply ? ';margin-left:1.5rem;border-left:2px solid var(--border)' : '');
        if (c.priority) {
          const pp = el('span', '', 'P' + c.priority);
          pp.style.cssText = 'flex-shrink:0;font-size:0.66rem;font-weight:700;color:#10141a;border-radius:4px;padding:0 0.3rem;line-height:1.5;background:' + (COMMENT_PRIO_COL[c.priority] || 'var(--muted)');
          r.appendChild(pp);
        }
        const author = (c.author || '').replace(/\s*<[^>]*>/, '');
        const a = el('span', '', author);
        a.style.cssText = 'font-weight:600;flex-shrink:0' + (c.guest ? ';color:var(--guest)' : '');
        a.title = c.author;
        r.appendChild(a);
        const b = el('span', '', c.body);
        b.style.cssText = 'flex:1;min-width:0;white-space:pre-wrap;overflow-wrap:anywhere';
        r.appendChild(b);
        const w = el('span', '', new Date(c.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }));
        w.style.cssText = 'color:var(--muted);font-size:0.7rem;flex-shrink:0';
        w.title = new Date(c.created_at).toLocaleString('fr-FR');
        r.appendChild(w);
        const self = (GUEST && (GUEST.name || GUEST.email)) || '';
        const others = (c.seen || []).filter(v => v && v !== author && v !== self);
        if (others.length) {
          const s = el('span', ''); s.append(shareIcon('eye'), ' ' + others.join(', '));
          s.style.cssText = 'color:var(--muted);font-size:0.7rem;flex-shrink:0;white-space:nowrap';
          s.title = 'Vu par ' + others.join(', ');
          r.appendChild(s);
        }
        if (!isReply && canEditNow()) {
          const rep = el('span', ''); rep.appendChild(shareIcon('reply'));
          rep.style.cssText = 'cursor:pointer;color:var(--muted);flex-shrink:0';
          rep.title = 'Répondre';
          rep.addEventListener('click', () => {
            if (r.nextSibling && r.nextSibling.classList && r.nextSibling.classList.contains('reply-box')) { r.nextSibling.remove(); return; }
            const rb = shareCommentInput(memo, c.id);
            rb.classList.add('reply-box');
            rb.style.marginLeft = '1.5rem';
            r.after(rb);
            rb.querySelector('input').focus();
          });
          r.appendChild(rep);
        }
        cwrap.appendChild(r);
      };
      comments.filter(c => !c.parent_id).forEach(c => {
        renderC(c, false);
        comments.filter(ch => ch.parent_id === c.id).forEach(ch => renderC(ch, true));
      });
      if (canEditNow()) cwrap.appendChild(shareCommentInput(memo, null));
      t.appendChild(cwrap);
      if (comments.length && canEditNow()) markMemoSeen(memo.id);
    }

    if ((memo.images || []).length) {
      const th = el('div', 'thumbs');
      memo.images.forEach(name => {
        const wrap = el('span', 'thumb-wrap');
        const img = document.createElement('img');
        img.src = API + '/image/' + name;
        img.loading = 'lazy';
        img.addEventListener('click', () => {
          const lb = document.getElementById('lightbox');
          lb.querySelector('img').src = img.src;
          lb.showModal();
        });
        wrap.appendChild(img);
        if (canEditNow()) {
          const del = document.createElement('button');
          del.className = 'thumb-del';
          del.textContent = '×';
          del.title = 'Supprimer cette image';
          del.addEventListener('click', async (e) => {
            e.stopPropagation();
            const r = await fetch(API + '/memo/' + memo.id + '/images/' + name, {
              method: 'DELETE', headers: { 'X-Guest-Token': guestToken() },
            });
            if (r.ok) await load();
          });
          wrap.appendChild(del);
        }
        th.appendChild(wrap);
      });
      t.appendChild(th);
    }

    if (canEditNow()) {
      const tools = el('div', 'memo-tools');
      const dateIn = document.createElement('input');
      dateIn.type = 'date';
      dateIn.value = memo.due_date || '';
      dateIn.title = 'Échéance';
      dateIn.addEventListener('change', () => put(memo.id, { due_date: dateIn.value }));
      tools.appendChild(dateIn);

      const prios = DATA.priorities || [];
      const pBtn = document.createElement('button');
      pBtn.className = 'tool-btn';
      pBtn.title = 'Priorité — cliquer pour changer';
      const cur = prios.find(x => x.id === memo.priority);
      pBtn.textContent = ''; pBtn.append(shareIcon('flag'), ' ' + (cur ? cur.name : 'Priorité'));
      if (cur && cur.color) {
        pBtn.style.background = cur.color;
        pBtn.style.borderColor = cur.color;
        pBtn.style.color = '#10141a';
      }
      pBtn.addEventListener('click', () => {
        const ids = [0, ...prios.map(p => p.id)];
        const next = ids[(ids.indexOf(memo.priority || 0) + 1) % ids.length];
        put(memo.id, { priority: next });
      });
      tools.appendChild(pBtn);

      const fileIn = document.createElement('input');
      fileIn.type = 'file';
      fileIn.accept = 'image/png,image/jpeg';
      fileIn.multiple = true;
      fileIn.hidden = true;
      fileIn.addEventListener('change', async () => {
        for (const f of fileIn.files) {
          const fd = new FormData();
          fd.append('image', f);
          const r = await fetch(API + '/memo/' + memo.id + '/images', {
            method: 'POST', headers: { 'X-Guest-Token': guestToken() }, body: fd,
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            notify('Image refusée : ' + (err.error || r.statusText), { error: true });
          }
        }
        await load();
      });
      const photoBtn = document.createElement('button');
      photoBtn.className = 'tool-btn';
      photoBtn.append(shareIcon('camera'), ' Photo');
      photoBtn.title = 'Ajouter une photo (JPG ou PNG uniquement)';
      photoBtn.addEventListener('click', () => fileIn.click());
      tools.appendChild(photoBtn);
      tools.appendChild(fileIn);

      if (!hasChecklist) {
        const listBtn = document.createElement('button');
        listBtn.className = 'tool-btn';
        listBtn.append(shareIcon('checklist'), ' Liste');
        listBtn.title = 'Démarrer une liste à cocher dans ce mémo';
        listBtn.addEventListener('click', () => {
          if (t.querySelector('.item-add')) { t.querySelector('.item-add').focus(); return; }
          const input = makeItemAdd();
          tools.before(input);
          input.focus();
        });
        tools.appendChild(listBtn);
      }

      const locBtn = document.createElement('button');
      locBtn.className = 'tool-btn';
      locBtn.append(shareIcon('map-pin'), memo.location ? ' ×' : ' Position');
      locBtn.title = memo.location ? 'Retirer la position' : 'Attacher ma position GPS à ce mémo';
      locBtn.addEventListener('click', () => {
        if (memo.location) { put(memo.id, { location: null }); return; }
        if (!navigator.geolocation) { notify('Géolocalisation non disponible.', { error: true }); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => put(memo.id, { location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }),
          () => notify('Position refusée ou indisponible.', { error: true }),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
      tools.appendChild(locBtn);

      const addrIn = document.createElement('input');
      addrIn.type = 'text';
      addrIn.placeholder = '📍 Adresse… (Entrée)';
      addrIn.title = 'Chercher une adresse et l\'attacher au mémo';
      addrIn.style.cssText = 'width:10rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;padding:0.25rem 0.45rem';
      addrIn.addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const q = addrIn.value.trim();
        if (q.length < 3) return;
        const r = await fetch(API + '/geocode?q=' + encodeURIComponent(q), { headers: { 'X-Guest-Token': guestToken() } });
        const data = r.ok ? await r.json() : { results: [] };
        if (!data.results.length) { notify('Adresse introuvable : « ' + q + ' »'); return; }
        const best = data.results[0];
        await put(memo.id, { location: best });
      });
      tools.appendChild(addrIn);

      const titleIn = document.createElement('input');
      titleIn.type = 'text';
      titleIn.placeholder = '🏷 Titre…';
      titleIn.maxLength = 200;
      titleIn.value = memo.title || '';
      titleIn.title = 'Titre du mémo (optionnel)';
      titleIn.style.cssText = 'width:9rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;font-weight:600;padding:0.25rem 0.45rem';
      titleIn.addEventListener('change', () => put(memo.id, { title: titleIn.value.trim() }));
      titleIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); titleIn.blur(); } });
      tools.appendChild(titleIn);

      const asgIn = document.createElement('input');
      asgIn.type = 'text';
      asgIn.placeholder = '+ @personne';
      asgIn.title = 'Rattacher une personne à cette tâche (Entrée). Cliquer un badge @ pour retirer.';
      asgIn.setAttribute('list', 'share-assignees');
      let sdl = document.getElementById('share-assignees');
      if (!sdl) {
        sdl = document.createElement('datalist');
        sdl.id = 'share-assignees';
        document.body.appendChild(sdl);
      }
      sdl.innerHTML = '';
      (DATA.members || []).forEach(n => {
        const o = document.createElement('option');
        o.value = n;
        sdl.appendChild(o);
      });
      asgIn.style.cssText = 'width:8rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;padding:0.25rem 0.45rem';
      asgIn.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const name = asgIn.value.replace(/^@/, '').trim();
        if (!name) return;
        put(memo.id, { assignees: [...(memo.assignees || []), name] });
      });
      tools.appendChild(asgIn);
      if ((memo.assignees || []).length) {
        const rmBtn = document.createElement('button');
        rmBtn.className = 'tool-btn';
        rmBtn.textContent = '× @';
        rmBtn.title = 'Retirer le dernier assigné (' + memo.assignees[memo.assignees.length - 1] + ')';
        rmBtn.addEventListener('click', () => put(memo.id, { assignees: memo.assignees.slice(0, -1) }));
        tools.appendChild(rmBtn);
      }

      const eBtn = document.createElement('button');
      eBtn.className = 'tool-btn';
      eBtn.append(shareIcon('pencil'), ' Modifier');
      eBtn.title = 'Éditer le texte (mise en forme, listes, couleurs…)';
      eBtn.addEventListener('click', () => openEditor(memo, content, t));
      tools.appendChild(eBtn);

      const dBtn = document.createElement('button');
      dBtn.className = 'tool-btn';
      dBtn.appendChild(shareIcon('trash'));
      dBtn.title = 'Mettre ce mémo à la corbeille (restaurable depuis la tuile 🗑)';
      dBtn.addEventListener('click', async () => {
        const r = await fetch(API + '/memo/' + memo.id, {
          method: 'DELETE', headers: { 'X-Guest-Token': guestToken() },
        });
        if (r.ok) await load();
      });
      tools.appendChild(dBtn);
      t.appendChild(tools);
    }
    list.appendChild(t);
  });
}

async function load() {
  const r = await fetch(API + '/data');
  if (!r.ok) {
    document.getElementById('title').textContent = 'Lien invalide ou révoqué';
    document.getElementById('list').innerHTML = '';
    document.getElementById('guest-banner').hidden = true;
    document.getElementById('add-bar').hidden = true;
    return;
  }
  DATA = await r.json();
  await refreshGuest();
  render();
}

document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').close());
const addInput = document.getElementById('add-input');
async function addMemo() {
  const content = addInput.value.trim();
  if (!content) return;
  const projSel = document.getElementById('add-project');
  const body = { content };
  if (!projSel.hidden && projSel.value) body.project_id = Number(projSel.value);
  const r = await fetch(API + '/memos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify(body),
  });
  if (r.ok) { addInput.value = ''; await load(); }
}
addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addMemo(); });
document.getElementById('add-btn').addEventListener('click', (e) => withBusy(e.currentTarget, addMemo));

const projInput = document.getElementById('proj-input');
async function addSubProject() {
  const name = projInput.value.trim();
  if (!name) return;
  const r = await fetch(API + '/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify({ name }),
  });
  if (r.ok) { projInput.value = ''; await load(); }
  else {
    const err = await r.json().catch(() => ({}));
    notify(err.error || 'Création impossible', { error: true });
  }
}
projInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addSubProject(); });
document.getElementById('proj-btn').addEventListener('click', (e) => withBusy(e.currentTarget, addSubProject));

load();
setInterval(load, 15000);

/* ------------------------------------------------ animations GSAP
   Dégrade proprement si gsap.min.js est absent.
   load() est rappelé toutes les 15 s ; on n'anime l'entrée QUE quand
   le filtre ou le projet change (FILTER|PFILTER), pas à chaque refresh. */
window.addEventListener('DOMContentLoaded', () => {
  const g = window.gsap;
  if (!g) return;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function stagger(sel, opts) {
    if (reduce) return;
    const nodes = document.querySelectorAll(sel);
    if (!nodes.length) return;
    g.killTweensOf(nodes);
    g.fromTo(nodes,
      { autoAlpha: 0, y: 14 },
      Object.assign({
        autoAlpha: 1, y: 0, duration: 0.4, ease: 'power2.out',
        stagger: 0.045, overwrite: true, clearProps: 'transform,opacity,visibility',
      }, opts || {}));
  }
  function countUp(node) {
    const to = parseInt(node.textContent, 10);
    if (isNaN(to) || reduce) return;
    const o = { v: 0 };
    g.fromTo(o, { v: 0 }, {
      v: to, duration: 0.7, ease: 'power1.out', snap: { v: 1 },
      onUpdate: () => { node.textContent = Math.round(o.v); },
    });
  }
  function animateView() {
    stagger('#tiles .tile', { y: 10, duration: 0.35, stagger: 0.03 });
    stagger('#list .task');
    document.querySelectorAll('#tiles .tn').forEach(countUp);
  }

  const viewKey = () => [typeof FILTER !== 'undefined' ? FILTER : '', typeof PFILTER !== 'undefined' ? PFILTER : ''].join('|');
  let lastKey = null;
  let firstPaint = true;

  function playIntro() {
    if (!firstPaint) return;
    firstPaint = false;
    lastKey = viewKey();
    if (!reduce) {
      g.from('header', { y: -20, autoAlpha: 0, duration: 0.4, ease: 'power2.out', clearProps: 'all' });
      g.from('#snav .sitem', { x: -12, autoAlpha: 0, duration: 0.3, stagger: 0.03, ease: 'power2.out', delay: 0.08, clearProps: 'all' });
    }
    animateView();
  }

  const _render = render;
  render = function () {
    const r = _render.apply(this, arguments);
    if (firstPaint) { playIntro(); }
    else { const k = viewKey(); if (k !== lastKey) { lastKey = k; animateView(); } }
    return r;
  };

  if (document.querySelector('#list .task') || document.querySelector('#tiles .tile')) playIntro();

  // Entrée des pop-ins : gérée en CSS (@keyframes dlg-in / dlg-bd).
  // Ne pas wrapper showModal pour animer le <dialog> via GSAP : poser un transform
  // dessus le sort du top-layer Chromium et casse le centrage + le backdrop.
});
</script>

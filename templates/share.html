<style>
:root {
  --bg: #0e1217; --panel: #161d25; --panel-2: #212b35; --text: #e8eef5;
  --muted: #9aa7b4; --accent: #4fc3f7; --accent-2: #38aee0; --green: #4caf50; --border: #283340;
  --danger: #ff8a80; --warn: #ffb74d; --guest: #b39ddb; --assignee: #80cbc4;
  --bg-elev: #1c2530; --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 2px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.18);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.4);
  --ring: 0 0 0 3px rgba(79,195,247,0.22);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
:root[data-theme="light"] {
  --bg: #eef1f5; --panel: #ffffff; --panel-2: #eef2f7; --text: #1b2531;
  --muted: #5c6b7a; --accent: #0288d1; --accent-2: #0277bd; --green: #2e7d32; --border: #d3dce5;
  --danger: #e53935; --warn: #ef6c00; --guest: #6a3fb5; --assignee: #00897b;
  --bg-elev: #f4f7fa;
  --shadow: 0 1px 2px rgba(16,30,50,0.08), 0 2px 8px rgba(16,30,50,0.06);
  --shadow-lg: 0 10px 30px rgba(16,30,50,0.18);
  --ring: 0 0 0 3px rgba(2,136,209,0.28);
}
[data-theme="light"] header { background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.92)), var(--panel); }
[data-theme="light"] #snav { background: linear-gradient(180deg, var(--panel), #eef2f7); }
* { box-sizing: border-box; }
@font-face {
  font-family: 'Inter';
  src: url('/share/assets/Inter.woff2') format('woff2-variations');
  font-weight: 100 900;
  font-display: swap;
}
.ic { width: 1.1em; height: 1.1em; display: inline-block; vertical-align: -0.15em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.ic-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(1200px 600px at 100% -10%, rgba(79,195,247,0.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(79,195,247,0.04), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: 0.01em;
}
::selection { background: rgba(79,195,247,0.28); }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 9px; height: 9px; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem 1.25rem;
  background: linear-gradient(180deg, rgba(33,43,53,0.55), rgba(22,29,37,0.85)), var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(8px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.02), var(--shadow);
}
header h1 { margin: 0; font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.01em; }
header .mode { font-size: 0.75rem; color: var(--muted); background: var(--panel-2); padding: 0.2rem 0.6rem; border-radius: 4px; }
header #theme-btn { margin-left: auto; }
button.icon { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; padding: 0; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: background 0.15s var(--ease), transform 0.1s var(--ease); }
button.icon:hover { background: var(--bg-elev); }
button.icon:active { transform: scale(0.94); }
.dot { width: 0.7rem; height: 0.7rem; border-radius: 50%; display: inline-block; }
#layout { display: flex; min-height: calc(100dvh - 54px); }
#snav {
  width: clamp(170px, 15vw, 230px);
  flex-shrink: 0;
  background: linear-gradient(180deg, var(--panel), rgba(14,18,23,0.4));
  border-right: 1px solid var(--border);
  padding: 0.75rem 0.5rem;
}
#snav[hidden] { display: none; }
.sitem {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.45rem 0.65rem;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.88rem;
  margin-bottom: 3px;
  user-select: none;
  position: relative;
  transition: background 0.15s var(--ease), color 0.15s var(--ease), transform 0.12s var(--ease);
}
.sitem:hover { background: var(--panel-2); color: var(--text); transform: translateX(2px); }
.sitem.active { background: var(--panel-2); color: var(--accent); }
.sitem.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 1.05rem; border-radius: 999px; background: var(--accent);
}
.sitem.droptarget { outline: 1px dashed var(--accent); color: var(--accent); }
.sitem .cnt { margin-left: auto; font-size: 0.72rem; opacity: 0.7; flex-shrink: 0; }
.sitem .slabel { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sitem .cat-edit {
  position: absolute; right: 0.4rem; top: 50%; transform: translateY(-50%);
  flex-shrink: 0; min-height: 0; width: 1.5rem; height: 1.5rem;
  padding: 0; border: none; background: none;
  color: var(--muted); cursor: pointer; border-radius: 5px; opacity: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
.sitem:hover .cat-edit, .sitem:focus-within .cat-edit { opacity: 0.7; }
.sitem .cat-edit:hover { opacity: 1; color: var(--text); background: var(--panel-2); }
.sitem:hover .cnt, .sitem:focus-within .cnt { opacity: 0; }
.sdot { width: 0.6rem; height: 0.6rem; border-radius: 50%; display: inline-block; flex-shrink: 0; }
/* arbre `tree` de la sidebar invité + chevrons de repli */
.sb-tree {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  white-space: pre; color: var(--muted); opacity: 0.55;
  font-size: 0.78rem; flex-shrink: 0; line-height: 1;
}
.sb-proj-chev {
  width: 1.1rem; flex-shrink: 0; text-align: center;
  color: var(--muted); font-size: 0.85rem; line-height: 1; cursor: pointer;
}
/* vue Plan invité (arbre projets → mémos) */
#tree-board { max-width: 720px; margin: 0 auto; }
.tree-toolbar { display: flex; align-items: center; gap: 0.6rem; margin: 0 0 0.6rem; }
.tree-toolbar h2 { margin: 0; font-size: 1.05rem; }
.tree-rows { display: flex; flex-direction: column; }
.tree-row { display: flex; align-items: center; gap: 0.3rem; padding: 0.16rem 0.4rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; min-width: 0; }
.tree-row:hover { background: var(--panel-2); }
.tree-pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre; color: var(--muted); opacity: 0.55; flex-shrink: 0; font-size: 0.8rem; line-height: 1; }
.tree-chev {
  width: 1.4rem; flex-shrink: 0; text-align: center;
  color: var(--muted); font-size: 0.95rem; line-height: 1; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.tree-chev:hover { color: var(--text); }
.tree-check { width: 1rem; flex-shrink: 0; text-align: center; color: var(--green, #4caf50); font-weight: 700; }
.tree-pip { width: 0.55rem; height: 0.55rem; border-radius: 50%; flex-shrink: 0; }
.tree-title { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-proj .tree-title { font-weight: 600; }
.tree-projname { cursor: pointer; }
.tree-projname:hover { color: var(--accent); }
.tree-title.done { text-decoration: line-through; color: var(--muted); }
.tree-count { flex-shrink: 0; font-size: 0.72rem; color: var(--muted); margin-left: 0.3rem; }
.tree-meta { display: flex; gap: 0.4rem; flex-shrink: 0; margin-left: 0.5rem; }
.tcol { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tcol-due { width: 84px; } .tcol-asg { width: 96px; } .tcol-loc { width: 120px; }
.tcol-due.due-late { color: var(--danger); } .tcol-due.due-today { color: var(--warn); }
main { flex: 1; min-width: 0; max-width: 720px; margin: 0 auto; padding: 1.25rem; }
@media (max-width: 900px) {
  #layout { flex-direction: column; }
  #snav { width: 100%; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 0.5rem 0.75rem; gap: 0.3rem;
    /* Navigation projets collante : épinglée sous le header au défilement (--header-h mesuré en JS). */
    position: sticky; top: var(--header-h, 0px); z-index: 9; background: var(--panel); }
  .sitem { flex-shrink: 0; margin-bottom: 0; }
  /* Crayon d'édition projet toujours visible au doigt (le survol n'existe pas). */
  .sitem .cat-edit { opacity: 0.85; }
  /* Barre horizontale : l'arbre vertical n'a pas de sens → masquer connecteurs/chevrons. */
  .sb-tree, .sb-proj-chev { display: none; }
  #tree-board { max-width: 100%; }
  .tree-meta { display: none; }
  .tree-pre { font-size: 0.74rem; }
  .tree-chev { width: 1.8rem; height: 1.8rem; font-size: 1.1rem; }
}
.task {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.6rem 0.8rem;
  margin-bottom: 0.5rem;
  box-shadow: var(--shadow);
  transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease), transform 0.15s var(--ease);
}
.task:hover { border-left-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateX(2px); }
.task-row { display: flex; align-items: flex-start; gap: 0.6rem; }
.task-check {
  width: 1.15rem; height: 1.15rem; border-radius: 50%;
  border: 2px solid var(--muted); background: none; flex-shrink: 0;
  cursor: pointer; margin-top: 0.1rem; padding: 0; font-size: 0.7rem; line-height: 1; color: transparent;
}
.task-check:disabled { cursor: default; opacity: 0.6; }
.task.done .task-check { background: var(--green); border-color: var(--green); color: #fff; }
.task-content { flex: 1; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
.task-edit {
  flex-shrink: 0; min-height: 0; width: 1.6rem; height: 1.6rem; margin-left: auto;
  padding: 0; border: none; background: none; color: var(--muted); cursor: pointer;
  border-radius: 5px; opacity: 0.55; display: inline-flex; align-items: center; justify-content: center;
}
.task:hover .task-edit, .task .task-edit:focus-visible { opacity: 0.9; }
.task-edit:hover { opacity: 1; color: var(--text); background: var(--panel-2); }
@media (max-width: 900px) {
  .task-edit {
    opacity: 1; width: auto; min-width: 46px; min-height: 40px; padding: 0.25rem 0.6rem;
    border: 1px solid var(--accent); border-radius: 10px; background: var(--panel-2); color: var(--accent);
  }
  .task-edit .ic { width: 1.5em; height: 1.5em; }
}
.task.done .task-content { text-decoration: line-through; color: var(--muted); }
.task-content a { color: var(--accent); }
.task-content p { margin: 0 0 0.15rem; }
.task-content ul, .task-content ol { margin: 0.15rem 0; padding-left: 1.3rem; }
.task-content .ql-ui { display: none; }
.task-content li[data-list="checked"], .task-content li[data-list="unchecked"] {
  list-style: none;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding-left: 0;
  margin-left: 0;
  border-radius: 4px;
}
.task-content li[data-list]:empty::before { display: none; }
.task-content li.cl-edit:hover { background: var(--panel-2); cursor: pointer; }
.task-content li[data-list="unchecked"]::before {
  content: '';
  flex: 0 0 auto;
  box-sizing: border-box;
  font-size: 0.85em;
  width: 1em;
  height: 1em;
  margin-top: 0.25em;
  border: 2px solid var(--muted);
  border-radius: 4px;
}
.task-content li[data-list="checked"]::before {
  content: '✓';
  flex: 0 0 auto;
  box-sizing: border-box;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  width: 1em;
  height: 1em;
  margin-top: 0.25em;
  background: var(--green);
  border: 2px solid var(--green);
  border-radius: 4px;
  color: #fff;
  line-height: 1;
}
.task-content li[data-list="checked"] { text-decoration: line-through; color: var(--muted); }
.badge { font-size: 0.72rem; padding: 0.12rem 0.45rem; border-radius: 4px; background: var(--panel-2); color: var(--muted); white-space: nowrap; flex-shrink: 0; max-width: 13rem; overflow: hidden; text-overflow: ellipsis; }
/* [PHOTO-UI-CONSISTENCY] La page invité n'a pas de `button {}` de base : .prio-btn doit
   être autonome (sinon chips carte/photo bruts). Look = cards (token/rayon/hover). */
.prio-btn { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); padding: 0.12rem 0.5rem; font: inherit; font-size: 0.78rem; border-radius: 4px; cursor: pointer; }
.prio-btn:hover { color: var(--text); background: var(--panel); border-color: var(--muted); }
.subtask { display: flex; align-items: center; gap: 0.45rem; font-size: 0.85rem; margin: 0.25rem 0 0 1.75rem; }
.subtask input { accent-color: var(--green); }
.subtask.stdone span { text-decoration: line-through; color: var(--muted); }
.item-add {
  display: block;
  width: calc(100% - 1.75rem);
  margin: 0.45rem 0 0.1rem 1.75rem;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text);
  font: inherit;
  font-size: 0.85rem;
  padding: 0.35rem 0.6rem;
  outline: none;
  box-sizing: border-box;
}
.item-add:focus { border-style: solid; border-color: var(--accent); }
.thumbs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0 0.1rem 1.75rem; }
.thumbs img { height: 72px; max-width: 140px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: zoom-in; }
.thumb-wrap { position: relative; }
/* === [CARD-REDESIGN] parité visuelle invité === */
.task-clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.prio-chip { font-size: 0.66rem; font-weight: 700; border-radius: 4px; padding: 0.05rem 0.4rem; line-height: 1.45; white-space: nowrap; flex-shrink: 0; }
.asg-stack { display: inline-flex; align-items: center; flex-shrink: 0; }
.asg-stack .asg-av { margin-left: -6px; }
.asg-stack .asg-av:first-child { margin-left: 0; }
.asg-av {
  width: 1.35rem; height: 1.35rem; border-radius: 50%; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 700; line-height: 1;
  background: var(--panel-2); color: var(--assignee);
  border: 1px solid var(--assignee); box-shadow: 0 0 0 2px var(--panel);
}
.asg-av.noaccess { color: var(--warn); border-color: var(--warn); }
.thumbs.thumbs-collapsed img { height: 88px; width: 120px; max-width: none; }
.thumbs .thumb-more {
  position: absolute; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 0.7rem; font-weight: 700; padding: 0.05rem 0.4rem;
  border-radius: 6px 0 6px 0; pointer-events: none;
}
.thumb-del {
  position: absolute; top: -6px; right: -6px;
  width: 1.2rem; height: 1.2rem; padding: 0;
  font-size: 0.75rem; line-height: 1; border-radius: 50%;
  background: #f44336; color: #fff; border: none; cursor: pointer;
}
.memo-tools { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin: 0.5rem 0 0 1.75rem; }
/* Détail invité rangé en blocs logiques [EXPAND-DETAIL-REORG]. */
.memo-tools-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; flex-basis: 100%; }
.memo-tools .task-crumb { font-size: 0.8rem; color: var(--muted); }
.memo-tools .task-crumb .me-crumb-node { max-width: 11rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.memo-tools .detail-sep { align-self: stretch; border-left: 1px solid var(--border); margin: 0 0.2rem; }
.tool-btn {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.78rem; padding: 0.25rem 0.6rem; cursor: pointer;
}
.tool-btn:hover { border-color: var(--accent); }
.memo-tools input[type="date"] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.78rem; padding: 0.2rem 0.4rem;
}
.edit-ta {
  width: 100%; box-sizing: border-box;
  background: var(--bg); border: 1px solid var(--accent); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.9rem; padding: 0.4rem; resize: vertical;
}
#guest-banner {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.9rem 1rem;
  margin-bottom: 1rem;
  font-size: 0.9rem;
}
#guest-banner.pending { border-color: #ffc107; }
#guest-banner.approved { border-color: var(--green); font-size: 0.8rem; color: var(--muted); padding: 0.5rem 0.8rem; }
#guest-banner.rejected { border-color: #f44336; }
#guest-banner h2 { margin: 0 0 0.5rem; font-size: 0.95rem; }
#guest-banner p { margin: 0.3rem 0; color: var(--muted); font-size: 0.82rem; }
#guest-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
#guest-form input {
  flex: 1; min-width: 160px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font: inherit; padding: 0.5rem 0.7rem; outline: none;
}
#guest-form input:focus { border-color: var(--accent); }
#guest-form button {
  background: var(--accent); color: #001; border: none; border-radius: 6px;
  padding: 0.5rem 1rem; font: inherit; cursor: pointer;
}
#guest-form input.invalid { border-color: var(--danger); }
#guest-error { flex-basis: 100%; margin: 0.2rem 0 0; color: var(--danger); font-size: 0.82rem; }
#guest-error:empty { display: none; }
#add-bar, #proj-bar { display: flex; gap: 0.5rem; margin: 1rem 0; }
#proj-bar { margin-top: 0.4rem; }
#add-bar[hidden], #proj-bar[hidden], #guest-banner[hidden], #tiles[hidden] { display: none; }
#add-bar select {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.85rem; padding: 0.4rem 0.5rem; max-width: 11rem;
}
#proj-bar input {
  flex: 1; background: var(--panel); border: 1px dashed var(--border); border-radius: 6px;
  color: var(--text); font: inherit; font-size: 0.85rem; padding: 0.45rem 0.8rem; outline: none;
}
#proj-bar input:focus { border-style: solid; border-color: var(--accent); }
#proj-bar button {
  background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.45rem 0.9rem; font: inherit; cursor: pointer;
}
#tiles {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
  gap: 0.45rem;
  margin: 0 0 1rem;
}
.tile {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.45rem 0.65rem;
  cursor: pointer;
  user-select: none;
  box-shadow: var(--shadow);
  transition: background 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.tile:hover { background: var(--panel-2); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.tile .tn { font-weight: 700; float: right; }
.tile .tl { font-size: 0.7rem; font-weight: 600; display: block; }
.tile.active { border-color: var(--accent); background: #15232e; }
#add-bar input {
  flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px;

<script>
const TOKEN = location.pathname.split('/')[2];
const API = '/share/' + TOKEN;
let DATA = null;
let GUEST = { status: 'anonymous', email: '', name: '' };

// Thème clair / sombre (tokens surchargés sous [data-theme=light], persistant)
const themeBtn = document.getElementById('theme-btn');
setTheme((() => { try { return localStorage.getItem('theme'); } catch (e) { return null; } })() === 'light' ? 'light' : 'dark');
if (themeBtn) themeBtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);
window.addEventListener('load', syncHeaderHeight);

function guestToken() { return localStorage.getItem('dashguest:' + TOKEN) || ''; }
function canEditNow() { return DATA && DATA.can_edit && GUEST.status === 'approved'; }

async function refreshGuest() {
  if (!DATA || !DATA.can_edit) return;
  const t = guestToken();
  if (!t) { GUEST = { status: 'anonymous' }; return; }
  try {
    const r = await fetch(API + '/me', { headers: { 'X-Guest-Token': t } });

function renderGuestBanner() {
  const b = document.getElementById('guest-banner');
  b.hidden = !DATA.can_edit;
  if (!DATA.can_edit) return;
  // Le formulaire de connexion invité est affiché tant que l'invité n'est ni
  // approuvé, ni en attente, ni refusé. S'il est déjà à l'écran, NE PAS le
  // reconstruire : le refresh auto (setInterval 15s → load → ici) effacerait
  // ce que l'invité est en train de taper (prénom / e-mail / code).
  const anonymous = !['approved', 'pending', 'rejected'].includes(GUEST.status);
  if (anonymous && document.getElementById('guest-form')) return;
  b.innerHTML = '';
  b.className = '';
  if (GUEST.status === 'approved') {
    b.className = 'approved';
    b.textContent = '✅ Connecté·e en tant que ' + (GUEST.name || GUEST.email) + ' — tes modifications sont signées.';
    return;
  }
  if (GUEST.status === 'pending') {
    b.className = 'pending';
    b.innerHTML = '<h2>⏳ Demande envoyée</h2><p>Le propriétaire doit valider ton accès (' + GUEST.email + '). Cette page se met à jour automatiquement.</p>';
    return;
  }
  if (GUEST.status === 'rejected') {
    b.className = 'rejected';
    b.innerHTML = '<h2>🚫 Accès refusé</h2><p>Le propriétaire n\'a pas validé cette adresse. Tu peux consulter, mais pas modifier.</p>';
    return;
  }
  b.innerHTML = '<h2>✏️ Pour modifier, présente-toi</h2><p>Ton e-mail signe tes modifications. Le code à 4 chiffres t\'a été donné par le propriétaire.</p>';
  const form = el('div', '');
  form.id = 'guest-form';
  const nameIn = document.createElement('input');
  nameIn.placeholder = 'Prénom (optionnel)';
  const emailIn = document.createElement('input');
  emailIn.type = 'email';
  emailIn.placeholder = 'ton@email.fr';
  const pinIn = document.createElement('input');
  pinIn.type = 'text';
  pinIn.inputMode = 'numeric';
  pinIn.maxLength = 4;
  pinIn.placeholder = 'Code';
  pinIn.style.cssText = 'flex:0 0 5.5rem;min-width:5.5rem;text-align:center;letter-spacing:0.3em';
  const btn = document.createElement('button');
  btn.textContent = 'Se connecter';
  const errEl = document.createElement('div');
  errEl.id = 'guest-error';
  errEl.setAttribute('role', 'alert');
  const showErr = (msg, focusEl, markEl) => {
    errEl.textContent = msg;
    [nameIn, emailIn, pinIn].forEach(i => i.classList.remove('invalid'));
    if (markEl) markEl.classList.add('invalid');
    if (focusEl) focusEl.focus();
  };
  const submit = async () => {
    const email = emailIn.value.trim();
    if (!email || !email.includes('@')) { showErr('E-mail invalide.', emailIn, emailIn); return; }
    if (!/^\d{4}$/.test(pinIn.value.trim())) { showErr('Le code est composé de 4 chiffres.', pinIn, pinIn); return; }
    errEl.textContent = '';
    const r = await fetch(API + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name: nameIn.value.trim(), pin: pinIn.value.trim() }),
    });
    if (r.ok) {
      const d = await r.json();
      localStorage.setItem('dashguest:' + TOKEN, d.guest_token);
      GUEST = d;
      renderGuestBanner();
      await load();
    } else {
      const err = await r.json().catch(() => ({}));
      // On NE vide PAS prénom/e-mail : seul le code est remis à zéro et refocus.
      pinIn.value = '';
      showErr(err.error || 'Connexion impossible.', pinIn, pinIn);
    }
  };
  btn.addEventListener('click', submit);
  [nameIn, emailIn, pinIn].forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
  form.appendChild(nameIn);
  form.appendChild(emailIn);
  form.appendChild(pinIn);
  form.appendChild(btn);
  form.appendChild(errEl);
  b.appendChild(form);
}

// Remplace les alert() natifs par une pop-in (cohérent avec le reste de l'app).
function notify(message, { title = 'ℹ️ Info', error = false } = {}) {
  if (typeof announce === 'function') announce(message);
  return new Promise(resolve => {
    const dlg = document.getElementById('notify-dialog');
    document.getElementById('notify-title').textContent = error ? '⚠️ Erreur' : title;
    document.getElementById('notify-msg').textContent = message;
    const ok = document.getElementById('notify-ok');
    const done = () => { dlg.close(); ok.onclick = dlg.oncancel = null; resolve(); };
    ok.onclick = done;
    dlg.oncancel = (e) => { e.preventDefault(); done(); };
    dlg.showModal();
  });
}

// Miroir du confirmPopin propriétaire (index.html) — requis par runImageViewer
// (suppression d'image dans le carrousel) côté invité éditeur.
function confirmPopin(message, { title = 'Confirmer la suppression', okLabel = 'Supprimer', danger = true } = {}) {
  return new Promise(resolve => {
    const dlg = document.getElementById('confirm-dialog');
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = message;
    const yes = document.getElementById('confirm-yes');
    const no = document.getElementById('confirm-no');
    yes.textContent = okLabel;
    yes.className = danger ? 'confirm-danger' : 'primary';
    const done = (val) => {
      dlg.close();
      yes.onclick = no.onclick = dlg.oncancel = null;
      resolve(val);
    };
    yes.onclick = () => done(true);
    no.onclick = () => done(false);
    dlg.oncancel = (e) => { e.preventDefault(); done(false); };
    dlg.showModal();
  });
}

function shareIcon(name) {

}

// Désactive un bouton pendant une action async (anti double-clic).
async function withBusy(btn, fn) {
  if (btn && btn.disabled) return;
  if (btn) { btn.disabled = true; btn.setAttribute('aria-busy', 'true'); btn.style.opacity = '0.6'; }
  try { return await fn(); }
  finally { if (btn) { btn.disabled = false; btn.removeAttribute('aria-busy'); btn.style.opacity = ''; } }
}

function applyA11y() {

function sanitize(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  tpl.content.querySelectorAll('script,style,iframe,object,embed,link,meta,form').forEach(n => n.remove());
  tpl.content.querySelectorAll('*').forEach(n => {
    [...n.attributes].forEach(a => {
      if (/^on/i.test(a.name)) n.removeAttribute(a.name);
      if ((a.name === 'href' || a.name === 'src') && /^\s*javascript:/i.test(a.value)) n.removeAttribute(a.name);
    });
    if (n.tagName === 'A') { n.setAttribute('target', '_blank'); n.setAttribute('rel', 'noopener noreferrer'); }
  });
  return tpl.content;
}

function isRich(c) { return /<(p|div|ul|ol|li|br|strong|em|u|s|a|h[1-6]|blockquote|pre|code|span)[\s>/]/i.test(c || ''); }

function linkifyText(text) {
  const frag = document.createDocumentFragment();
  const re = /https?:\/\/[^\s<>"]+/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    const a = el('a', '', m[0].replace(/^https?:\/\//, ''));
    a.href = m[0]; a.target = '_blank'; a.rel = 'noopener noreferrer';
    frag.appendChild(a);
    last = m.index + m[0].length;
  }
  frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

// Texte lisible sur un fond coloré (chip de priorité). [CARD-REDESIGN] — identique owner.
function textOn(hex) {
  const c = (hex || '').replace('#', '');
  if (c.length < 6) return '#fff';
  const r = parseInt(c.slice(0, 2), 16), g = parseInt(c.slice(2, 4), 16), b = parseInt(c.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) > 150 ? '#15191e' : '#fff';
}
function shareNoAccess(name) {

function renderQContext(memo) {
  const box = document.getElementById('q-context');
  if (!box) return;
  box.innerHTML = '';
  // Fil d'Ariane scopé au partage (📥 Inbox si pas de projet dans le scope).
  // Lecture seule : pas de « créé par » ni de versions (owner-only, invariant 5).
  const byId = {};
  (DATA.projects || []).forEach(p => { byId[p.id] = p; });
  const chain = [];
  let cur = memo.project_id, guard = 0;
  while (cur != null && byId[cur] && guard++ < 50) { chain.push(byId[cur]); cur = byId[cur].parent_id; }
  chain.reverse(); // racine → feuille
  const crumb = el('div', { class: 'me-crumb' });
  crumb.appendChild(el('span', { class: 'me-sep', text: '📌' }));
  if (!chain.length) {
    crumb.appendChild(el('span', { class: 'me-crumb-node', text: '📥 Inbox' }));
  } else {
    chain.forEach((p, i) => {
      if (i) crumb.appendChild(el('span', { class: 'me-sep', text: '›' }));
      crumb.appendChild(el('span', { class: 'me-crumb-node', text: (p.emoji ? p.emoji + ' ' : '') + p.name }));
    });
  }
  box.appendChild(crumb);
  if (memo.created_at) {
    const d = new Date(memo.created_at);
    if (!isNaN(d)) {
      const date = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      const time = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      box.appendChild(el('div', { class: 'me-meta', text: `🕒 Créé le ${date} à ${time}` }));
    }
  }
}

function openEditor(memo, contentEl, taskEl) {
  const q = getShareQuill();
  if (!q) {
    if (taskEl.querySelector('.edit-ta')) return;
    const ta = document.createElement('textarea');
    ta.className = 'edit-ta';
    ta.rows = 4;
    ta.value = memo.content;
    contentEl.replaceWith(ta);
    ta.focus();
    const save = () => {
      const v = ta.value.trim();
      if (v && v !== memo.content) put(memo.id, { content: v });
      else load();
    };
    ta.addEventListener('blur', save);
    ta.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); ta.blur(); }
      if (ev.key === 'Escape') { ta.removeEventListener('blur', save); load(); }
    });
    return;
  }
  editingId = memo.id;
  renderQContext(memo);
  const titleEl = document.getElementById('q-title');
  if (titleEl) titleEl.value = memo.title || '';
  editAssignees = [...(memo.assignees || [])];
  renderQPeople();
  q.setContents([]);
  if (isRich(memo.content)) q.clipboard.dangerouslyPasteHTML(0, memo.content);
  else q.setText(memo.content);
  editDialog.showModal();
  q.focus();
}

function projChildren(pid) { return (DATA.projects || []).filter(p => p.parent_id === pid); }
function projDescendants(pid) {
  const out = [];
  const walk = (id) => projChildren(id).forEach(c => { out.push(c.id); walk(c.id); });

}

function renderSidebar() {
  const nav = document.getElementById('snav');

  nav.innerHTML = '';

  const mkItem = (label, icon, count, key, depth, proj) => {

    const item = el('div', 'sitem' + (GVIEW !== 'plan' && PFILTER === key ? ' active' : ''));

    if (icon) item.appendChild(icon);

    item.appendChild(el('span', 'cnt', String(count)));
    const select = () => { PFILTER = key; GVIEW = 'board'; render(); };
    if (proj && canEditNow()) {
      let timer = null;
      item.addEventListener('click', () => {
        if (timer) { clearTimeout(timer); timer = null; openProjEditor(proj); return; }
        timer = setTimeout(() => { timer = null; select(); }, 250);
      });
      item.addEventListener('contextmenu', (e) => { e.preventDefault(); openProjEditor(proj); });
      item.title = 'Modifier (crayon), double-clic ou clic droit';
      const eb = el('button', 'cat-edit');

      item.appendChild(eb);
    } else {
      item.addEventListener('click', select);
    }
    return item;
  };

  // Item « Plan » en haut (comme côté propriétaire) — bascule la vue Plan.
  const planItem = el('div', 'sitem' + (GVIEW === 'plan' ? ' active' : ''));
  planItem.appendChild(el('span', '', '🌳'));

  planItem.addEventListener('click', () => { GVIEW = 'plan'; render(); });

  const pendingAll = DATA.memos.filter(m => !m.done).length;
  nav.appendChild(mkItem('Tous', el('span', '', '🗂'), pendingAll, 'all', 0));

  // En mobile (barre horizontale) on force le dépli pour que tout reste atteignable.
  const flat = window.matchMedia('(max-width: 900px)').matches;
  const projOpen = (id) => flat || shareSbProjOpen(id);
  const renderTree = (p, ancestorsLast, isLast) => {
    const icon = el('span', '');
    icon.style.cssText = 'display:inline-flex;align-items:center;gap:0.25rem;flex-shrink:0';
    if (p.emoji) icon.appendChild(el('span', '', p.emoji));
    if (p.color) {
      const d = el('span', 'sdot');
      d.style.background = p.color;
      if (p.emoji) { d.style.width = '0.4rem'; d.style.height = '0.4rem'; }
      icon.appendChild(d);
    }
    if (!p.emoji && !p.color) {
      const d = el('span', 'sdot');
      d.style.background = 'var(--gray)';
      icon.appendChild(d);
    }
    const count = DATA.memos.filter(m => m.project_id === p.id && !m.done).length;
    const item = mkItem(p.name, icon, count, p.id, 0, p);

    // Connecteurs `tree` + chevron de repli (façon dashboard propriétaire).
    const kids = projChildren(p.id);
    const conn = treeConnector(ancestorsLast, isLast);
    const chev = el('span', 'sb-proj-chev');
    if (kids.length) {
      const open = projOpen(p.id);
      chev.textContent = open ? '▾' : '▸';
      chev.title = open ? 'Replier ce projet' : 'Déplier ce projet';
      chev.addEventListener('click', (e) => { e.stopPropagation(); toggleShareSbProj(p.id); render(); });
    } else { chev.style.visibility = 'hidden'; }
    item.insertBefore(el('span', 'sb-tree', conn), item.firstChild);
    item.insertBefore(chev, item.firstChild);

    if (canEditNow()) {
      if (p.id !== DATA.root_id) {
        item.draggable = true;
        item.title = 'Double-clic ou clic droit pour modifier · glisser pour déplacer';
        item.addEventListener('dragstart', (e) => { dragShareProj = p.id; e.dataTransfer.effectAllowed = 'move'; });
        item.addEventListener('dragend', () => { dragShareProj = null; });
      }
      item.addEventListener('dragover', (e) => {
        if (!dragShareMemo && !dragShareProj) return;
        if (dragShareProj && (dragShareProj === p.id || projDescendants(dragShareProj).includes(p.id))) return;
        e.preventDefault();
        item.classList.add('droptarget');
      });
      item.addEventListener('dragleave', () => item.classList.remove('droptarget'));
      item.addEventListener('drop', async (e) => {
        e.preventDefault();
        item.classList.remove('droptarget');
        if (dragShareMemo) {
          await guestPut(API + '/memo/' + dragShareMemo, { project_id: p.id });
        } else if (dragShareProj && dragShareProj !== p.id) {
          await guestPut(API + '/project/' + dragShareProj, { parent_id: p.id });
        }
      });
    }
    nav.appendChild(item);
    if (projOpen(p.id)) kids.forEach((c, i) => renderTree(c, [...ancestorsLast, isLast], i === kids.length - 1));
  };
  const root = (DATA.projects || []).find(p => p.id === DATA.root_id);
  if (root) renderTree(root, [], true);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

let activeMap = null;
document.getElementById('map-close').addEventListener('click', () => document.getElementById('map-dialog').close());

function shareMapPoints() {
  const prios = Object.fromEntries((DATA.priorities || []).map(p => [p.id, p]));
  const points = [];
  scopedMemos().forEach(m => {
    if (!m.location) return;
    points.push({
      lat: m.location.lat, lng: m.location.lng,
      title: (m.emoji ? m.emoji + ' ' : '') + (isRich(m.content) ? stripTags(m.content) : m.content).slice(0, 60),
      placeLabel: m.location.label || '',
      sub: m.location.label || '',
      color: m.point_color || (prios[m.priority] || {}).color || DATA.marker_color || '#e53935',
      kind: 'memo', id: m.id, override: m.point_color || '', groups: m.map_groups || [], project_id: m.project_id || null,
    });
  });
  (DATA.projects || []).forEach(p => {
    if (p.location && (PFILTER === 'all' || p.id === PFILTER || projDescendants(PFILTER).includes(p.id))) {
      points.push({ lat: p.location.lat, lng: p.location.lng, title: '📁 ' + p.name, placeLabel: p.location.label || '', sub: p.location.label || '', color: p.point_color || p.color || '#81c784', kind: 'project', id: p.id, override: p.point_color || '', groups: [] });
    }
  });
  return points;
}

async function saveShareGroups(p, groups) {
  const r = await fetch(API + '/memo/' + p.id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify({ map_groups: groups }),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); if (e.error) notify(e.error, { error: true }); return; }
  const obj = (DATA.memos || []).find(x => x.id === p.id);
  if (obj) obj.map_groups = groups;
}

async function saveSharePointColor(p, color) {
  const url = p.kind === 'memo' ? API + '/memo/' + p.id : API + '/project/' + p.id;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify({ marker_color: color }),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); if (e.error) notify(e.error, { error: true }); return; }
  const arr = p.kind === 'memo' ? DATA.memos : DATA.projects;
  const obj = (arr || []).find(x => x.id === p.id);
  if (obj) obj.point_color = color;
}

function stripTags(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  return (tpl.content.textContent || '').replace(/\s+/g, ' ').trim();
}

function renderTiles() {
  const t = todayStr();
  const ms = scopedMemos();
  const defs = [
    ['all', 'En cours', '#4fc3f7', ms.filter(m => !m.done).length],
    ['today', "Aujourd'hui", '#4caf50', ms.filter(m => !m.done && m.due_date === t).length],
    ['sched', 'Planifiés', 'var(--guest)', ms.filter(m => !m.done && m.due_date > t).length],
    ['late', 'En retard', 'var(--danger)', ms.filter(m => !m.done && m.due_date && m.due_date < t).length],
    ['done', 'Terminés', 'var(--warn)', ms.filter(m => m.done).length],
  ];
  const tiles = document.getElementById('tiles');
  tiles.hidden = false;
  tiles.innerHTML = '';
  defs.forEach(([key, label, color, count]) => {
    const tile = el('div', 'tile' + (FILTER === key ? ' active' : ''));
    tile.appendChild(el('span', 'tn', String(count)));
    const l = el('span', 'tl', label);
    l.style.color = color;
    tile.appendChild(l);
    tile.addEventListener('click', () => { FILTER = key; render(); });
    tiles.appendChild(tile);
  });
  const located = ms.filter(m => m.location).length
    + (DATA.projects || []).filter(p => p.location).length;
  if (located > 0) {
    const tile = el('div', 'tile');
    tile.appendChild(el('span', 'tn', String(located)));
    const l = el('span', 'tl'); l.append(shareIcon('map'), ' Carte');
    l.style.color = '#4db6ac';
    tile.appendChild(l);
    tile.addEventListener('click', () => openShareMap());
    tiles.appendChild(tile);
  }
  // [PHOTO-TEMPLATE-MEMO] Tuile « 📷 Photos » pour un partage de projet (charge à l'ouverture).
  if ((DATA.projects || []).length) {
    const tile = el('div', 'tile');
    const l = el('span', 'tl', '📷 Photos');
    l.style.color = '#b08968';
    tile.appendChild(l);
    tile.addEventListener('click', openSharePhotos);
    tiles.appendChild(tile);
  }
  const tn = (DATA.trash || []).length;
  if (DATA.can_edit && tn > 0) {
    const tile = el('div', 'tile' + (FILTER === 'trash' ? ' active' : ''));
    tile.appendChild(el('span', 'tn', String(tn)));
    const l = el('span', 'tl', '🗑 Corbeille');
    l.style.color = 'var(--danger)';
    tile.appendChild(l);
    tile.addEventListener('click', () => { FILTER = 'trash'; render(); });
    tiles.appendChild(tile);
  }
}

function renderShareTrash(list) {
  const items = DATA.trash || [];
  if (!items.length) { list.appendChild(el('div', 'empty', 'Corbeille vide. 🎉')); return; }
  items.forEach(m => {
    const row = el('div', 'task');
    row.style.cssText = 'display:flex;align-items:center;gap:0.6rem';
    const main = el('div');
    main.style.cssText = 'flex:1;min-width:0';
    const label = m.title || (m.content || '').replace(/<[^>]+>/g, ' ').trim().slice(0, 90) || '(mémo vide)';
    main.appendChild(el('div', null, (m.emoji ? m.emoji + ' ' : '') + label));
    let when = '';
    if (m.deleted_at) {
      const d = new Date(m.deleted_at);
      if (!isNaN(d.getTime())) when = 'Supprimé le ' + d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) + ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }
    const meta = el('div', null, when);
    meta.style.cssText = 'color:var(--muted);font-size:0.78rem;margin-top:0.15rem';
    main.appendChild(meta);
    row.appendChild(main);
    const rb = document.createElement('button');
    rb.className = 'tool-btn';
    rb.textContent = '↩ Restaurer';

      if (r.ok) await load(); else notify('Restauration impossible.', { error: true });
    });

    list.appendChild(row);
  });
}

function renderShareTreeView() {
  const board = document.getElementById('tree-board');
  board.innerHTML = '';
  const root = (DATA.projects || []).find(p => p.id === DATA.root_id);
  if (!root) { board.appendChild(el('p', '', 'Aucun projet à afficher.')); return; }
  const prios = Object.fromEntries((DATA.priorities || []).map(p => [p.id, p]));
  const today = todayStr();

  const bar = el('div', 'tree-toolbar');
  bar.appendChild(el('h2', '', '🌳 Plan'));
  const allIds = (DATA.projects || []).map(p => p.id);
  const anyClosed = allIds.some(id => !shareTreeOpen(id));
  const tb = el('button', 'tool-btn', anyClosed ? 'Tout déplier' : 'Tout replier');
  tb.addEventListener('click', () => { allIds.forEach(id => setShareTreeOpen(id, anyClosed)); renderShareTreeView(); });
  bar.appendChild(tb);
  board.appendChild(bar);

  const tree = el('div', 'tree-rows');
  board.appendChild(tree);

  const activeMemos = (pid) => DATA.memos.filter(m => m.project_id === pid && !m.deleted_at);
  const countActive = (pid) => {
    let n = DATA.memos.filter(m => m.project_id === pid && !m.deleted_at && !m.done).length;
    projChildren(pid).forEach(c => { n += countActive(c.id); });
    return n;
  };
  const connOf = treeConnector;

  function projIcon(p) {
    const icon = el('span', '');
    icon.style.cssText = 'display:inline-flex;align-items:center;gap:0.25rem;flex-shrink:0';
    if (p.emoji) icon.appendChild(el('span', '', p.emoji));
    if (p.color) { const d = el('span', 'sdot'); d.style.background = p.color; if (p.emoji) { d.style.width = '0.4rem'; d.style.height = '0.4rem'; } icon.appendChild(d); }
    if (!p.emoji && !p.color) { const d = el('span', 'sdot'); d.style.background = 'var(--gray)'; icon.appendChild(d); }
    return icon;
  }

  function memoRow(m, conn) {
    const row = el('div', 'tree-row tree-memo');
    if (canEditNow()) row.addEventListener('click', () => openEditor(m, null, null));
    row.appendChild(el('span', 'tree-pre', conn));
    row.appendChild(el('span', 'tree-check', m.done ? '✓' : ''));
    const pip = el('span', 'tree-pip');
    const prio = prios[m.priority];
    if (prio && prio.color) pip.style.background = prio.color; else pip.style.visibility = 'hidden';
    row.appendChild(pip);
    const label = m.title || (isRich(m.content) ? stripTags(m.content) : (m.content || '')).slice(0, 60) || '(sans titre)';
    row.appendChild(el('span', 'tree-title' + (m.done ? ' done' : ''), label));
    const meta = el('div', 'tree-meta');
    let dueTxt = '', dueCls = '';
    if (m.due_date) {
      const dt = fmtMemoTime(m.due_time);
      dueTxt = '📅 ' + new Date(m.due_date + 'T00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) + (dt ? ' · ' + dt : '');
      if (m.due_date < today) dueCls = ' due-late'; else if (m.due_date === today) dueCls = ' due-today';
    }
    meta.appendChild(el('span', 'tcol tcol-due' + dueCls, dueTxt));
    const asg = m.assignees || [];
    meta.appendChild(el('span', 'tcol tcol-asg', asg.length ? '👤 ' + asg[0] + (asg.length > 1 ? ' +' + (asg.length - 1) : '') : ''));
    meta.appendChild(el('span', 'tcol tcol-loc', m.location ? '📍 ' + ((m.location.label || '').slice(0, 18)) : ''));
    row.appendChild(meta);
    return row;
  }

  function node(p, ancestorsLast, isLast) {
    const kids = projChildren(p.id);
    const memos = activeMemos(p.id);
    const hasChildren = kids.length || memos.length;
    const open = shareTreeOpen(p.id);
    const row = el('div', 'tree-row tree-proj');
    row.appendChild(el('span', 'tree-pre', connOf(ancestorsLast, isLast)));
    const chev = el('span', 'tree-chev');
    if (hasChildren) {
      chev.textContent = open ? '▾' : '▸';
      chev.title = open ? 'Replier' : 'Déplier';
      chev.addEventListener('click', (e) => { e.stopPropagation(); setShareTreeOpen(p.id, !open); renderShareTreeView(); });
    } else { chev.style.visibility = 'hidden'; }
    row.appendChild(chev);
    row.appendChild(projIcon(p));
    const nameEl = el('span', 'tree-title tree-projname', p.name);
    nameEl.addEventListener('click', () => { PFILTER = p.id; GVIEW = 'board'; render(); });
    row.appendChild(nameEl);
    row.appendChild(el('span', 'tree-count', String(countActive(p.id))));
    tree.appendChild(row);
    if (open && hasChildren) {
      const childAnc = [...ancestorsLast, isLast];
      const items = [...memos.map(m => ({ memo: m })), ...kids.map(c => ({ proj: c }))];
      items.forEach((it, i) => {
        const last = i === items.length - 1;
        if (it.memo) tree.appendChild(memoRow(it.memo, connOf(childAnc, last)));
        else node(it.proj, childAnc, last);
      });
    }
  }

  node(root, [], true);
}

function visibleShareMemos() {
  const t = todayStr();
  return scopedMemos().filter(m => {
    if (FILTER === 'all') return !m.done;
    if (FILTER === 'today') return !m.done && m.due_date === t;
    if (FILTER === 'sched') return !m.done && m.due_date > t;
    if (FILTER === 'late') return !m.done && m.due_date && m.due_date < t;
    return m.done;
  });
}

function render() {
  document.getElementById('title').innerHTML = '';
  const h = document.getElementById('title');
  if (DATA.color) {
    const d = el('span', 'dot');
    d.style.background = DATA.color;
    h.appendChild(d);
  }
  h.appendChild(document.createTextNode(DATA.title));
  const modeEl = document.getElementById('mode'); modeEl.textContent = '';
  modeEl.append(shareIcon(canEditNow() || DATA.can_edit ? 'pencil' : 'eye'), ' ' + (canEditNow() ? 'modifiable' : (DATA.can_edit ? 'sur validation' : 'lecture seule')));
  const pdesc = document.getElementById('pdesc');
  let curDesc = DATA.description || '';
  if (PFILTER !== 'all') {
    const fp = (DATA.projects || []).find(p => p.id === PFILTER);
    curDesc = (fp && fp.description) || '';
  }
  pdesc.hidden = !curDesc;
  pdesc.textContent = curDesc;
  document.getElementById('add-bar').hidden = !(canEditNow() && DATA.kind === 'project');
  document.getElementById('proj-bar').hidden = !(canEditNow() && DATA.kind === 'project');
  const projSel = document.getElementById('add-project');
  if (canEditNow() && DATA.kind === 'project' && (DATA.projects || []).length > 1) {
    projSel.hidden = false;
    const prev = projSel.value;
    projSel.innerHTML = '';
    DATA.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      projSel.appendChild(opt);
    });
    if (prev) projSel.value = prev;
  } else {
    projSel.hidden = true;
  }
  renderGuestBanner();
  renderSidebar();
  renderTiles();
  applyA11y();
  // Le titre (nom du projet) peut faire varier la hauteur du header → re-mesurer
  // pour caler la barre de projets collante.
  syncHeaderHeight();

  if (!projSel.hidden && PFILTER !== 'all') projSel.value = String(PFILTER);

  // Vue Plan : arbre projets → mémos en plein écran (board et barres d'ajout masqués).
  const treeBoard = document.getElementById('tree-board');
  const showPlan = GVIEW === 'plan' && DATA.kind === 'project';
  treeBoard.hidden = !showPlan;
  document.getElementById('list').hidden = showPlan;
  if (showPlan) {
    document.getElementById('add-bar').hidden = true;
    document.getElementById('proj-bar').hidden = true;
    renderShareTreeView();
    return;
  }

  const list = document.getElementById('list');
  list.innerHTML = '';
  if (FILTER === 'trash') { renderShareTrash(list); return; }
  const visible = visibleShareMemos();
  // Tri intra-jour : date croissante, puis mémos sans heure d'abord, puis heure croissante.
  visible.sort((a, b) =>
    (a.due_date || '').localeCompare(b.due_date || '') ||
    ((a.due_time ? 1 : 0) - (b.due_time ? 1 : 0)) ||
    (a.due_time || '').localeCompare(b.due_time || ''));
  if (!visible.length) {
    list.appendChild(el('div', 'empty', 'Rien dans cette vue. 🎉'));
    return;
  }
  const prios = Object.fromEntries((DATA.priorities || []).map(p => [p.id, p]));
  visible.forEach(memo => {
    const t = el('div', 'task' + (memo.done ? ' done' : ''));
    if (canEditNow() && DATA.kind === 'project') {
      t.draggable = true;
      t.addEventListener('dragstart', (e) => { dragShareMemo = memo.id; e.dataTransfer.effectAllowed = 'move'; });
      t.addEventListener('dragend', () => { dragShareMemo = null; });
    }
    const prio = prios[memo.priority];
    // Bordure gauche = priorité, sinon couleur du projet (rien si done). [CARD-REDESIGN]
    if (!memo.done) {
      let leftCol = (prio && prio.color) ? prio.color : '';
      if (!leftCol && memo.project_id) {
        const pj = (DATA.projects || []).find(p => p.id === memo.project_id);
        if (pj) leftCol = usableProjColor(pj.color);
      }
      if (leftCol) t.style.borderLeftColor = leftCol;
    }

    const row = el('div', 'task-row');
    const check = el('button', 'task-check', '✓');
    check.disabled = !canEditNow();
    check.title = canEditNow() ? (memo.done ? 'Rouvrir' : 'Terminer') : 'Identification requise pour modifier';
    check.addEventListener('click', () => { if (canEditNow()) put(memo.id, { done: !memo.done }); });
    row.appendChild(check);

    const content = el('div', 'task-content');
    if (memo.title) {
      const tl = el('div', '', '');
      tl.style.cssText = 'font-weight:600;font-size:0.95rem;margin-bottom:0.15rem';
      if (memo.emoji) {
        const em = el('span', '', memo.emoji);
        em.style.marginRight = '0.35rem';
        tl.appendChild(em);
      }
      tl.appendChild(document.createTextNode(memo.title));
      content.appendChild(tl);
    } else if (memo.emoji) {
      const em = el('span', '', memo.emoji);
      em.style.marginRight = '0.35rem';
      content.appendChild(em);
    }
    // Extrait dans un wrapper clampable (3 lignes), sauf s'il contient une liste à
    // cocher : les invités doivent pouvoir cocher tous les items. [CARD-REDESIGN]
    const exc = el('div', '');
    if (isRich(memo.content)) exc.appendChild(sanitize(memo.content));
    else exc.appendChild(linkifyText(memo.content));
    exc.querySelectorAll('.mention[data-mention]').forEach(sp => {
      if (shareNoAccess(sp.getAttribute('data-mention'))) { sp.classList.add('noaccess'); sp.title = NO_ACCESS_TIP; }
    });
    if (!exc.querySelector('li[data-list]')) exc.classList.add('task-clamp');
    content.appendChild(exc);
    content.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]').forEach((li, i) => {
      if (!canEditNow()) return;
      li.classList.add('cl-edit');
      li.title = 'Cliquer pour cocher / décocher';
      li.addEventListener('click', () => {
        const tpl = document.createElement('template');
        tpl.innerHTML = memo.content;
        const items = tpl.content.querySelectorAll('li[data-list="checked"], li[data-list="unchecked"]');
        if (!items[i]) return;
        items[i].setAttribute('data-list', items[i].getAttribute('data-list') === 'checked' ? 'unchecked' : 'checked');
        put(memo.id, { content: tpl.innerHTML });
      });
    });
    row.appendChild(content);

    // Chip de priorité visible (en plus de la bordure gauche). [CARD-REDESIGN]
    if (prio && prio.color && !memo.done) {
      const pc = el('span', 'prio-chip', prio.name || ('P' + memo.priority));
      pc.style.cssText = 'background:' + prio.color + ';color:' + textOn(prio.color);
      pc.title = 'Priorité ' + (prio.name || '');
      row.appendChild(pc);
    }
    if (memo.location) {
      const la = el('a', 'badge'); la.append(shareIcon('map-pin'), memo.location.label ? ' ' + memo.location.label : '');
      la.href = 'https://www.openstreetmap.org/?mlat=' + memo.location.lat + '&mlon=' + memo.location.lng + '#map=17/' + memo.location.lat + '/' + memo.location.lng;
      la.target = '_blank';
      la.rel = 'noopener noreferrer';
      la.style.cssText = 'text-decoration:none;color:var(--accent)';
      la.title = 'Voir sur la carte';
      row.appendChild(la);
    }
    // Assignés en pastilles d'initiales (nom complet en tooltip ; ⚠ ambre si sans accès). [CARD-REDESIGN]
    const asg = memo.assignees || [];
    if (asg.length) {
      const stack = el('div', 'asg-stack');
      asg.forEach(a => {
        const noAcc = shareNoAccess(a);
        const av = el('span', 'asg-av' + (noAcc ? ' noaccess' : ''), initials(a));
        av.title = (noAcc ? '⚠ ' : '') + a + (noAcc ? ' — ' + NO_ACCESS_TIP : '');
        stack.appendChild(av);
      });
      row.appendChild(stack);
    }
    if (memo.project) row.appendChild(el('span', 'badge', memo.project));
    if (memo.due_date) {
      const dt = fmtMemoTime(memo.due_time);
      row.appendChild(el('span', 'badge', '📅 ' + new Date(memo.due_date + 'T00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) + (dt ? ' · ' + dt : '')));
    }
    if (canEditNow()) {
      const eBtn = el('button', 'task-edit');
      eBtn.appendChild(shareIcon('pencil'));
      eBtn.title = 'Modifier ce mémo';
      eBtn.addEventListener('click', () => openEditor(memo, content, t));
      row.appendChild(eBtn);
    }
    t.appendChild(row);

    (memo.subtasks || []).forEach((st, i) => {
      const s = el('div', 'subtask' + (st.done ? ' stdone' : ''));
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!st.done;
      cb.disabled = !canEditNow();
      cb.addEventListener('change', () => {
        const next = memo.subtasks.map((x, j) => j === i ? { ...x, done: cb.checked } : x);
        put(memo.id, { subtasks: next });
      });
      s.appendChild(cb);
      s.appendChild(el('span', '', st.content));
      t.appendChild(s);
    });

    const makeItemAdd = () => {
      const addItem = document.createElement('input');
      addItem.className = 'item-add';
      addItem.placeholder = '+ Ajouter un article… (Entrée)';
      addItem.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const val = addItem.value.trim();
        if (!val) return;
        const tpl = document.createElement('template');
        tpl.innerHTML = memo.content || '';
        let target = null;
        [...tpl.content.querySelectorAll('ul, ol')].reverse().some(l => {
          if (l.querySelector('li[data-list="checked"], li[data-list="unchecked"]')) { target = l; return true; }
          return false;
        });
        if (!target) {
          target = document.createElement('ul');
          tpl.content.appendChild(target);
        }
        const li = document.createElement('li');
        li.setAttribute('data-list', 'unchecked');
        li.textContent = val;
        target.appendChild(li);
        put(memo.id, { content: tpl.innerHTML });
      });
      return addItem;
    };
    const hasChecklist = !!content.querySelector('li[data-list]');
    if (canEditNow() && hasChecklist) {
      t.appendChild(makeItemAdd());
    }

    if ((memo.comments || []).length || canEditNow()) {
      const cwrap = el('div', '');
      cwrap.style.cssText = 'margin:0.4rem 0 0 1.75rem';
      const comments = memo.comments || [];
      const renderC = (c, isReply) => {
        const r = el('div', 'comment-row');
        r.style.cssText = 'display:flex;gap:0.5rem;align-items:flex-start;font-size:0.82rem;padding:0.3rem 0.5rem;background:var(--bg);border-radius:6px;margin-top:0.3rem' + (isReply ? ';margin-left:1.5rem;border-left:2px solid var(--border)' : '');
        if (c.priority) {
          const pp = el('span', '', 'P' + c.priority);
          pp.style.cssText = 'flex-shrink:0;font-size:0.66rem;font-weight:700;color:#10141a;border-radius:4px;padding:0 0.3rem;line-height:1.5;background:' + (COMMENT_PRIO_COL[c.priority] || 'var(--muted)');
          r.appendChild(pp);
        }
        const author = (c.author || '').replace(/\s*<[^>]*>/, '');
        const a = el('span', '', author);
        a.style.cssText = 'font-weight:600;flex-shrink:0' + (c.guest ? ';color:var(--guest)' : '');
        a.title = c.author;
        r.appendChild(a);
        const b = el('span', 'c-body', c.body);
        b.style.cssText = 'flex:1;min-width:0;white-space:pre-wrap;overflow-wrap:anywhere';
        r.appendChild(b);
        const w = el('span', '', new Date(c.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }));
        w.style.cssText = 'color:var(--muted);font-size:0.7rem;flex-shrink:0';
        w.title = new Date(c.created_at).toLocaleString('fr-FR');
        r.appendChild(w);
        const self = (GUEST && (GUEST.name || GUEST.email)) || '';
        const others = (c.seen || []).filter(v => v && v !== author && v !== self);
        if (others.length) {
          const s = el('span', ''); s.append(shareIcon('eye'), ' ' + others.join(', '));
          s.style.cssText = 'color:var(--muted);font-size:0.7rem;flex-shrink:0;white-space:nowrap';
          s.title = 'Vu par ' + others.join(', ');
          r.appendChild(s);
        }
        if (!isReply && canEditNow()) {
          const rep = el('span', ''); rep.appendChild(shareIcon('reply'));
          rep.style.cssText = 'cursor:pointer;color:var(--muted);flex-shrink:0';
          rep.title = 'Répondre';
          rep.addEventListener('click', () => {
            if (r.nextSibling && r.nextSibling.classList && r.nextSibling.classList.contains('reply-box')) { r.nextSibling.remove(); return; }
            const rb = shareCommentInput(memo, c.id);
            rb.classList.add('reply-box');
            rb.style.marginLeft = '1.5rem';
            r.after(rb);
            rb.querySelector('input').focus();
          });
          r.appendChild(rep);
        }
        cwrap.appendChild(r);
      };
      comments.filter(c => !c.parent_id).forEach(c => {
        renderC(c, false);
        comments.filter(ch => ch.parent_id === c.id).forEach(ch => renderC(ch, true));
      });
      if (canEditNow()) cwrap.appendChild(shareCommentInput(memo, null));
      t.appendChild(cwrap);
      if (comments.length && canEditNow()) markMemoSeen(memo.id);
    }

    if ((memo.images || []).length) {
      // Une seule miniature normalisée + overlay « +N » ; la visionneuse montre tout. [CARD-REDESIGN]
      const th = el('div', 'thumbs thumbs-collapsed');
      memo.images.slice(0, 1).forEach(name => {
        const wrap = el('span', 'thumb-wrap');
        const img = document.createElement('img');
        img.src = API + '/image/' + name;
        img.loading = 'lazy';
        img.addEventListener('click', () => {
          runImageViewer({
            images: memo.images, startIndex: memo.images.indexOf(name),
            imageUrl: (n) => API + '/image/' + n,
            downloadUrl: (n) => API + '/image/' + n,
            exifUrl: (n) => API + '/image-exif/' + n,
            canDelete: canEditNow(),
            onDelete: async (n) => {
              const r = await fetch(API + '/memo/' + memo.id + '/images/' + n, {
                method: 'DELETE', headers: { 'X-Guest-Token': guestToken() },
              });
              if (r.ok) await load();
            },
          });
        });
        wrap.appendChild(img);
        if (memo.images.length > 1) {
          const more = el('span', 'thumb-more', '+' + (memo.images.length - 1));
          wrap.appendChild(more);
        }
        th.appendChild(wrap);
      });
      t.appendChild(th);
    }

    if (canEditNow()) {
      const tools = el('div', 'memo-tools');

      // 1. EN-TÊTE : fil d'Ariane scopé au partage + date de création (lecture). [EXPAND-DETAIL-REORG]
      const crumb = el('div', 'memo-tools-row task-crumb');
      crumb.appendChild(el('span', '', '📁'));
      const byId = {}; (DATA.projects || []).forEach(p => { byId[p.id] = p; });
      const chain = []; let pcur = memo.project_id, pg = 0;
      while (pcur != null && byId[pcur] && pg++ < 50) { chain.push(byId[pcur]); pcur = byId[pcur].parent_id; }
      chain.reverse();
      if (!chain.length) {
        crumb.appendChild(el('span', 'me-crumb-node', '📥 Inbox'));
      } else {
        chain.forEach((p, i) => {
          if (i) crumb.appendChild(el('span', '', '›'));
          const node = el('span', 'me-crumb-node');
          node.appendChild(projIcon(p));
          node.appendChild(el('span', '', ' ' + p.name));
          crumb.appendChild(node);
        });
      }
      tools.appendChild(crumb);
      if (memo.created_at) {
        const cd = new Date(memo.created_at);
        if (!isNaN(cd)) {
          tools.appendChild(el('div', 'memo-tools-row task-crumb',
            '🕒 Créé le ' + cd.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
            + ' à ' + cd.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })));
        }
      }

      // 2. LIGNE PRINCIPALE : date | priorité. [EXPAND-DETAIL-REORG]
      const mainRow = el('div', 'memo-tools-row');
      const dateIn = document.createElement('input');
      dateIn.type = 'date';
      dateIn.value = memo.due_date || '';
      dateIn.title = 'Échéance';
      dateIn.addEventListener('change', () => put(memo.id, { due_date: dateIn.value }));
      mainRow.appendChild(dateIn);

      if (memo.due_date) {
        const timeIn = document.createElement('input');
        timeIn.type = 'time';
        timeIn.value = memo.due_time || '';
        timeIn.title = 'Heure (optionnelle)';
        timeIn.addEventListener('change', () => put(memo.id, { due_time: timeIn.value }));
        mainRow.appendChild(timeIn);
      }
      mainRow.appendChild(el('span', 'detail-sep'));

      const prios = DATA.priorities || [];
      const pBtn = document.createElement('button');
      pBtn.className = 'tool-btn';
      pBtn.title = 'Priorité — cliquer pour changer';
      const cur = prios.find(x => x.id === memo.priority);
      pBtn.textContent = ''; pBtn.append(shareIcon('flag'), ' ' + (cur ? cur.name : 'Priorité'));
      if (cur && cur.color) {
        pBtn.style.background = cur.color;
        pBtn.style.borderColor = cur.color;
        pBtn.style.color = '#10141a';
      }
      pBtn.addEventListener('click', () => {
        const ids = [0, ...prios.map(p => p.id)];
        const next = ids[(ids.indexOf(memo.priority || 0) + 1) % ids.length];
        put(memo.id, { priority: next });
      });
      mainRow.appendChild(pBtn);
      tools.appendChild(mainRow);

      // 3. LIGNE D'ACTIONS : Photo, Liste, Position, Modifier, Corbeille. [EXPAND-DETAIL-REORG]
      const actionRow = el('div', 'memo-tools-row');
      const fileIn = document.createElement('input');
      fileIn.type = 'file';
      fileIn.accept = 'image/png,image/jpeg';
      fileIn.multiple = true;
      fileIn.hidden = true;
      fileIn.addEventListener('change', async () => {
        for (const f of fileIn.files) {
          const fd = new FormData();
          fd.append('image', f);
          const r = await fetch(API + '/memo/' + memo.id + '/images', {
            method: 'POST', headers: { 'X-Guest-Token': guestToken() }, body: fd,
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            notify('Image refusée : ' + (err.error || r.statusText), { error: true });
          }
        }
        await load();
      });
      const photoBtn = document.createElement('button');
      photoBtn.className = 'tool-btn';
      photoBtn.append(shareIcon('camera'), ' Photo');
      photoBtn.title = 'Ajouter une photo (JPG ou PNG uniquement)';
      photoBtn.addEventListener('click', () => fileIn.click());
      actionRow.appendChild(photoBtn);
      actionRow.appendChild(fileIn);

      if (!hasChecklist) {
        const listBtn = document.createElement('button');
        listBtn.className = 'tool-btn';
        listBtn.append(shareIcon('checklist'), ' Liste');
        listBtn.title = 'Démarrer une liste à cocher dans ce mémo';
        listBtn.addEventListener('click', () => {
          if (t.querySelector('.item-add')) { t.querySelector('.item-add').focus(); return; }
          const input = makeItemAdd();
          tools.before(input);
          input.focus();
        });
        actionRow.appendChild(listBtn);
      }

      const locBtn = document.createElement('button');
      locBtn.className = 'tool-btn';
      locBtn.append(shareIcon('map-pin'), memo.location ? ' ×' : ' Position');
      locBtn.title = memo.location ? 'Retirer la position' : 'Attacher ma position GPS à ce mémo';
      locBtn.addEventListener('click', () => {
        if (memo.location) { put(memo.id, { location: null }); return; }
        if (!navigator.geolocation) { notify('Géolocalisation non disponible.', { error: true }); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => put(memo.id, { location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }),
          () => notify('Position refusée ou indisponible.', { error: true }),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
      actionRow.appendChild(locBtn);

      const eBtn = document.createElement('button');
      eBtn.className = 'tool-btn';
      eBtn.append(shareIcon('pencil'), ' Modifier');
      eBtn.title = 'Éditer le texte (mise en forme, listes, couleurs…)';
      eBtn.addEventListener('click', () => openEditor(memo, content, t));
      actionRow.appendChild(eBtn);

      const dBtn = document.createElement('button');
      dBtn.className = 'tool-btn';
      dBtn.appendChild(shareIcon('trash'));
      dBtn.title = 'Mettre ce mémo à la corbeille (restaurable depuis la tuile 🗑)';
      dBtn.addEventListener('click', async () => {
        const r = await fetch(API + '/memo/' + memo.id, {
          method: 'DELETE', headers: { 'X-Guest-Token': guestToken() },
        });
        if (r.ok) await load();
      });
      actionRow.appendChild(dBtn);
      tools.appendChild(actionRow);

      // 4. META : adresse, titre, assignés. [EXPAND-DETAIL-REORG]
      const metaRow = el('div', 'memo-tools-row');
      const addrIn = document.createElement('input');
      addrIn.type = 'text';
      addrIn.placeholder = '📍 Adresse… (Entrée)';
      addrIn.title = 'Chercher une adresse et l\'attacher au mémo';
      addrIn.style.cssText = 'flex:1;min-width:10rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;padding:0.25rem 0.45rem';
      addrIn.addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const q = addrIn.value.trim();
        if (q.length < 3) return;
        const r = await fetch(API + '/geocode?q=' + encodeURIComponent(q), { headers: { 'X-Guest-Token': guestToken() } });
        const data = r.ok ? await r.json() : { results: [] };
        if (!data.results.length) { notify('Adresse introuvable : « ' + q + ' »'); return; }
        const best = data.results[0];
        await put(memo.id, { location: best });
      });
      metaRow.appendChild(addrIn);

      const titleIn = document.createElement('input');
      titleIn.type = 'text';
      titleIn.placeholder = '🏷 Titre…';
      titleIn.maxLength = 200;
      titleIn.value = memo.title || '';
      titleIn.title = 'Titre du mémo (optionnel)';
      titleIn.style.cssText = 'width:9rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;font-weight:600;padding:0.25rem 0.45rem';
      titleIn.addEventListener('change', () => put(memo.id, { title: titleIn.value.trim() }));
      titleIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); titleIn.blur(); } });
      metaRow.appendChild(titleIn);

      const asgIn = document.createElement('input');
      asgIn.type = 'text';
      asgIn.placeholder = '+ @personne';
      asgIn.title = 'Rattacher une personne à cette tâche (Entrée). Cliquer un badge @ pour retirer.';
      asgIn.setAttribute('list', 'share-assignees');
      let sdl = document.getElementById('share-assignees');
      if (!sdl) {
        sdl = document.createElement('datalist');
        sdl.id = 'share-assignees';
        document.body.appendChild(sdl);
      }
      sdl.innerHTML = '';
      (DATA.members || []).forEach(n => {
        const o = document.createElement('option');
        o.value = n;
        sdl.appendChild(o);
      });
      asgIn.style.cssText = 'width:8rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:0.78rem;padding:0.25rem 0.45rem';
      asgIn.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const name = asgIn.value.replace(/^@/, '').trim();
        if (!name) return;
        put(memo.id, { assignees: [...(memo.assignees || []), name] });
      });
      metaRow.appendChild(asgIn);
      if ((memo.assignees || []).length) {
        const rmBtn = document.createElement('button');
        rmBtn.className = 'tool-btn';
        rmBtn.textContent = '× @';
        rmBtn.title = 'Retirer le dernier assigné (' + memo.assignees[memo.assignees.length - 1] + ')';
        rmBtn.addEventListener('click', () => put(memo.id, { assignees: memo.assignees.slice(0, -1) }));
        metaRow.appendChild(rmBtn);
      }
      tools.appendChild(metaRow);
      t.appendChild(tools);
    }
    list.appendChild(t);
  });
}

async function load() {
  const r = await fetch(API + '/data');
  if (!r.ok) {
    document.getElementById('title').textContent = 'Lien invalide ou révoqué';
    document.getElementById('list').innerHTML = '';
    document.getElementById('guest-banner').hidden = true;
    document.getElementById('add-bar').hidden = true;
    return;
  }
  DATA = await r.json();
  await refreshGuest();
  render();
}

document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').close());
const addInput = document.getElementById('add-input');
async function addMemo() {
  const content = addInput.value.trim();
  if (!content) return;
  const projSel = document.getElementById('add-project');
  const body = { content };
  if (!projSel.hidden && projSel.value) body.project_id = Number(projSel.value);
  const r = await fetch(API + '/memos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify(body),
  });
  if (r.ok) { addInput.value = ''; await load(); }
}
addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addMemo(); });
document.getElementById('add-btn').addEventListener('click', (e) => withBusy(e.currentTarget, addMemo));

const projInput = document.getElementById('proj-input');
async function addSubProject() {
  const name = projInput.value.trim();
  if (!name) return;
  const r = await fetch(API + '/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Guest-Token': guestToken() },
    body: JSON.stringify({ name }),
  });
  if (r.ok) { projInput.value = ''; await load(); }
  else {
    const err = await r.json().catch(() => ({}));
    notify(err.error || 'Création impossible', { error: true });
  }
}
projInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addSubProject(); });
document.getElementById('proj-btn').addEventListener('click', (e) => withBusy(e.currentTarget, addSubProject));

load();
setInterval(load, 15000);

/* ------------------------------------------------ animations GSAP
   Dégrade proprement si gsap.min.js est absent.
   load() est rappelé toutes les 15 s ; on n'anime l'entrée QUE quand
   le filtre ou le projet change (FILTER|PFILTER), pas à chaque refresh. */
window.addEventListener('DOMContentLoaded', () => {
  const g = window.gsap;
  if (!g) return;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function countUp(node) {
    const to = parseInt(node.textContent, 10);
    if (isNaN(to) || reduce) return;
    const o = { v: 0 };
    g.fromTo(o, { v: 0 }, {
      v: to, duration: 0.7, ease: 'power1.out', snap: { v: 1 },
      onUpdate: () => { node.textContent = Math.round(o.v); },
    });
  }
  function animateView() {
    stagger('#tiles .tile', { y: 10, duration: 0.35, stagger: 0.03 });
    stagger('#list .task');
    document.querySelectorAll('#tiles .tn').forEach(countUp);
  }

  const viewKey = () => [typeof FILTER !== 'undefined' ? FILTER : '', typeof PFILTER !== 'undefined' ? PFILTER : ''].join('|');
  let lastKey = null;
  let firstPaint = true;

  function playIntro() {
    if (!firstPaint) return;
    firstPaint = false;
    lastKey = viewKey();
    if (!reduce) {
      g.from('header', { y: -20, autoAlpha: 0, duration: 0.4, ease: 'power2.out', clearProps: 'all' });
      g.from('#snav .sitem', { x: -12, autoAlpha: 0, duration: 0.3, stagger: 0.03, ease: 'power2.out', delay: 0.08, clearProps: 'all' });
    }
    animateView();
  }

  const _render = render;
  render = function () {
    const r = _render.apply(this, arguments);
    if (firstPaint) { playIntro(); }
    else { const k = viewKey(); if (k !== lastKey) { lastKey = k; animateView(); } }
    return r;
  };

  if (document.querySelector('#list .task') || document.querySelector('#tiles .tile')) playIntro();

  // Entrée des pop-ins : gérée en CSS (@keyframes dlg-in / dlg-bd).
  // Ne pas wrapper showModal pour animer le <dialog> via GSAP : poser un transform
  // dessus le sort du top-layer Chromium et casse le centrage + le backdrop.
});
</script>

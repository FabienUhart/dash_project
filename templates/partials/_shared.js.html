{# Helpers front mutualisés (ADR-001, Option C) — source unique inlinée au rendu
   dans index.html ET share.html. Uniquement des fonctions PURES / SANS ÉTAT,
   identiques aux deux pages (vérifié par diff). Ne rien y mettre qui élargisse
   le périmètre invité (invariant 5). #}
<script>
// el() unifié, rétro-compatible (ADR-001 item Phase 1) :
//   forme propriétaire : el(tag, {class, attrs, text, icon, on}, ...children)
//   forme invité       : el(tag, cls, text)
// La forme est détectée par le type du 2e argument. `icon` n'est utilisé que côté
// propriétaire (la page invité ne passe jamais {icon} → pas besoin d'un helper icon() là-bas).
function el(tag, opts = {}, ...rest) {
  const e = document.createElement(tag);
  if (opts == null) opts = {};
  if (typeof opts === 'string') {            // forme invité : el(tag, cls, text)
    if (opts) e.className = opts;
    if (rest[0] != null) e.textContent = rest[0];
    return e;
  }
  if (opts.class) e.className = opts.class;   // forme propriétaire
  if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) e.setAttribute(k, v);
  if (opts.text != null) e.textContent = opts.text;
  if (opts.icon) { const ic = icon(opts.icon); if (opts.text != null) ic.style.marginRight = '0.35em'; e.insertBefore(ic, e.firstChild); }
  if (opts.on) for (const [k, v] of Object.entries(opts.on)) e.addEventListener(k, v);
  for (const c of rest) if (c != null) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return e;
}

function usableProjColor(c) {
  if (!/^#[0-9a-fA-F]{6}$/.test(c || '')) return '';
  const r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
  return (0.2126 * r + 0.7152 * g + 0.0722 * b) < 24 ? '' : c;
}

const PROV_PALETTE = ['#e57373', '#64b5f6', '#81c784', '#ffb74d', '#ba68c8', '#4db6ac', '#f06292', '#a1887f', '#90a4ae', '#fff176'];
function provenanceColor(proj) {
  const c = usableProjColor(proj ? proj.color : '');
  if (c) return c;
  const id = proj ? proj.id : 0;
  return PROV_PALETTE[((id % PROV_PALETTE.length) + PROV_PALETTE.length) % PROV_PALETTE.length];
}

// Pop-in carte mutualisée (ADR-001 item 4). Une seule implémentation owner/invité ;
// tout ce qui diffère est passé dans `cfg` (accès données, persistance, sauvegardes).
// cfg = { title, points, recompute, editable, projects, currentProjectId,
//         subFilterScope, defaultMarkerColor, focusKey, subKey,
//         saveColor(p,color), saveGroups(p,groups) }
// Dépend de globals présents sur les deux pages : L (Leaflet), activeMap, notify, el, provenanceColor.
function runMapDialog(cfg) {
  if (typeof L === 'undefined') {
    notify('Carte non disponible : fichiers Leaflet manquants dans static/ (voir README).', { error: true });
    return;
  }
  const points = cfg.points;
  if (!points.length) { notify('Aucun élément géolocalisé dans cette vue.'); return; }
  const recompute = cfg.recompute;
  const editable = cfg.editable;
  const projects = cfg.projects || [];
  const curId = cfg.currentProjectId;
  const UNGROUPED = ' none';

  document.getElementById('map-title').textContent = '🗺 ' + cfg.title + ' (' + points.length + ' point' + (points.length > 1 ? 's' : '') + ')';
  document.getElementById('map-dialog').showModal();
  if (activeMap) { activeMap.remove(); activeMap = null; }
  activeMap = L.map('map-el');
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(activeMap);
  const markerLayer = L.layerGroup().addTo(activeMap);
  const listEl = document.getElementById('map-list');
  const subbar = document.getElementById('map-subbar');
  const groupbar = document.getElementById('map-groupbar');
  const selbar = document.getElementById('map-selbar');

  const GKEY = cfg.focusKey, SUBKEY = cfg.subKey;
  let active, subActive;
  try { active = new Set(JSON.parse(localStorage.getItem(GKEY) || '[]')); } catch (e) { active = new Set(); }
  try { subActive = new Set(JSON.parse(localStorage.getItem(SUBKEY) || '[]')); } catch (e) { subActive = new Set(); }
  const selected = new Set();
  let current = points;

  const pkey = p => p.kind + ':' + p.id;
  const persist = () => localStorage.setItem(GKEY, JSON.stringify([...active]));
  const persistSub = () => localStorage.setItem(SUBKEY, JSON.stringify([...subActive]));
  const subToken = p => (p.kind === 'memo' ? (p.project_id || 0) : p.id);
  const subFilterScope = cfg.subFilterScope;
  function groupNames(pts) {
    const s = new Set();
    pts.forEach(p => (p.groups || []).forEach(g => s.add(g)));
    return [...s].sort((a, b) => a.localeCompare(b));
  }
  function hasUngrouped(pts) { return pts.some(p => !(p.groups && p.groups.length)); }
  function isGroupFocused(p) {
    if (!active.size) return true;
    const gs = (p.groups && p.groups.length) ? p.groups : [UNGROUPED];
    return gs.some(g => active.has(g));
  }
  function isSubFocused(p) {
    if (!subActive.size) return true;
    return subActive.has(subToken(p));
  }
  function isFocused(p) { return isGroupFocused(p) && isSubFocused(p); }

  function renderSubbar() {
    subbar.innerHTML = '';
    if (!subFilterScope) { subbar.style.display = 'none'; return; }
    const present = new Set(current.map(subToken));
    if (![...present].some(t => t !== curId)) { subbar.style.display = 'none'; return; }
    const ordered = projects.filter(p => present.has(p.id)).map(p => p.id);
    present.forEach(t => { if (!ordered.includes(t)) ordered.push(t); });
    subbar.style.display = 'flex';
    subbar.appendChild(el('span', { text: 'Sous-projets :', attrs: { style: 'font-size:0.78rem;color:var(--muted)' } }));
    ordered.forEach(t => {
      const proj = projects.find(p => p.id === t);
      const label = proj ? ((proj.emoji ? proj.emoji + ' ' : '') + proj.name) + (t === curId ? ' (ce projet)' : '') : '(sans projet)';
      const on = subActive.has(t);
      subbar.appendChild(el('button', {
        class: 'prio-btn', text: (on ? '✓ ' : '') + label,
        attrs: { type: 'button', title: on ? 'Ne plus filtrer sur ce sous-projet' : 'Afficher seulement ce sous-projet',
          style: 'padding:0.1rem 0.45rem;' + (on ? 'background:var(--accent);border-color:var(--accent);color:#10141a' : '') },
        on: { click: () => { if (subActive.has(t)) subActive.delete(t); else subActive.add(t); persistSub(); refresh(true); } },
      }));
    });
    if (subActive.size) {
      subbar.appendChild(el('button', {
        class: 'prio-btn', text: '↺ tous les sous-projets', attrs: { type: 'button', style: 'padding:0.1rem 0.45rem' },
        on: { click: () => { subActive.clear(); persistSub(); refresh(true); } },
      }));
    }
  }

  function renderGroupbar() {
    groupbar.innerHTML = '';
    const names = groupNames(current);
    if (!names.length) { groupbar.style.display = 'none'; return; }
    groupbar.style.display = 'flex';
    groupbar.appendChild(el('span', { text: 'Groupes :', attrs: { style: 'font-size:0.78rem;color:var(--muted)' } }));
    const chip = (label, token) => {
      const on = active.has(token);
      groupbar.appendChild(el('button', {
        class: 'prio-btn', text: (on ? '✓ ' : '') + label,
        attrs: { type: 'button', title: on ? 'Ne plus filtrer sur ce groupe' : 'Afficher seulement ce groupe',
          style: 'padding:0.1rem 0.45rem;' + (on ? 'background:var(--accent);border-color:var(--accent);color:#10141a' : '') },
        on: { click: () => { if (active.has(token)) active.delete(token); else active.add(token); persist(); refresh(true); } },
      }));
    };
    names.forEach(n => chip(n, n));
    if (hasUngrouped(current)) chip('(sans groupe)', UNGROUPED);
    if (active.size) {
      groupbar.appendChild(el('button', {
        class: 'prio-btn', text: '↺ tout afficher', attrs: { type: 'button', style: 'padding:0.1rem 0.45rem' },
        on: { click: () => { active.clear(); persist(); refresh(true); } },
      }));
    }
  }

  function renderSelbar() {
    selbar.innerHTML = '';
    if (!editable || !selected.size) { selbar.style.display = 'none'; return; }
    selbar.style.display = 'flex';
    selbar.appendChild(el('span', { text: selected.size + ' sélectionné' + (selected.size > 1 ? 's' : ''), attrs: { style: 'font-size:0.8rem;font-weight:600' } }));
    const input = el('input', { attrs: { type: 'text', placeholder: 'nom du groupe', list: 'map-group-list', style: 'flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font:inherit;font-size:0.8rem;padding:0.2rem 0.4rem' } });
    const dl = el('datalist', { attrs: { id: 'map-group-list' } });
    groupNames(current).forEach(n => dl.appendChild(el('option', { attrs: { value: n } })));
    selbar.appendChild(input);
    selbar.appendChild(dl);
    const apply = async () => {
      const name = input.value.trim();
      if (!name) return;
      for (const key of [...selected]) {
        const p = current.find(x => pkey(x) === key);
        if (!p || p.kind !== 'memo') continue;
        const next = Array.from(new Set([...(p.groups || []), name]));
        await cfg.saveGroups(p, next);
      }
      selected.clear();
      current = recompute();
      refresh(false);
    };
    selbar.appendChild(el('button', { class: 'primary', text: '＋ Grouper', attrs: { type: 'button', style: 'padding:0.2rem 0.6rem' }, on: { click: apply } }));
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); apply(); } });
    selbar.appendChild(el('button', { class: 'prio-btn', text: 'Tout décocher', attrs: { type: 'button' }, on: { click: () => { selected.clear(); refresh(false); } } }));
  }

  function draw(pts, fit) {
    markerLayer.clearLayers();
    listEl.innerHTML = '';
    const latlngs = [];

    function buildRow(p, proj, showChip) {
      const ll = [p.lat, p.lng];
      const focused = isFocused(p);
      if (focused) latlngs.push(ll);
      const dotColor = p.color || cfg.defaultMarkerColor || '#e53935';
      const mColor = focused ? dotColor : '#8a93a0';
      const marker = L.circleMarker(ll, {
        radius: focused ? 9 : 6, color: mColor, weight: focused ? 2 : 1, fillColor: mColor, fillOpacity: focused ? 0.55 : 0.18,
      }).addTo(markerLayer).bindPopup(
        '<strong>' + (p.title || '').replace(/</g, '&lt;') + '</strong>' + (p.sub ? '<br>' + p.sub.replace(/</g, '&lt;') : '')
      );
      const row = el('div', { attrs: { style: 'display:flex;align-items:flex-start;gap:0.4rem;font-size:0.8rem;padding:0.35rem 0.5rem;width:100%' + (focused ? '' : ';opacity:0.4') } });
      if (showChip) {
        const accent = proj ? provenanceColor(proj) : 'var(--border)';
        const chip = el('span', { attrs: { title: proj ? proj.name : 'sans projet', style: 'display:inline-flex;align-items:center;gap:0.2rem;flex-shrink:0;margin-top:0.18rem;font-size:0.72rem' } });
        chip.appendChild(el('span', { attrs: { style: 'width:9px;height:9px;border-radius:50%;flex-shrink:0;background:' + accent } }));
        if (proj && proj.emoji) chip.appendChild(el('span', { text: proj.emoji }));
        row.appendChild(chip);
      }
      if (editable && p.kind === 'memo') {
        const cb = el('input', { attrs: { type: 'checkbox', style: 'flex-shrink:0;margin-top:0.28rem;cursor:pointer' } });
        cb.checked = selected.has(pkey(p));
        cb.addEventListener('change', () => { if (cb.checked) selected.add(pkey(p)); else selected.delete(pkey(p)); renderSelbar(); });
        row.appendChild(cb);
      }
      if (editable && (p.kind === 'memo' || p.kind === 'project')) {
        const colorIn = el('input', { attrs: { type: 'color', value: dotColor, title: 'Couleur de ce point', style: 'width:18px;height:18px;padding:0;border:none;background:none;flex-shrink:0;margin-top:0.18rem;cursor:pointer' } });
        colorIn.addEventListener('change', async () => { await cfg.saveColor(p, colorIn.value); current = recompute(); refresh(false); });
        row.appendChild(colorIn);
      } else {
        row.appendChild(el('span', { attrs: { style: 'width:10px;height:10px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;margin-top:0.25rem' } }));
      }
      const txt = el('button', {
        attrs: { type: 'button', style: 'flex:1;min-width:0;overflow-wrap:anywhere;text-align:left;background:none;border:none;padding:0;color:inherit;font:inherit;cursor:pointer' },
        on: { click: () => { activeMap.setView(ll, 16); marker.openPopup(); } },
      });
      txt.appendChild(el('strong', { text: p.title || '' }));
      if (p.placeLabel) txt.appendChild(el('div', { text: p.placeLabel, attrs: { style: 'color:var(--muted);font-size:0.72rem' } }));
      if (p.groups && p.groups.length) {
        const chips = el('div', { attrs: { style: 'display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.2rem' } });
        p.groups.forEach(g => {
          const c = el('span', { attrs: { style: 'display:inline-flex;align-items:center;gap:0.15rem;font-size:0.66rem;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:0.02rem 0.4rem' } });
          c.appendChild(el('span', { text: g }));
          if (editable) {
            c.appendChild(el('button', {
              text: '×', attrs: { type: 'button', title: 'Retirer de « ' + g + ' »', style: 'background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:0.8rem;line-height:1' },
              on: { click: async (ev) => { ev.stopPropagation(); await cfg.saveGroups(p, (p.groups || []).filter(x => x !== g)); current = recompute(); refresh(false); } },
            }));
          }
          chips.appendChild(c);
        });
        txt.appendChild(chips);
      }
      row.appendChild(txt);
      if (editable && p.override) {
        row.appendChild(el('button', {
          class: 'prio-btn', text: '↺', attrs: { type: 'button', title: 'Couleur par défaut', style: 'flex-shrink:0;padding:0.05rem 0.3rem' },
          on: { click: async () => { await cfg.saveColor(p, ''); current = recompute(); refresh(false); } },
        }));
      }
      listEl.appendChild(row);
    }

    const byProj = new Map();
    pts.forEach(p => { const t = subToken(p); if (!byProj.has(t)) byProj.set(t, []); byProj.get(t).push(p); });
    const ordered = [];
    if (byProj.has(curId)) ordered.push(curId);
    projects.forEach(pr => { if (pr.id !== curId && byProj.has(pr.id)) ordered.push(pr.id); });
    [...byProj.keys()].forEach(t => { if (!ordered.includes(t)) ordered.push(t); });

    const multi = ordered.length > 1;
    ordered.forEach(t => {
      const proj = projects.find(pr => pr.id === t);
      if (multi) {
        const accent = proj ? provenanceColor(proj) : 'var(--border)';
        const head = el('div', { attrs: { style: 'display:flex;align-items:center;gap:0.35rem;font-size:0.74rem;color:var(--muted);font-weight:600;margin-top:0.4rem;padding:0.1rem 0.2rem 0.1rem 0.35rem;border-left:3px solid ' + accent } });
        const lab = proj ? ((proj.emoji ? proj.emoji + ' ' : '') + proj.name) + (t === curId ? ' (ce projet)' : '') : '(sans projet)';
        head.appendChild(el('span', { text: lab }));
        head.appendChild(el('span', { text: '· ' + byProj.get(t).length, attrs: { style: 'font-weight:400' } }));
        listEl.appendChild(head);
      }
      byProj.get(t).forEach(p => buildRow(p, proj, multi));
    });

    if (fit) {
      setTimeout(() => {
        activeMap.invalidateSize();
        if (latlngs.length === 1) activeMap.setView(latlngs[0], 15);
        else if (latlngs.length) activeMap.fitBounds(latlngs, { padding: [30, 30] });
      }, 60);
    }
  }

  function refresh(fit) {
    renderSubbar();
    renderGroupbar();
    renderSelbar();
    draw(current, fit);
  }

  refresh(true);
}

function setTheme(t) {
  const light = t === 'light';
  if (light) document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch (e) {}
  const u = themeBtn && themeBtn.querySelector('use');
  if (u) u.setAttribute('href', light ? '#ic-sun' : '#ic-moon');
}

function stagger(sel, opts) {
  // Autonome : calcule g (GSAP) et le reduced-motion lui-même (pas de dépendance
  // au contexte de page — cf. fix [SHARED-HELPERS], les locaux g/reduce des
  // callbacks DOMContentLoaded ne sont pas visibles depuis ce partial).
  const g = window.gsap;
  if (!g) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const nodes = document.querySelectorAll(sel);
  if (!nodes.length) return;
  g.killTweensOf(nodes);
  g.fromTo(nodes,
    { autoAlpha: 0, y: 14 },
    Object.assign({
      autoAlpha: 1, y: 0, duration: 0.4, ease: 'power2.out',
      stagger: 0.045, overwrite: true, clearProps: 'transform,opacity,visibility',
    }, opts || {}));
}

function announce(msg) {
  const e = document.getElementById('sr-live');
  if (!e) return;
  e.textContent = '';
  setTimeout(() => { e.textContent = msg; }, 40);
}

function syncHeaderHeight() {
  const h = document.querySelector('header');
  if (h) document.documentElement.style.setProperty('--header-h', h.offsetHeight + 'px');
}

function registerMentionBlot() {
  if (typeof Quill === 'undefined' || Quill.__mentionReady) return;
  const Inline = Quill.import('blots/inline');
  class MentionBlot extends Inline {
    static create(value) { const node = super.create(); node.setAttribute('data-mention', value); return node; }
    static formats(node) { return node.getAttribute('data-mention'); }
  }
  MentionBlot.blotName = 'mention';
  MentionBlot.tagName = 'span';
  MentionBlot.className = 'mention';
  Quill.register(MentionBlot, true);
  Quill.__mentionReady = true;
}

function addMentionMatcher(q) {
  const Delta = Quill.import('delta');
  q.clipboard.addMatcher('SPAN', (node, delta) => {
    if (node.classList && node.classList.contains('mention')) {
      const nm = node.getAttribute('data-mention') || node.textContent.replace(/^@/, '');
      return new Delta().insert('@' + nm, { mention: nm });
    }
    return delta;
  });
}

function attachInputMention(input, getNames) {
  const menu = document.createElement('div');
  menu.className = 'mention-menu';
  menu.style.display = 'none';
  (input.closest('dialog') || document.body).appendChild(menu);
  let open = false, items = [], active = 0, qstart = -1;
  const close = () => { open = false; menu.style.display = 'none'; };
  const draw = () => {
    menu.innerHTML = '';
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'mention-item' + (i === active ? ' active' : '');
      row.textContent = it.add ? ('➕ Ajouter « ' + it.value + ' »') : ('@' + it.value);
      row.addEventListener('mousedown', (e) => { e.preventDefault(); pick(i); });
      menu.appendChild(row);
    });
  };
  const place = () => {
    const r = input.getBoundingClientRect();
    menu.style.left = Math.round(r.left) + 'px';
    menu.style.top = Math.round(r.bottom + 4) + 'px';
    menu.style.minWidth = Math.round(r.width) + 'px';
  };
  const pick = (i) => {
    const it = items[i]; if (!it) { close(); return; }
    const name = String(it.value).trim(); if (!name) { close(); return; }
    const val = input.value, pos = input.selectionStart;
    input.value = val.slice(0, qstart) + '@' + name + ' ' + val.slice(pos);
    const np = qstart + name.length + 2;
    input.setSelectionRange(np, np);
    close(); input.focus();
  };
  const detect = () => {
    const before = input.value.slice(0, input.selectionStart);
    const m = /(?:^|\s)@([^\s@]*)$/.exec(before);
    if (!m) { close(); return; }
    qstart = input.selectionStart - m[1].length - 1;
    const q = m[1].toLowerCase();
    const all = (getNames() || []).filter(Boolean);
    const list = all.filter(n => n.toLowerCase().includes(q)).map(v => ({ value: v }));
    if (m[1] && !all.some(n => n.toLowerCase() === q)) list.push({ value: m[1], add: true });
    items = list;
    if (!items.length) { close(); return; }
    if (active >= items.length) active = 0;
    draw(); place(); menu.style.display = 'block'; open = true;
  };
  input.addEventListener('input', detect);
  input.addEventListener('keydown', (e) => {
    if (!open || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); active = (active + 1) % items.length; draw(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); e.stopImmediatePropagation(); active = (active - 1 + items.length) % items.length; draw(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); e.stopImmediatePropagation(); pick(active); }
    else if (e.key === 'Escape') { e.stopImmediatePropagation(); close(); }
  });
  input.addEventListener('blur', () => setTimeout(close, 150));
}

function setupMentions(quill, getNames, onPick) {
  const host = quill.container.closest('dialog') || document.body;
  const menu = document.createElement('div');
  menu.className = 'mention-menu';
  menu.style.display = 'none';
  host.appendChild(menu);
  let open = false, items = [], active = 0, query = '', picking = false;

  const close = () => { open = false; menu.style.display = 'none'; };
  const draw = () => {
    menu.innerHTML = '';
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'mention-item' + (i === active ? ' active' : '');
      row.textContent = it.add ? ('➕ Ajouter « ' + it.value + ' »') : ('@' + it.value);
      row.addEventListener('mousedown', (e) => { e.preventDefault(); pick(i); });
      row.addEventListener('mousemove', () => { if (active !== i) { active = i; draw(); } });
      menu.appendChild(row);
    });
  };
  const place = () => {
    const sel = quill.getSelection(); if (!sel) return;
    const b = quill.getBounds(sel.index);
    const c = quill.container.getBoundingClientRect();
    menu.style.left = Math.round(c.left + b.left) + 'px';
    menu.style.top = Math.round(c.top + b.bottom + 4) + 'px';
  };
  const refresh = () => {
    const all = (getNames() || []).filter(Boolean);
    const q = query.toLowerCase();
    const list = all.filter(n => n.toLowerCase().includes(q)).map(v => ({ value: v }));
    if (query && !all.some(n => n.toLowerCase() === q)) list.push({ value: query, add: true });
    items = list;
    if (!items.length) { close(); return; }
    if (active >= items.length) active = 0;
    draw(); place();
    menu.style.display = 'block'; open = true;
  };
  const pick = (i) => {
    const it = items[i]; if (!it) { close(); return; }
    const name = String(it.value).trim(); if (!name) { close(); return; }
    const sel = quill.getSelection(true); if (!sel) { close(); return; }
    const delLen = query.length + 1;
    const start = sel.index - delLen;
    picking = true;
    quill.deleteText(start, delLen, 'user');
    quill.insertText(start, '@' + name, { mention: name }, 'user');
    quill.insertText(start + name.length + 1, ' ', { mention: false }, 'user');
    quill.setSelection(start + name.length + 2, 0, 'user');
    picking = false;
    close();
    try { onPick(name); } catch (e) {}
  };
  const detect = () => {
    if (picking) return;
    const sel = quill.getSelection();
    if (!sel || sel.length) { close(); return; }
    const m = /(?:^|\s)@([^\s@]*)$/.exec(quill.getText(0, sel.index));
    if (!m) { close(); return; }
    query = m[1];
    refresh();
  };
  quill.on('text-change', (d, o, source) => { if (source === 'user') detect(); else close(); });
  quill.on('selection-change', (range) => { if (!range && !picking) close(); });
  quill.root.addEventListener('keydown', (e) => {
    if (!open || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); active = (active + 1) % items.length; draw(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); e.stopImmediatePropagation(); active = (active - 1 + items.length) % items.length; draw(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); e.stopImmediatePropagation(); pick(active); }
    else if (e.key === 'Escape') { e.preventDefault(); e.stopImmediatePropagation(); close(); }
  }, true);
}
</script>
